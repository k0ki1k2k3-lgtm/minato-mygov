            const alreadyExists = existingIds.includes(draft.id);
            return (
              <div key={draft.id || i}
                style={{background:C.bg1,borderRadius:14,padding:20,border:`2px solid ${alreadyExists?C.t3+"33":C.blue+"33"}`,position:"relative"}}>
                {alreadyExists && (
                  <div style={{position:"absolute",top:12,right:12,background:C.t3+"22",color:C.t3,borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:700}}>
                    ⚠️ ID重複
                  </div>
                )}
                <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                  <div style={{fontSize:32,flexShrink:0}}>{draft.icon||"📋"}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                      <span style={{background:(govColors[draft.gov]||C.blue)+"22",color:govColors[draft.gov]||C.blue,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>{draft.gov||"—"}</span>
                      <span style={{background:C.bg2,color:C.t3,borderRadius:6,padding:"2px 8px",fontSize:11}}>{draft.tag||"—"}</span>
                      <code style={{background:C.bg2,color:C.t3,borderRadius:6,padding:"2px 8px",fontSize:11}}>{draft.id||"(id未設定)"}</code>
                        {/* クローラーのソース（_source） */}
                      {draft._source && (
                        <span style={{background:C.purple+"11",color:C.purple,borderRadius:6,padding:"2px 8px",fontSize:11}}>
                          {{"rss":"📡 RSS","pdf":"📰 PDF","crawl":"🕷️ クロール"}[draft._source]||draft._source}
                        </span>
                      )}
                      {/* 信頼度バッジ */}
                      {draft._confidence && (
                        <span style={{background:{"high":C.green,"medium":"#e8a000","low":C.red}[draft._confidence]+"22",color:{"high":C.green,"medium":"#e8a000","low":C.red}[draft._confidence]||C.t3,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>
                          {{"high":"🟢 High","medium":"🟡 Medium","low":"🔴 Low"}[draft._confidence]}
                        </span>
                      )}
                      {/* 要確認フラグ */}
                      {draft._needs_verification && draft._needs_verification.length > 0 && (
                        <span style={{background:C.red+"11",color:C.red,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>
                          ⚠️ 要確認{draft._needs_verification.length}項目
                        </span>
                      )}
                    </div>
                    <div style={{fontWeight:700,fontSize:16,color:C.t1,marginBottom:4}}>{draft.title||"(タイトルなし)"}</div>
                    <div style={{color:C.t2,fontSize:13,marginBottom:6}}>{draft.catch||""}</div>
                    <div style={{color:C.t3,fontSize:12,lineHeight:1.6}}>{draft.body||""}</div>
                    {draft._draft_meta?.detectedAt && (
                      <div style={{color:C.t3,fontSize:11,marginTop:8}}>
                        🕐 収集日時: {new Date(draft._draft_meta.detectedAt).toLocaleDateString("ja-JP")}
                      </div>
                    )}
                  </div>
                </div>

                <div style={{display:"flex",gap:8,marginTop:16,borderTop:`1px solid ${C.border}`,paddingTop:14}}>
                  <button
                    onClick={()=>setDetail(draft)}
                    style={{flex:1,background:C.bg2,color:C.t2,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    🔍 詳細を確認
                  </button>
                  {!alreadyExists && (
                    <button
                      onClick={()=>onApprove(draft)}
                      style={{flex:1.5,background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"9px",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                      ✏️ 編集して追加
                    </button>
                  )}
                  {alreadyExists && (
                    <div style={{flex:1.5,background:C.t3+"11",color:C.t3,borderRadius:8,padding:"9px",fontWeight:700,fontSize:13,textAlign:"center"}}>
                      ID重複のため承認不可
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* 詳細モーダル */}
      {detail && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.bg1,borderRadius:16,width:"100%",maxWidth:600,maxHeight:"80vh",overflow:"auto",padding:28}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h3 style={{color:C.t1,fontWeight:700,fontSize:18}}>{detail.title}</h3>
              <button onClick={()=>setDetail(null)}
                style={{background:"none",border:"none",color:C.t3,fontSize:24,cursor:"pointer",lineHeight:1}}>×</button>
            </div>
            {/* 要確認事項を目立たせる */}
            {detail._needs_verification && detail._needs_verification.length > 0 && (
              <div style={{background:C.red+"11",border:`1px solid ${C.red}33`,borderRadius:10,padding:"12px 16px",marginBottom:16}}>
                <div style={{color:C.red,fontWeight:700,fontSize:13,marginBottom:6}}>⚠️ 要確認事項（編集フォームで補完してください）</div>
                <ul style={{margin:0,paddingLeft:20}}>
                  {detail._needs_verification.map((v,i)=>(
                    <li key={i} style={{color:C.red,fontSize:13,lineHeight:1.8}}>{v}</li>
                  ))}
                </ul>
              </div>
            )}
            {detail._reason && (
              <div style={{background:C.blue+"11",border:`1px solid ${C.blue}22`,borderRadius:10,padding:"10px 14px",marginBottom:16,color:C.blue,fontSize:13}}>
                💡 検出理由: {detail._reason}
              </div>
            )}
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <span style={{background:{"high":C.green,"medium":"#e8a000","low":C.red}[detail._confidence]+"22",color:{"high":C.green,"medium":"#e8a000","low":C.red}[detail._confidence],borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:700}}>
                信頼度: {detail._confidence}
              </span>
              <a href={detail.sourceUrl} target="_blank" rel="noopener noreferrer"
                style={{color:C.blue,fontSize:12,padding:"3px 10px",border:`1px solid ${C.blue}44`,borderRadius:6,textDecoration:"none"}}>
                🔗 公式URL →
              </a>
            </div>
            <pre style={{background:C.bg0,borderRadius:10,padding:16,fontSize:11,color:C.t2,overflow:"auto",lineHeight:1.6,fontFamily:"monospace",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
              {JSON.stringify(detail, null, 2)}
            </pre>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   AI抽出タブ
   ════════════════════════════════════════════════════════ */
function ExtractTab({existingIds, onAdd, showToast}) {
  const [input, setInput] = useState("");
  const [inputType, setInputType] = useState("url");
  const [loading, setLoading] = useState(false);
  const [proposals, setProposals] = useState([]);
  const [error, setError] = useState("");

  const extract = async () => {
    if (!input.trim()) { setError("URLまたはテキストを入力してください"); return; }
    setLoading(true); setError(""); setProposals([]);

    const sourceDesc = inputType === "url" ? "対象URL: " + input : "テキスト内容:\n" + input;
    const inputTypeLabel = inputType === "url" ? "URL（Web検索して内容を取得）" : "テキスト";

    const prompt = `あなたは港区民向け行政情報アプリの制度データ抽出AIです。

以下の${inputTypeLabel}から、港区民が受け取れる給付金・補助金・減免・手当・無料サービスの情報を抽出し、JSON配列で返してください。

${sourceDesc}

以下のJSON形式で返してください（配列のみ、前後の文章・コードブロック不要）:
[
  {
    "id": "英小文字_数字のみのID（例: jidouteate2026）",
    "gov": "国" または "東京都" または "港区",
    "tag": "子育て" または "住まい" または "健康" または "キャリア" または "教育" または "生活",
    "icon": "絵文字1文字",
    "colorKey": "blue" または "green" または "purple",
    "title": "正式な制度名",
    "easyTitle": "わかりやすいタイトル（20文字以内）",
    "officialName": "正式名称",
    "catch": "一言キャッチコピー（20文字以内）",
    "body": "わかりやすい説明（150文字以内）",
    "deadline": "申請期限",
    "urgent": false,
    "subsidyType": "cash" または "savings" または "info",
    "potentialSubsidy": 最大金額（数値・円）,
    "potentialLabel": "最大金額の表示文字列",
    "reminderLabel": "申請時の注意事項（1文）",
    "sourceUrl": "公式URL",
    "eligibility": {
      "certain": [{"条件キー": "値"}],
      "exclude": [],
      "matchRules": [{"if": {"条件キー": "値"}, "score": 40}],
      "baseScore": 0,
      "missingFor": ["income"],
      "excludeReasons": {},
      "hints": {}
    },
    "subsidyRules": [{"default": true, "amount": 0}],
    "subsidyLabelRules": [{"default": true, "label": null}]
  }
]

制度が見つからない場合は空配列 [] を返してください。JSONのみ返してください。`;

    try {
      const text = await callClaude(prompt, inputType === "url");
      const clean = text.replace(/```json|```/g, "").trim();
      const start = clean.indexOf("["); const end = clean.lastIndexOf("]");
      if (start === -1) throw new Error("制度情報が見つかりませんでした");
      const parsed = JSON.parse(clean.slice(start, end + 1));
      const filtered = parsed.filter(p => !existingIds.includes(p.id));
      setProposals(filtered.map(p => ({...p, _accepted:false})));
      if (filtered.length === 0) setError("新しい制度は見つかりませんでした（すでに登録済みの可能性）");
    } catch(e) {
      setError("抽出に失敗しました: " + e.message);
    }
    setLoading(false);
  };

  return (
    <div style={{maxWidth:720,margin:"0 auto"}}>
      <Section title="🤖 URLまたはテキストから制度を自動抽出">
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {[["url","🔗 URL"],["text","📄 テキスト"]].map(([v,l])=>(
            <button key={v}
              onClick={()=>setInputType(v)}
              style={{flex:1,background:inputType===v?C.blue+"22":"none",color:inputType===v?C.blue:C.t2,border:`1px solid ${inputType===v?C.blue:C.border}`,borderRadius:8,padding:"8px",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>

        {inputType === "url" ? (
          <input value={input} onChange={e=>setInput(e.target.value)}
            placeholder="例: https://www.city.minato.tokyo.jp/..."
            style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",fontSize:14,color:C.t1,outline:"none",background:C.bg1,marginBottom:12}}/>
        ) : (
          <textarea value={input} onChange={e=>setInput(e.target.value)}
            placeholder="広報みなとのPDFテキストや制度説明文を貼り付け..."
            rows={8}
            style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",fontSize:13,color:C.t1,outline:"none",background:C.bg1,resize:"vertical",fontFamily:"inherit",marginBottom:12}}/>
        )}

        <button onClick={extract} disabled={loading}
          style={{width:"100%",background:loading?C.t3:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"12px",fontWeight:700,fontSize:15,cursor:loading?"not-allowed":"pointer"}}>
          {loading ? "🔍 AIが分析中…" : "🔍 制度を抽出する"}
        </button>

        {loading && (
          <div style={{textAlign:"center",marginTop:16,color:C.t2,fontSize:13}}>
            公式サイトを読んで制度を整理しています…
          </div>
        )}
        {error && <div style={{color:C.red,fontSize:13,marginTop:10}}>{error}</div>}
      </Section>

      {/* 抽出結果 */}
      {proposals.length > 0 && (
        <Section title={`✨ ${proposals.length}件の制度が見つかりました`}>
          {proposals.map((p, i) => (
            <div key={i} style={{background:p._accepted?C.green+"11":C.bg2,borderRadius:10,padding:16,marginBottom:12,border:`1px solid ${p._accepted?C.green+"44":C.border}`}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{fontSize:28,flexShrink:0}}>{p.icon||"📋"}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",gap:6,marginBottom:6,flexWrap:"wrap"}}>
                    <span style={{background:C.blue+"22",color:C.blue,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}}>{p.gov}</span>
                    <span style={{background:C.bg1,color:C.t3,borderRadius:6,padding:"2px 8px",fontSize:11}}>{p.tag}</span>
                    <code style={{background:C.bg1,color:C.t3,borderRadius:6,padding:"2px 8px",fontSize:11}}>{p.id}</code>
                  </div>
                  <div style={{fontWeight:700,fontSize:15,color:C.t1,marginBottom:4}}>{p.title}</div>
                  <div style={{color:C.t2,fontSize:13,marginBottom:4}}>{p.catch}</div>
                  <div style={{color:C.t3,fontSize:12,lineHeight:1.6}}>{p.body}</div>
                  {p.potentialSubsidy > 0 && (
                    <div style={{color:C.blue,fontWeight:700,fontSize:13,marginTop:6}}>
                      💙 最大 {(p.potentialSubsidy||0).toLocaleString()}円
                    </div>
                  )}
                </div>
              </div>
              <div style={{display:"flex",gap:8,marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:12}}>
                <button
                  onClick={()=>setProposals(ps=>ps.map((x,j)=>j===i?{...x,_accepted:!x._accepted}:x))}
                  style={{flex:1,background:p._accepted?C.green+"22":"none",color:p._accepted?C.green:C.t2,border:`1px solid ${p._accepted?C.green:C.border}`,borderRadius:8,padding:"8px",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                  {p._accepted ? "✅ 追加する（選択済）" : "追加する"}
                </button>
                <button
                  onClick={()=>{ const {_accepted,...raw}=p; onAdd(raw); setProposals(ps=>ps.filter((_,j)=>j!==i)); showToast(`✅「${p.title}」を追加しました`); }}
                  style={{background:C.blue+"22",color:C.blue,border:`1px solid ${C.blue}44`,borderRadius:8,padding:"8px 14px",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                  今すぐ追加
                </button>
                <button
                  onClick={()=>setProposals(ps=>ps.filter((_,j)=>j!==i))}
                  style={{background:C.red+"11",color:C.red,border:"none",borderRadius:8,padding:"8px 12px",fontSize:13,cursor:"pointer"}}>
                  🗑 却下
                </button>
              </div>
            </div>
          ))}

          {proposals.some(p=>p._accepted) && (
            <button
              onClick={()=>{
                proposals.filter(p=>p._accepted).forEach(p=>{ const {_accepted,...raw}=p; onAdd(raw); });
                setProposals(ps=>ps.filter(p=>!p._accepted));
                showToast(`✅ ${proposals.filter(p=>p._accepted).length}件の制度を追加しました`);
              }}
              style={{width:"100%",background:C.green,color:"#fff",border:"none",borderRadius:10,padding:"14px",fontWeight:700,fontSize:15,cursor:"pointer"}}>
              ✅ 選択した制度をまとめて追加（{proposals.filter(p=>p._accepted).length}件）
            </button>
          )}
        </Section>
      )}
    </div>
  );
}

/* ── Root render ── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
