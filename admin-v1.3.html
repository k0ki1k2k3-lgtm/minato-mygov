<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>minato-mygov 管理画面 v1.4</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif; }
    body { background:#f0f4f8; min-height:100vh; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1a2332; color:#fff; padding:10px 20px; border-radius:10px; font-size:14px; z-index:9999; animation:fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translate(-50%,10px)} to{opacity:1;transform:translate(-50%,0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── カラーテーマ ── */
const C = {
  blue:"#2d5fc4", green:"#1a9e6b", purple:"#6b46c1", red:"#c0392b",
  bg0:"#f0f4f8", bg1:"#ffffff", bg2:"#f5f7fa", border:"#dde3ec",
  t1:"#1a2332", t2:"#4a5568", t3:"#8896a8",
};

/* ── GitHub API設定 ── */
const GITHUB_OWNER = "k0ki1k2k3-lgtm";
const GITHUB_REPO_MAIN = "minato-mygov";
const GITHUB_REPO_CRAWLER = "minato-mygov-crawler";
const GITHUB_DB_PATH = "items-db.json";
const GITHUB_DRAFTS_PATH = "data/drafts.json";
const ADMIN_PASSWORD = "minato-admin-2024"; // 必要に応じて変更

/* ── Push通知設定（草稿通知を管理者端末で受け取る） ── */
const PUSH_WORKER_URL = "https://minato-mygov-push.k-0k-i1k-2k-3.workers.dev";
const VAPID_PUBLIC_KEY = "BF4XLgKASTOesypO8_4x4AOQ9AimeIY3781caVoxI-r-dEHzneDlF8K_10hUnspXuTK-kYSkT9hHqEZOP66BhDM";

function urlB64ToUint8Array(b64) {
  const padding = "=".repeat((4 - (b64.length % 4)) % 4);
  const base64 = (b64 + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

// 管理者端末を push 購読し role:"admin" で登録 → 草稿生成時に admin-draft 通知が届く
async function enableAdminPush(showToast) {
  try {
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
      showToast("⚠️ この端末/ブラウザは通知に未対応です"); return;
    }
    const perm = await Notification.requestPermission();
    if (perm !== "granted") { showToast("⚠️ 通知が許可されませんでした"); return; }
    // アプリと同じ sw.js をルートscopeで登録（admin-v1.3.html はルート配置）
    const reg = await navigator.serviceWorker.register("./sw.js", { scope: "./" });
    await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    }
    const j = sub.toJSON();
    const res = await fetch(`${PUSH_WORKER_URL}/subscribe`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ endpoint: j.endpoint, keys: j.keys, role: "admin" }),
    });
    if (res.ok) showToast("✅ 草稿通知を有効化しました（この端末に届きます）");
    else showToast("❌ 登録に失敗: " + res.status);
  } catch (e) {
    showToast("❌ 通知有効化エラー: " + e.message);
  }
}

/* ── DB_PATH: items-db.json の相対パス（ローカル参照用） ── */
const DB_PATH = "../items-db.json";

/* ── GitHub API ヘルパー ── */
async function githubGet(repo, path, token) {
  const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${repo}/contents/${path}`, {
    headers: {
      "Authorization": `Bearer ${token}`,
      "Accept": "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28",
    }
  });
  if (!res.ok) throw new Error(`GitHub GET失敗: ${res.status} ${res.statusText}`);
  return res.json();
}

async function githubPut(repo, path, token, content, sha, message) {
  const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${repo}/contents/${path}`, {
    method: "PUT",
    headers: {
      "Authorization": `Bearer ${token}`,
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json",
      "X-GitHub-Api-Version": "2022-11-28",
    },
    body: JSON.stringify({
      message,
      content: btoa(unescape(encodeURIComponent(content))),
      sha,
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(`GitHub PUT失敗: ${res.status} ${err.message || res.statusText}`);
  }
  return res.json();
}

/* ── Anthropic API 呼び出し ── */
async function callClaude(prompt, useWebSearch = false) {
  const tools = useWebSearch ? [{type:"web_search_20250305",name:"web_search"}] : undefined;
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:4000,
      ...(tools?{tools}:{}),
      messages:[{role:"user",content:prompt}],
    }),
  });
  const data = await resp.json();
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
}

/* ── 空の制度テンプレート ── */
function emptyItem() {
  return {
    id:"", gov:"港区", icon:"📋", colorKey:"blue", tag:"生活",
    title:"", officialName:"", catch:"", body:"", officialBody:"",
    deadline:"通年", urgent:false, subsidyType:"cash",
    subsidyRules:[{default:true,amount:0}],
    subsidyLabelRules:[{default:true,label:null}],
    potentialSubsidy:0, potentialLabel:null,
    reminderLabel:"", sourceUrl:"",
    easyTitle:"",
    eligibility:{
      certain:[], exclude:[], matchRules:[],
      baseScore:0, missingFor:[],
      excludeReasons:{}, hints:{}
    },
    // 通知・興味タグ
    notifyLevel:"mid",       // "high" | "mid" | "low"
    judgmentType:"eligibility", // "eligibility" | "interest"
    interestTags:[],
    miniQuizKey:"",
    miniQuizText:"",
    categoryHint:"",
    notifHook:"",
  };
}

/* ════════════════════════════════════════════════════════
   メインApp
   ════════════════════════════════════════════════════════ */
function App() {
  // ── 認証状態 ──
  const [authed, setAuthed] = useState(() => sessionStorage.getItem("mgov_authed") === "1");
  const [githubToken, setGithubToken] = useState(() => sessionStorage.getItem("mgov_token") || "");
  const [loginPw, setLoginPw] = useState("");
  const [loginToken, setLoginToken] = useState("");
  const [loginError, setLoginError] = useState("");
  const [loginLoading, setLoginLoading] = useState(false);

  // ── データ状態 ──
  const [db, setDb] = useState(null);
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState("");
  const [tab, setTab] = useState("list"); // list | add | extract | drafts | settings
  const [editItem, setEditItem] = useState(null);
  const [toast, setToast] = useState("");
  const [search, setSearch] = useState("");
  const [drafts, setDrafts] = useState([]);
  const [draftsLoading, setDraftsLoading] = useState(false);
  const [publishing, setPublishing] = useState(false);

  // ── DB読み込み（GitHub API経由） ──
  useEffect(() => {
    if (!authed || !githubToken) return;
    loadFromGitHub();
  }, [authed, githubToken]);

  const loadFromGitHub = async () => {
    setLoading(true); setLoadError("");
    try {
      const fileInfo = await githubGet(GITHUB_REPO_MAIN, GITHUB_DB_PATH, githubToken);
      const content = decodeURIComponent(escape(atob(fileInfo.content.replace(/\n/g, ""))));
      const data = JSON.parse(content);
      setDb(data);
      setLoading(false);
    } catch(e) {
      // フォールバック: ローカルfetch
      try {
        const r = await fetch(DB_PATH + "?" + Date.now());
        const data = await r.json();
        setDb(data);
        setLoading(false);
        showToast("⚠️ GitHub APIが使えないためローカルから読み込みました");
      } catch(e2) {
        setLoadError("items-db.json の読み込みに失敗しました: " + e.message);
        setLoading(false);
      }
    }
  };

  // ── drafts.json 読み込み ──
  const loadDrafts = async () => {
    if (!githubToken) return;
    setDraftsLoading(true);
    try {
      const fileInfo = await githubGet(GITHUB_REPO_CRAWLER, GITHUB_DRAFTS_PATH, githubToken);
      const content = decodeURIComponent(escape(atob(fileInfo.content.replace(/\n/g, ""))));
      const data = JSON.parse(content);
      setDrafts(Array.isArray(data) ? data : (data.drafts || []));
    } catch(e) {
      showToast("⚠️ drafts.json の読み込みに失敗: " + e.message);
      setDrafts([]);
    }
    setDraftsLoading(false);
  };

  // ── GitHub へ publish ──
  const publishToGitHub = async (newDb) => {
    if (!githubToken) { showToast("⚠️ GitHub Tokenが未設定です"); return false; }
    setPublishing(true);
    try {
      // 現在のSHAを取得
      const fileInfo = await githubGet(GITHUB_REPO_MAIN, GITHUB_DB_PATH, githubToken);
      const sha = fileInfo.sha;
      const now = new Date().toISOString();
      const updatedDb = {
        ...newDb,
        _meta: { ...newDb._meta, updatedAt: now, version: "1.4" }
      };
      const content = JSON.stringify(updatedDb, null, 2);
      await githubPut(
        GITHUB_REPO_MAIN,
        GITHUB_DB_PATH,
        githubToken,
        content,
        sha,
        `🤖 制度DB更新 (${now.slice(0,10)}) via 管理画面`
      );
      setDb(updatedDb);
      showToast("✅ GitHubにpushしました！Netlifyが自動デプロイします");
      setPublishing(false);
      return true;
    } catch(e) {
      showToast("❌ GitHub push失敗: " + e.message);
      setPublishing(false);
      return false;
    }
  };

  // ── 草稿を編集フォームに展開（直接公開せず確認を挟む） ──
  const approveDraft = (draft) => {
    // クローラー内部フィールドを除去
    const {
      _confidence, _reason, _needs_verification, _source,
      _status, _created_at, _draft_meta, subsidy_note,
      color,           // crawlerは "C.blue" 形式 → colorKey に変換
      officialBody,    // 保持する
      ...rest
    } = draft;

    // colorKey を正規化（"C.blue" → "blue"、すでに "blue" の場合もOK）
    const colorKey = (color || rest.colorKey || "blue").replace(/^C\./, "");

    // items-db.json の必須フィールドをデフォルト値で補完
    const item = {
      ...emptyItem(),
      ...rest,
      colorKey,
      officialBody: officialBody || rest.officialBody || "",
      // potentialSubsidy は数値に統一（草稿では文字列 or 未設定のことがある）
      potentialSubsidy: Number(rest.potentialSubsidy) || 0,
    };

    // 編集フォームに展開してタブ切り替え
    setEditItem(item);
    setTab("add");
    showToast(`📝「${item.title}」を編集フォームに展開しました。内容を確認・補完してから保存してください。`);
  };

  // ── ログイン処理 ──
  const handleLogin = async () => {
    setLoginLoading(true); setLoginError("");
    if (loginPw !== ADMIN_PASSWORD) {
      setLoginError("パスワードが違います");
      setLoginLoading(false);
      return;
    }
    if (!loginToken.trim()) {
      setLoginError("GitHub Tokenを入力してください");
      setLoginLoading(false);
      return;
    }
    // Token疎通確認
    try {
      const res = await fetch("https://api.github.com/repos/k0ki1k2k3-lgtm/minato-mygov", {
        headers: { "Authorization": `Bearer ${loginToken.trim()}`, "Accept": "application/vnd.github+json" }
      });
      if (!res.ok) throw new Error("Token認証失敗 (status: " + res.status + ")");
      sessionStorage.setItem("mgov_authed", "1");
      sessionStorage.setItem("mgov_token", loginToken.trim());
      setGithubToken(loginToken.trim());
      setAuthed(true);
    } catch(e) {
      setLoginError("GitHub Token認証エラー: " + e.message);
    }
    setLoginLoading(false);
  };

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2500);
  };

  // ── DB をダウンロード（バックアップ用） ──
  const downloadDb = () => {
    const blob = new Blob([JSON.stringify(db, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "items-db.json"; a.click();
    URL.revokeObjectURL(url);
    showToast("✅ items-db.json をダウンロードしました");
  };

  // ── 制度を保存してGitHubへpush ──
  const saveItem = async (item) => {
    const updated = {...db};
    const idx = updated.items.findIndex(x => x.id === item.id);
    const isNew = idx < 0;
    if (idx >= 0) {
      updated.items[idx] = item;
    } else {
      updated.items.push(item);
      updated._meta.totalItems = updated.items.length;
    }
    await publishToGitHub(updated);
    setEditItem(null);
    setTab("list");
  };

  // ── 制度を削除してGitHubへpush ──
  const deleteItem = async (id, title) => {
    if (!window.confirm(`「${title}」を削除してよいですか？\nGitHubに即pushされます。`)) return;
    const updated = {...db, items: db.items.filter(x => x.id !== id)};
    updated._meta.totalItems = updated.items.length;
    await publishToGitHub(updated);
  };

  // ── ログアウト ──
  const handleLogout = () => {
    sessionStorage.removeItem("mgov_authed");
    sessionStorage.removeItem("mgov_token");
    setAuthed(false);
    setGithubToken("");
    setDb(null);
  };

  // ── ログイン画面 ──
  if (!authed) return (
    <div style={{minHeight:"100vh",background:C.bg0,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:C.bg1,borderRadius:20,padding:40,width:"100%",maxWidth:420,border:`1px solid ${C.border}`,boxShadow:"0 8px 32px rgba(0,0,0,0.08)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:48,marginBottom:12}}>🏙️</div>
          <div style={{fontWeight:700,fontSize:22,color:C.t1}}>minato-mygov</div>
          <div style={{color:C.t3,fontSize:13,marginTop:4}}>管理画面 v1.4</div>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{color:C.t2,fontSize:12,fontWeight:700,marginBottom:6}}>🔐 管理パスワード</div>
          <input
            type="password"
            value={loginPw}
            onChange={e=>setLoginPw(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleLogin()}
            placeholder="パスワードを入力"
            style={{width:"100%",border:`1px solid ${loginError?C.red:C.border}`,borderRadius:10,padding:"11px 14px",fontSize:15,color:C.t1,outline:"none",background:C.bg2}}
          />
        </div>
        <div style={{marginBottom:24}}>
          <div style={{color:C.t2,fontSize:12,fontWeight:700,marginBottom:6}}>
            🔑 GitHub Personal Access Token
            <a href="https://github.com/settings/tokens?type=beta" target="_blank"
              style={{color:C.blue,fontSize:11,marginLeft:8,textDecoration:"none"}}>取得 →</a>
          </div>
          <input
            type="password"
            value={loginToken}
            onChange={e=>setLoginToken(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleLogin()}
            placeholder="github_pat_..."
            style={{width:"100%",border:`1px solid ${loginError?C.red:C.border}`,borderRadius:10,padding:"11px 14px",fontSize:13,color:C.t1,outline:"none",background:C.bg2,fontFamily:"monospace"}}
          />
          <div style={{color:C.t3,fontSize:11,marginTop:6}}>
            ※ セッション中のみ保持。タブを閉じると消えます。
          </div>
        </div>
        {loginError && (
          <div style={{background:C.red+"11",border:`1px solid ${C.red}33`,borderRadius:10,padding:"10px 14px",color:C.red,fontSize:13,marginBottom:16}}>
            ⚠️ {loginError}
          </div>
        )}
        <button
          onClick={handleLogin}
          disabled={loginLoading}
          style={{width:"100%",background:loginLoading?C.t3:C.blue,color:"#fff",border:"none",borderRadius:10,padding:"14px",fontWeight:700,fontSize:16,cursor:loginLoading?"not-allowed":"pointer"}}>
          {loginLoading ? "認証中…" : "🔓 ログイン"}
        </button>
      </div>
    </div>
  );

  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}>
      <div style={{fontSize:32}}>⏳</div>
      <div style={{color:C.t2}}>GitHub から items-db.json を読み込み中…</div>
    </div>
  );

  if (loadError) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16,padding:32}}>
      <div style={{fontSize:32}}>⚠️</div>
      <div style={{color:C.red,fontWeight:700}}>読み込みエラー</div>
      <div style={{color:C.t2,textAlign:"center",lineHeight:1.7}}>{loadError}</div>
      <div style={{background:C.bg2,borderRadius:12,padding:16,border:`1px solid ${C.border}`,color:C.t2,fontSize:13,lineHeight:1.8}}>
        <b>確認事項：</b><br/>
        • このファイルは admin/index.html として配置してください<br/>
        • items-db.json は1つ上のディレクトリ（リポジトリルート）に置いてください<br/>
        • Netlifyでローカルサーバーを立ち上げている場合は <code>netlify dev</code> で確認してください
      </div>
    </div>
  );

  const filtered = db.items.filter(it =>
    !search || it.title.includes(search) || it.gov.includes(search) || it.tag.includes(search)
  );

  return (
    <div style={{minHeight:"100vh",background:C.bg0}}>
      {/* ヘッダー */}
      <div style={{background:C.bg1,borderBottom:`1px solid ${C.border}`,padding:"16px 24px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:960,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16}}>
          <div>
            <div style={{fontWeight:700,fontSize:18,color:C.t1}}>🏙️ minato-mygov 管理画面</div>
            <div style={{color:C.t3,fontSize:12,marginTop:2}}>
              v{db._meta.version} · {db.items.length}件 · 最終更新：{db._meta.updatedAt}
            </div>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <NavBtn id="list"   current={tab} setTab={setTab}>📋 制度一覧</NavBtn>
            <NavBtn id="add"    current={tab} setTab={()=>{setEditItem(null);setTab("add");}}>➕ 新規追加</NavBtn>
            <NavBtn id="drafts" current={tab} setTab={()=>{setTab("drafts");loadDrafts();}}>
              📥 草稿{drafts.length>0?` (${drafts.length})`:""}
            </NavBtn>
            <NavBtn id="proposals" current={tab} setTab={()=>{setTab("proposals");loadDrafts();}}>🧩 拡張提案</NavBtn>
            <NavBtn id="extract" current={tab} setTab={setTab}>🤖 AI抽出</NavBtn>
            <button
              onClick={()=>enableAdminPush(showToast)}
              style={{background:C.purple+"15",color:C.purple,border:`1px solid ${C.purple}44`,borderRadius:8,padding:"8px 12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              🔔 草稿通知ON
            </button>
            <button
              onClick={downloadDb}
              style={{background:"none",color:C.t2,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              ⬇ DL
            </button>
            <button
              onClick={handleLogout}
              style={{background:C.red+"11",color:C.red,border:`1px solid ${C.red}33`,borderRadius:8,padding:"8px 12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              🔓 ログアウト
            </button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:960,margin:"0 auto",padding:"24px 16px"}}>
        {/* 制度一覧タブ */}
        {tab === "list" && (
          <ListTab
            items={filtered} allItems={db.items}
            search={search} setSearch={setSearch}
            onEdit={(item) => { setEditItem(item); setTab("add"); }}
            onDelete={deleteItem}
          />
        )}

        {/* 新規追加・編集タブ */}
        {tab === "add" && (
          <EditTab
            key={editItem?.id || 'new'}
            item={editItem || emptyItem()}
            existingIds={db.items.map(x=>x.id)}
            onSave={saveItem}
            onCancel={() => { setEditItem(null); setTab("list"); }}
            showToast={showToast}
          />
        )}

        {/* プロフィール拡張提案タブ */}
        {tab === "proposals" && (
          <ProposalsTab
            drafts={drafts}
            loading={draftsLoading}
            onReload={loadDrafts}
            showToast={showToast}
          />
        )}

        {/* 草稿レビュータブ */}
        {tab === "drafts" && (
          <DraftsTab
            drafts={drafts}

            existingIds={db.items.map(x=>x.id)}

    </div>
  );
}

/* ── exclude/eligibility 自動検証（4-4 バッジ用） ── */
const OLD_INCOME_SET = ["～200万円","200～400万円","400～600万円","600～800万円","800万円～"];
function validateEligibility(item) {
  const el = item.eligibility || {};
  const errors = [], warnings = [];
  const certain = el.certain || [], exclude = el.exclude || [];

  // チェック3：旧income区分の検出（certain / exclude / matchRules）
  const scanIncome = (arr) => (arr || []).forEach(c => {
    const cc = c.if || c;
    const inc = cc.income;
    const vals = Array.isArray(inc) ? inc : (inc && inc.notIn ? inc.notIn : []);
    vals.forEach(v => { if (OLD_INCOME_SET.includes(v)) errors.push(`旧年収区分「${v}」を検出`); });
  });
  scanIncome(certain); scanIncome(exclude); scanIncome(el.matchRules);

  // チェック1・2：certainに年齢/stageがあるのにexcludeが無い
  const realCertain = certain.filter(c => !c._always && !c._alwaysExclude);
  const hasAgeStage = realCertain.some(c => "ageMin" in c || "ageMax" in c || "stage" in c);
  if (realCertain.length > 0 && exclude.length === 0) {
    if (hasAgeStage) errors.push("certainに年齢/stage条件があるのにexcludeが空（除外漏れ）");
    else warnings.push("certainあり・excludeなし（除外漏れの可能性）");
  }

  // チェック4：missingForが判定条件（certain/exclude/profileCheck）に繋がっていない
  const usedKeys = new Set();
  [...certain, ...exclude].forEach(c => Object.keys(c.if || c).forEach(k => usedKeys.add(k)));
  (el.profileCheck || []).forEach(pc => usedKeys.add(pc.field));
  (el.missingFor || []).forEach(k => { if (!usedKeys.has(k)) warnings.push(`missingFor「${k}」が判定条件に未接続`); });

  const level = errors.length ? "error" : warnings.length ? "warn" : "ok";
  return { level, messages: [...errors, ...warnings] };
}

function ValidationBadge({ item }) {
  const v = validateEligibility(item);
  const map = {
    ok:    { color: C.green,            label: "🟢 問題なし" },
    warn:  { color: "#f0a030",          label: "🟡 警告" },
    error: { color: C.red,              label: "🔴 要修正" },
  };
  const m = map[v.level];
  return (
    <span title={v.messages.join("\n") || "検証OK"}
      style={{background:m.color+"1f",color:m.color,border:`1px solid ${m.color}55`,
        borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700,cursor:v.messages.length?"help":"default"}}>
      {m.label}{v.messages.length ? `(${v.messages.length})` : ""}
    </span>
  );
}

// 旧形式（単一オブジェクト）→ 配列に正規化
function normalizeItemForEdit(item) {
  const copy = JSON.parse(JSON.stringify(item));
  const t = copy.interestTags;
  if (!Array.isArray(t)) {
    copy.interestTags = (t && (t.l1 || t.l2 || t.l3)) ? [t] : [];
  }
  return copy;
}

function EditTab({item, existingIds, onSave, onCancel, showToast}) {
  const [form, setForm] = useState(normalizeItemForEdit(item));
  const [errors, setErrors] = useState({});
  const isNew = !item.id || !existingIds.includes(item.id);

  const set = (key, val) => setForm(f => ({...f, [key]: val}));
  const setEl = (key, val) => setForm(f => ({...f, eligibility: {...f.eligibility, [key]: val}}));

  const validate = () => {
    const errs = {};
    if (!form.id) errs.id = "IDは必須です";
    if (form.id && !/^[a-z0-9_]+$/.test(form.id)) errs.id = "IDは英小文字・数字・アンダースコアのみ";
    if (isNew && existingIds.includes(form.id)) errs.id = "このIDはすでに存在します";
    if (!form.title) errs.title = "タイトルは必須です";
    if (!form.gov) errs.gov = "所管は必須です";
    setErrors(errs);
    return Object.keys(errs).length === 0;
  };

  const handleSave = () => {
    if (!validate()) { showToast("⚠️ 入力エラーがあります"); return; }
    onSave(form);
  };

  const F = ({label, error, children}) => (
    <div style={{marginBottom:16}}>
      <div style={{color:C.t2,fontSize:12,fontWeight:700,marginBottom:4}}>{label}</div>
      {children}
      {error && <div style={{color:C.red,fontSize:11,marginTop:4}}>{error}</div>}
    </div>
  );

  const inp = (key, placeholder, type="text") => (
    <input
      type={type} value={form[key]||""} onChange={e=>set(key, type==="number"?Number(e.target.value):e.target.value)}
      placeholder={placeholder}
      style={{width:"100%",border:`1px solid ${errors[key]?C.red:C.border}`,borderRadius:8,padding:"9px 12px",fontSize:14,color:C.t1,outline:"none",background:C.bg1}}
    />
  );

  const sel = (key, opts) => (
    <select value={form[key]||""} onChange={e=>set(key,e.target.value)}
      style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",fontSize:14,color:C.t1,outline:"none",background:C.bg1}}>
      {opts.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  );

  const textarea = (key, placeholder, rows=3) => (
    <textarea value={form[key]||""} onChange={e=>set(key,e.target.value)}
      placeholder={placeholder} rows={rows}
      style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",fontSize:13,color:C.t1,outline:"none",background:C.bg1,resize:"vertical",fontFamily:"inherit",lineHeight:1.6}}
    />
  );

  // eligibility は EligibilityBuilder で直接編集

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={onCancel} style={{background:"none",border:"none",color:C.blue,fontSize:14,cursor:"pointer",fontWeight:700}}>← 一覧に戻る</button>
        <h2 style={{color:C.t1,fontSize:18,fontWeight:700}}>{isNew ? "➕ 制度を新規追加" : `✏️ 編集：${item.title}`}</h2>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
        {/* 左カラム：基本情報 */}
        <div>
          <Section title="基本情報">
            <F label="ID（英小文字・数字・_）" error={errors.id}>{inp("id","例: jidouteate_2026")}</F>
            <F label="所管" error={errors.gov}>
              {sel("gov",["国","東京都","港区"])}
            </F>
            <F label="タグ">
              {sel("tag",["子育て","教育","健康","住まい","生活","キャリア"])}
            </F>
            <F label="アイコン（絵文字1文字）">{inp("icon","例: 👶")}</F>
            <F label="カラーキー">
              {sel("colorKey",["blue","green","purple","red","t2"])}

          </Section>

          <Section title="タイトル・説明">
            <F label="かんたんタイトル（easyTitle）" error={errors.title}>{inp("easyTitle","例: 子どもがいると毎月お金が振り込まれる制度")}</F>
            <F label="正式タイトル（title）" error={errors.title}>{inp("title","例: 児童手当（拡充版）")}</F>

            <F label="キャッチコピー（catch・20文字以内）">{inp("catch","例: 高校生まで！所得制限なし")}</F>

            </div>

              <input type="number" value={form.potentialSubsidy||0} onChange={e=>set("potentialSubsidy",Number(e.target.value))}
                style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",fontSize:14,color:C.t1,outline:"none",background:C.bg1}}/>
            </F>
            <F label="可能性額ラベル（potentialLabel）">{inp("potentialLabel","例: 年最大36万円")}</F>
            <F label="リマインドラベル（reminderLabel）">{inp("reminderLabel","例: 港区子ども家庭支援センターへ申請")}</F>

          </Section>

          <Section title="給付金額ルール（subsidyRules）">
            <SubsidyRulesEditor
              rules={form.subsidyRules||[]}
              labelRules={form.subsidyLabelRules||[]}
              onChange={(rules,labelRules) => { set("subsidyRules",rules); set("subsidyLabelRules",labelRules); }}
            />
          </Section>

          <Section title="🎯 判定条件（eligibility）">
            <EligibilityBuilder
              eligibility={form.eligibility}
              onChange={el => setForm(f => ({...f, eligibility: el}))}
              ctx={form}
              showToast={showToast}
            />
          </Section>
        </div>
      </div>

      {/* 通知・興味タグセクション（全幅） */}
      <NotifySection form={form} set={set} inp={inp} sel={sel} textarea={textarea} showToast={showToast} />

      {/* 保存ボタン */}
      <div style={{display:"flex",gap:12,marginTop:24,borderTop:`1px solid ${C.border}`,paddingTop:20}}>
        <button onClick={handleSave}
          style={{flex:1,background:C.green,color:"#fff",border:"none",borderRadius:10,padding:"14px",fontWeight:700,fontSize:16,cursor:"pointer"}}>
          💾 {isNew ? "制度を追加する" : "変更を保存する"}
        </button>
        <button onClick={onCancel}
          style={{flex:0.4,background:C.bg2,color:C.t2,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px",fontWeight:700,fontSize:15,cursor:"pointer"}}>
          キャンセル
        </button>
      </div>
    </div>
  );
}

function NotifySection({ form, set, inp, sel, textarea, showToast }) {
  const [aiLoading, setAiLoading] = React.useState(false);

  // interestTags 複数タグ管理
  const [newTag, setNewTag] = React.useState({l1:"", l2:"", l3:""});
  const [showAddTag, setShowAddTag] = React.useState(false);
  const currentTags = Array.isArray(form.interestTags) ? form.interestTags
    : (form.interestTags?.l1 ? [form.interestTags] : []);
  const l1List = INTEREST_MASTER.categories.map(c => c.l1);
  const nt_l2List = (INTEREST_MASTER.categories.find(c => c.l1 === newTag.l1)?.children || []).map(c => c.l2);
  const nt_l3List = (INTEREST_MASTER.categories.find(c => c.l1 === newTag.l1)?.children || []).find(c => c.l2 === newTag.l2)?.l3 || [];
  const setNewTagLevel = (level, val) => setNewTag(t => ({...t, [level]: val,
    ...(level==="l1" ? {l2:"",l3:""} : {}), ...(level==="l2" ? {l3:""} : {})}));
  const removeTag = (i) => set("interestTags", currentTags.filter((_,idx) => idx !== i));
  const addNewTag = () => {
    if (!newTag.l1) return;
    set("interestTags", [...currentTags, {...newTag}]);
    setNewTag({l1:"", l2:"", l3:""});
    setShowAddTag(false);
  };

  // AI自動生成
  const generateWithAI = async () => {
    if (!form.title && !form.officialName) { showToast("⚠️ タイトルを入力してください"); return; }
    setAiLoading(true);
    const token = sessionStorage.getItem("mgov_token") || "";
    if (!token) { showToast("⚠️ GitHub Tokenが未設定です"); setAiLoading(false); return; }
    const prompt = `以下の行政制度について、通知・興味タグ情報をJSON形式で返してください。

制度名: ${form.officialName || form.title}
タイトル: ${form.title}
説明: ${form.body}
タグ: ${form.tag}

以下のフィールドをJSONのみで返してください（前後の文章不要）：
{
  "notifyLevel": "high" | "mid" | "low",
  "judgmentType": "eligibility" | "interest",
  "interestTags": [{"l1":"大分類","l2":"中分類","l3":"小分類"}],
  "miniQuizText": "midの場合の質問文（例: 最近お子さんが生まれましたか？🍼）",
  "categoryHint": "通知カテゴリのヒント（例: 子育て・出産）",
  "notifHook": "通知本文（絵文字を含む短いフック文、例: 今年も申請受付中です🏖️）"
}

notifyLevel基準: high=ほぼ全員関係ある制度、mid=プロフィールで絞れる制度、low=ニッチな制度
judgmentType基準: eligibility=年齢・家族構成など属性で決まる、interest=趣味・興味で決まる
interestTagsは配列形式で複数設定可。interest-tags-masterの分類から関連するものをすべて含める（大分類・中分類・小分類）`;

    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key": sessionStorage.getItem("anthropic_key")||""},
        body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:500, messages:[{role:"user",content:prompt}] }),
      });
      const data = await resp.json();
      const text = (data.content||[]).map(b=>b.text).join("").trim();
      const start = text.indexOf("{"); const end = text.lastIndexOf("}");
      if (start < 0) throw new Error("JSONが見つかりません");
      const parsed = JSON.parse(text.slice(start, end+1));
      if (parsed.notifyLevel)   set("notifyLevel",   parsed.notifyLevel);
      if (parsed.judgmentType)  set("judgmentType",  parsed.judgmentType);
      if (parsed.interestTags) {
        const it = parsed.interestTags;
        set("interestTags", Array.isArray(it) ? it : (it.l1 ? [it] : []));
      }
      if (parsed.miniQuizText)  set("miniQuizText",  parsed.miniQuizText);
      if (parsed.categoryHint)  set("categoryHint",  parsed.categoryHint);
      if (parsed.notifHook)     set("notifHook",     parsed.notifHook);
      showToast("✅ AI生成完了！内容を確認してください");
    } catch(e) {
      showToast("❌ AI生成失敗: " + e.message);
    }
    setAiLoading(false);
  };

  const F2 = ({label, children}) => (
    <div style={{marginBottom:14}}>
      <div style={{color:C.t2,fontSize:12,fontWeight:700,marginBottom:4}}>{label}</div>
      {children}
    </div>
  );

  const btnRow = (key, opts, current) => (
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      {opts.map(([val, label]) => (
        <button key={val} onClick={()=>set(key,val)}
          style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${current===val?C.blue:C.border}`,
            background:current===val?C.blue+"22":"none",color:current===val?C.blue:C.t2,
            fontSize:12,fontWeight:current===val?700:400,cursor:"pointer"}}>
          {label}
        </button>
      ))}
    </div>
  );

  return (
    <Section title="🔔 通知・興味タグ設定">
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16}}>
        <button onClick={generateWithAI} disabled={aiLoading}
          style={{background:aiLoading?C.t3:C.purple,color:"#fff",border:"none",borderRadius:8,
            padding:"9px 18px",fontWeight:700,fontSize:13,cursor:aiLoading?"not-allowed":"pointer"}}>
          {aiLoading ? "⏳ 生成中…" : "🤖 AIで自動生成"}
        </button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        {/* 左 */}
        <div>
          <F2 label="notifyLevel（通知優先度）">
            {btnRow("notifyLevel",[["high","🔴 high（全員）"],["mid","🟡 mid（条件次第）"],["low","⚪ low（ニッチ）"]],form.notifyLevel)}
          </F2>
          <F2 label="judgmentType（判定方法）">
            {btnRow("judgmentType",[["eligibility","🎯 eligibility（属性）"],["interest","💡 interest（興味）"]],form.judgmentType)}
          </F2>
          <F2 label="notifHook（通知本文・絵文字で締める）">
            <input value={form.notifHook||""} onChange={e=>set("notifHook",e.target.value)}
              placeholder="例: 今年も申請受付中です🏖️"
              style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",fontSize:13,color:C.t1,outline:"none",background:C.bg1}}/>
          </F2>
          {form.notifyLevel==="mid" && (
            <>
              <F2 label="miniQuizText（midの場合の確認質問）">
                <input value={form.miniQuizText||""} onChange={e=>set("miniQuizText",e.target.value)}
                  placeholder="例: 最近お子さんが生まれましたか？🍼"
                  style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",fontSize:13,color:C.t1,outline:"none",background:C.bg1}}/>
              </F2>
              <F2 label="miniQuizKey（DBキー名）">
                <input value={form.miniQuizKey||""} onChange={e=>set("miniQuizKey",e.target.value)}
                  placeholder="例: hasNewborn"
                  style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",fontSize:13,color:C.t1,outline:"none",background:C.bg1}}/>
              </F2>
              <F2 label="categoryHint（通知カテゴリ表示）">
                <input value={form.categoryHint||""} onChange={e=>set("categoryHint",e.target.value)}
                  placeholder="例: 子育て・出産"
                  style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",fontSize:13,color:C.t1,outline:"none",background:C.bg1}}/>
              </F2>
            </>
          )}
        </div>

        {/* 右：interestTags 複数タグ */}
        <div>
          <F2 label="interestTags（興味タグ・複数設定可）">
            <div style={{background:C.bg2,borderRadius:10,padding:12,border:`1px solid ${C.border}`}}>
              {currentTags.map((t, i) => (
                <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,padding:"6px 10px",background:C.blue+"11",borderRadius:6}}>
                  <span style={{flex:1,fontSize:12,color:C.blue}}>{[t.l1,t.l2,t.l3].filter(Boolean).join(" › ")}</span>
                  <button onClick={()=>removeTag(i)} style={{background:"none",border:"none",cursor:"pointer",color:C.t3,fontSize:14,padding:"0 2px"}}>✕</button>
                </div>
              ))}
              {showAddTag ? (
                <div style={{marginTop:currentTags.length?8:0}}>
                  <div style={{marginBottom:6}}>
                    <div style={{color:C.t3,fontSize:11,marginBottom:3}}>大分類 (l1)</div>
                    <select value={newTag.l1} onChange={e=>setNewTagLevel("l1",e.target.value)}
                      style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,color:C.t1,background:C.bg1,outline:"none"}}>
                      <option value="">— 選択 —</option>
                      {l1List.map(l=><option key={l} value={l}>{l}</option>)}
                    </select>
                  </div>
                  <div style={{marginBottom:6}}>

                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={addNewTag} disabled={!newTag.l1}
                      style={{flex:1,background:newTag.l1?C.blue:"#aaa",color:"#fff",border:"none",borderRadius:6,padding:"7px 0",fontSize:13,fontWeight:700,cursor:newTag.l1?"pointer":"not-allowed"}}>
                      ＋ 追加
                    </button>
                    <button onClick={()=>{setShowAddTag(false);setNewTag({l1:"",l2:"",l3:""});}}
                      style={{flex:1,background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 0",fontSize:13,color:C.t2,cursor:"pointer"}}>
                      キャンセル
                    </button>
                  </div>
                </div>
              ) : (
                <button onClick={()=>setShowAddTag(true)}
                  style={{width:"100%",background:"none",border:`1px dashed ${C.border}`,borderRadius:6,padding:"8px 0",fontSize:13,color:C.t3,cursor:"pointer",marginTop:currentTags.length?8:0}}>
                  ＋ タグを追加
                </button>
              )}
            </div>
          </F2>
        </div>
      </div>
    </Section>
  );
}

// 条件オブジェクト→人間語の表示
function condToLabel(cond) {
  return Object.entries(cond).map(([k, v]) => {
    const def = PROFILE_KEY_DEFS.find(d => d.key === k);
    const label = def ? def.label : k;
    if (k === "_always") return "全員対象";
    if (k === "_alwaysExclude") return "常に非表示";
    if (k === "ageMin") return `${v}歳以上`;
    if (k === "ageMax") return `${v}歳以下`;
    if (k === "ageBetween") return `${v[0]}〜${v[1]}歳`;
    if (typeof v === "string") return `${label}＝${v}`;
    if (Array.isArray(v)) return `${label}＝[${v.join("/")}]`;
    if (v && typeof v === "object" && "not" in v) return `${label}≠${v.not}`;
    if (v && typeof v === "object" && "notIn" in v) return `${label}∉[${v.notIn.join("/")}]`;
    return `${label}:${JSON.stringify(v)}`;
  }).join(" AND ");
}

// ── 1つの条件オブジェクトを編集するコンポーネント ────────
function CondEditor({ cond, onChange, onRemove, mode }) {
  // condのキーを取得（複数キーあり得る）
  const keys = Object.keys(cond);
  const firstKey = keys[0] || "";
  const def = PROFILE_KEY_DEFS.find(d => d.key === firstKey);

  // キー変更
  const handleKeyChange = (newKey) => {
    const newDef = PROFILE_KEY_DEFS.find(d => d.key === newKey);
    let newCond = {};
    if (newKey === "_always")       newCond = { _always: true };
    else if (newKey === "_alwaysExclude") newCond = { _alwaysExclude: true };
    else if (newKey === "ageMin")   newCond = { ageMin: 20 };
    else if (newKey === "ageMax")   newCond = { ageMax: 70 };
    else if (newDef?.type === "multiselect") newCond = { [newKey]: [newDef.opts[0]] };
    else if (newDef?.opts)          newCond = { [newKey]: newDef.opts[0] };
    else                            newCond = { [newKey]: "" };
    onChange(newCond);
  };

  // 値変更（単一値）
  const handleValChange = (val) => {
    onChange({ ...cond, [firstKey]: val });
  };

  // 値変更（配列トグル）
  const handleToggle = (opt) => {
    const cur = cond[firstKey];
    const arr = Array.isArray(cur) ? cur : (cur ? [cur] : []);
    const next = arr.includes(opt) ? arr.filter(x => x !== opt) : [...arr, opt];
    onChange({ ...cond, [firstKey]: next.length === 1 ? next[0] : next });
  };

  // NOT モード
  const isNotSingle = def && !["_always","_alwaysExclude","ageMin","ageMax"].includes(firstKey)
    && cond[firstKey] && typeof cond[firstKey] === "object" && "not" in cond[firstKey];
  const isNotMulti = def && def.type === "multiselect"
    && cond[firstKey] && typeof cond[firstKey] === "object" && "notIn" in cond[firstKey];
  const isNot = isNotSingle || isNotMulti;

  const toggleNot = () => {
    const cur = cond[firstKey];
    if (isNotSingle) {
      // not解除 → 元の値に戻す
      onChange({ ...cond, [firstKey]: cur.not });
    } else if (isNotMulti) {
      // notIn解除 → 配列に戻す
      onChange({ ...cond, [firstKey]: cur.notIn && cur.notIn.length ? cur.notIn : [def.opts[0]] });
    } else if (def?.type === "multiselect") {
      // multiselect → notIn形式へ
      const arr = Array.isArray(cur) ? cur : (cur ? [cur] : []);
      onChange({ ...cond, [firstKey]: { notIn: arr, ifSet: true } });
    } else {
      // 通常 → not形式へ
      onChange({ ...cond, [firstKey]: { not: typeof cur === "string" ? cur : (def?.opts?.[0] || "") } });
    }
  };

  const btnStyle = (active) => ({
    padding:"4px 10px", borderRadius:6, border:`1px solid ${active ? C.blue : C.border}`,
    background: active ? C.blue+"22" : "none", color: active ? C.blue : C.t2,
    fontSize:12, cursor:"pointer", fontWeight: active ? 700 : 400,
  });

  return (
    <div style={{background:C.bg2,borderRadius:10,padding:"10px 12px",marginBottom:6,border:`1px solid ${C.border}`}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        {/* キー選択 */}
        <select
          value={firstKey}
          onChange={e => handleKeyChange(e.target.value)}
          style={{flex:1,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 8px",fontSize:12,color:C.t1,background:C.bg1,outline:"none"}}>
          {PROFILE_KEY_DEFS.map(d => (
            <option key={d.key} value={d.key}>{d.label}</option>
          ))}
        </select>

        {/* NOT トグル（通常キーのみ） */}
        {def && !["_always","_alwaysExclude","ageMin","ageMax"].includes(firstKey) && (
          <button onClick={toggleNot} style={{...btnStyle(isNot),whiteSpace:"nowrap"}}>
            {isNot ? "≠ NOT" : "＝ IS"}
          </button>
        )}

        {/* 削除 */}
        <button onClick={onRemove}
          style={{background:C.red+"11",border:"none",color:C.red,borderRadius:6,padding:"4px 8px",fontSize:13,cursor:"pointer"}}>
          ✕
        </button>
      </div>

      {/* 値UI */}
      {firstKey === "_always" || firstKey === "_alwaysExclude" ? (
        <div style={{color:C.t3,fontSize:11}}>条件なし（常に適用）</div>
      ) : firstKey === "ageMin" || firstKey === "ageMax" ? (
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <input type="number" min={0} max={120}
            value={cond[firstKey] || 0}
            onChange={e => handleValChange(Number(e.target.value))}
            style={{width:80,border:`1px solid ${C.blue}`,borderRadius:6,padding:"4px 8px",fontSize:14,fontWeight:700,color:C.blue,outline:"none",background:C.bg1}}/>
          <span style={{color:C.t2,fontSize:13}}>{firstKey === "ageMin" ? "歳以上" : "歳以下"}</span>
        </div>
      ) : def?.type === "multiselect" ? (
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {def.opts.map(opt => {
            const cur = cond[firstKey];
            const notVal = isNot ? cur?.notIn : null;
            const arr = isNot ? (notVal || []) : (Array.isArray(cur) ? cur : (cur ? [cur] : []));
            const active = arr.includes(opt);
            return (
              <button key={opt}
                onClick={() => {
                  if (isNot) {
                    const ni = arr.includes(opt) ? arr.filter(x=>x!==opt) : [...arr, opt];
                    onChange({...cond, [firstKey]: {notIn: ni, ifSet: true}});
                  } else {
                    handleToggle(opt);
                  }
                }}
                style={{...btnStyle(active),fontSize:11}}>
                {opt}
              </button>
            );
          })}
        </div>
      ) : def?.opts ? (
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {def.opts.map(opt => {
            const cur = isNot ? cond[firstKey]?.not : cond[firstKey];
            return (
              <button key={opt}
                onClick={() => isNot ? onChange({...cond,[firstKey]:{not:opt}}) : handleValChange(opt)}
                style={{...btnStyle(cur === opt),fontSize:11}}>
                {opt}
              </button>
            );
          })}
        </div>
      ) : (
        <input value={cond[firstKey]||""} onChange={e=>handleValChange(e.target.value)}
          style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 8px",fontSize:12,color:C.t1,outline:"none",background:C.bg1}}/>
      )}
    </div>
  );
}

// ── 条件リスト（certain/exclude共通） ─────────────────────
function CondList({ title, color, conds, onChange, hint }) {

  return (

}

// ── missingFor エディタ ────────────────────────────────────

    <div style={{marginBottom:16}}>

// ── excludeReasons / hints エディタ ───────────────────────
function TextMapEditor({ value, onChange, label, placeholder }) {
  const entries = Object.entries(value || {});
  const addEntry = () => onChange({...value, "": ""});
  const updateKey = (oldKey, newKey) => {
    const next = {};
    Object.entries(value||{}).forEach(([k,v]) => { next[k===oldKey?newKey:k] = v; });
    onChange(next);
  };
  const updateVal = (key, val) => onChange({...value, [key]: val});
  const removeEntry = (key) => {
    const next = {...value}; delete next[key]; onChange(next);
  };
  return (
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
        <span style={{fontWeight:700,fontSize:12,color:C.t2}}>{label}</span>
        <button onClick={addEntry}
          style={{background:C.bg2,border:`1px solid ${C.border}`,color:C.t3,borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>
          ＋ 追加

      {entries.map(([k,v]) => (
        <div key={k} style={{display:"flex",gap:6,marginBottom:4,alignItems:"center"}}>
          <select value={k} onChange={e=>updateKey(k,e.target.value)}
            style={{width:140,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 6px",fontSize:11,color:C.t1,background:C.bg1,outline:"none"}}>

              <option key={key} value={key}>{label}</option>
            ))}

            style={{flex:1,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",fontSize:12,color:C.t1,outline:"none",background:C.bg1}}/>

        </div>
      ))}
    </div>
  );
}

function ProfileCheckEditor({ profileCheck, onChange, ctx, showToast }) {
  const [aiIdx, setAiIdx] = useState(-1);
  const list = profileCheck || [];
  // 質問に使えるキー（選択肢を持つもののみ。年齢・_always等は除外）
  const usableDefs = PROFILE_KEY_DEFS.filter(d => Array.isArray(d.opts) && d.opts.length > 0);

  const add = () => onChange([...list, { field:"", type:"select", question:"", options:[], match:[] }]);
  const removeAt = (i) => onChange(list.filter((_, idx) => idx !== i));
  const updateAt = (i, patch) => onChange(list.map((q, idx) => idx === i ? {...q, ...patch} : q));

  const setField = (i, field) => {
    const def = PROFILE_KEY_DEFS.find(d => d.key === field);
    updateAt(i, { field, options: def?.opts || [], match: [] });
  };
  const toggleMatch = (i, opt) => {
    const m = list[i].match || [];
    updateAt(i, { match: m.includes(opt) ? m.filter(x => x !== opt) : [...m, opt] });
  };

  const genQuestion = async (i) => {
    const q = list[i];
    const def = PROFILE_KEY_DEFS.find(d => d.key === q.field);
    if (!q.field) { showToast("⚠️ 先にフィールドを選択してください"); return; }
    setAiIdx(i);
    const prompt = `以下の行政制度について、対象者かどうかを1問で確認するユーザー向け質問文を生成してください。
制度名: ${ctx?.officialName || ctx?.title || ""}
説明: ${ctx?.body || ""}
対象フィールド: ${def?.label || q.field}（選択肢: ${(def?.opts||[]).join("／")}）
対象となる値: ${(q.match||[]).join("／") || "未指定"}
質問は簡潔・日本語・絵文字1つ付き・30文字以内。質問文のみを返してください（引用符・前置き不要）。`;
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key": sessionStorage.getItem("anthropic_key")||""},
        body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:120, messages:[{role:"user",content:prompt}] }),
      });
      const data = await resp.json();
      const text = (data.content||[]).map(b=>b.text).join("").trim().replace(/^["「]|["」]$/g,"");
      if (!text) throw new Error("空の応答");
      updateAt(i, { question: text });
      showToast("✅ 質問文を生成しました");
    } catch(e) {
      showToast("❌ AI生成失敗: " + e.message);
    }
    setAiIdx(-1);
  };

  return (
    <div style={{marginTop:14,borderTop:`1px solid ${C.border}`,paddingTop:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <span style={{color:C.t2,fontWeight:700,fontSize:12}}>🔍 対象確認ミニ質問（profileCheck）</span>
        <button onClick={add}
          style={{background:C.blue+"22",color:C.blue,border:`1px solid ${C.blue}44`,borderRadius:6,
            padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>＋ 質問を追加</button>
      </div>
      <div style={{color:C.t3,fontSize:11,marginBottom:10}}>
        未回答ならアプリ側でミニクイズを出し、一致で「対象確実」・不一致で「対象外」に判定します（最大2問推奨）。
      </div>
      {list.length >= 3 && (
        <div style={{background:"#f0a03018",border:"1px solid #f0a03055",borderRadius:8,padding:"8px 12px",
          color:"#b8740f",fontSize:11,marginBottom:10}}>
          ⚠️ 3問以上にすると確定判定されず「関係あるかも」に固定されます。
        </div>
      )}
      {list.map((q, i) => {
        const def = PROFILE_KEY_DEFS.find(d => d.key === q.field);
        return (
          <div key={i} style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,padding:12,marginBottom:10}}>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <select value={q.field||""} onChange={e=>setField(i, e.target.value)}
                style={{flex:1,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,color:C.t1,background:C.bg1,outline:"none"}}>
                <option value="">— フィールド選択 —</option>
                {usableDefs.map(d => <option key={d.key} value={d.key}>{d.label}（{d.key}）</option>)}
              </select>
              <select value={q.type||"select"} onChange={e=>updateAt(i, {type:e.target.value})}
                style={{width:110,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,color:C.t1,background:C.bg1,outline:"none"}}>
                <option value="select">select</option>
                <option value="yesno">yesno</option>
              </select>
              <button onClick={()=>removeAt(i)}
                style={{background:C.red+"18",color:C.red,border:`1px solid ${C.red}44`,borderRadius:6,padding:"0 10px",fontSize:13,cursor:"pointer"}}>🗑</button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input value={q.question||""} onChange={e=>updateAt(i, {question:e.target.value})}
                placeholder="質問文（例: 保育施設に通わせていますか？🏫）"
                style={{flex:1,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,color:C.t1,background:C.bg1,outline:"none"}}/>
              <button onClick={()=>genQuestion(i)} disabled={aiIdx===i}
                style={{background:aiIdx===i?C.t3:C.purple,color:"#fff",border:"none",borderRadius:6,padding:"0 12px",fontSize:12,fontWeight:700,cursor:aiIdx===i?"not-allowed":"pointer",whiteSpace:"nowrap"}}>
                {aiIdx===i ? "⏳" : "🤖 質問生成"}
              </button>
            </div>
            {def && (
              <div>
                <div style={{color:C.t3,fontSize:11,marginBottom:4}}>対象となる値（match）</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {def.opts.map(opt => {
                    const on = (q.match||[]).includes(opt);
                    return (
                      <button key={opt} onClick={()=>toggleMatch(i, opt)}
                        style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${on?C.green:C.border}`,
                          background:on?C.green+"22":"none",color:on?C.green:C.t2,fontSize:12,fontWeight:on?700:400,cursor:"pointer"}}>
                        {on?"✓ ":""}{opt}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function EligibilityBuilder({ eligibility, onChange, ctx, showToast }) {
  const el = eligibility || { certain:[], exclude:[], matchRules:[], baseScore:0, missingFor:[], excludeReasons:{}, hints:{} };
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [showJson, setShowJson] = useState(false);
  const [jsonText, setJsonText] = useState(JSON.stringify(el, null, 2));
  const [jsonError, setJsonError] = useState("");

  const upd = (key, val) => {
    const next = {...el, [key]: val};
    onChange(next);
    setJsonText(JSON.stringify(next, null, 2));
  };

  const applyJson = () => {
    try {
      const parsed = JSON.parse(jsonText);
      onChange(parsed);
      setJsonError("");
    } catch(e) {
      setJsonError("JSONエラー: " + e.message);
    }
  };

  // 現在の設定のプレビュー
  const certainCount = el.certain?.length || 0;
  const excludeCount = el.exclude?.length || 0;
  const matchCount = el.matchRules?.length || 0;
  const missingCount = el.missingFor?.length || 0;
  const pcCount = el.profileCheck?.length || 0;

  return (
    <div>
      {/* サマリーバッジ */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
        {[
          [certainCount, "✅ 確実条件", C.green],
          [excludeCount, "❌ 除外条件", C.red],
          [matchCount,   "🎯 スコアルール", C.purple],
          [missingCount, "❓ ミニクイズ", C.blue],
          [pcCount,      "🔍 対象確認", C.orange||"#f0a030"],
        ].map(([n, label, color]) => (
          <span key={label} style={{background:color+"15",color,border:`1px solid ${color}33`,
            borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:700}}>
            {label} {n}件
          </span>
        ))}
      </div>

      {/* ✅ certain */}
      <CondList
        title="✅ 確実対象（certain）"
        color={C.green}
        hint="全条件をANDで満たしたら「対象確実」"
        conds={el.certain || []}
        onChange={v => upd("certain", v)}
      />

      {/* ❌ exclude */}
      <CondList
        title="❌ 除外条件（exclude）"
        color={C.red}
        hint="1つでも該当したら非表示"
        conds={el.exclude || []}
        onChange={v => upd("exclude", v)}
      />

      {/* 🎯 matchRules */}
      <MatchRulesEditor
        rules={el.matchRules || []}
        onChange={v => upd("matchRules", v)}
      />

      {/* ベーススコア */}
      <BaseScoreEditor value={el.baseScore||0} onChange={v => upd("baseScore", v)} />

      {/* ❓ missingFor */}
      <MissingForEditor
        missingFor={el.missingFor||[]}
        onChange={v => upd("missingFor", v)}
      />

      {/* 🔍 profileCheck（対象確認ミニ質問） */}
      <ProfileCheckEditor
        profileCheck={el.profileCheck||[]}
        onChange={v => upd("profileCheck", v.length ? v : undefined)}
        ctx={ctx}
        showToast={showToast}
      />

      {/* 詳細（excludeReasons / hints）アコーディオン */}
      <div
        style={{borderTop:`1px solid ${C.border}`,paddingTop:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}
        onClick={()=>setShowAdvanced(s=>!s)}>
        <span style={{color:C.t2,fontWeight:700,fontSize:12}}>⚙️ 詳細設定（対象外メッセージ・ヒント）</span>
        <span style={{color:C.t3,fontSize:16,transform:showAdvanced?"rotate(90deg)":"none",display:"inline-block",transition:"transform .2s"}}>›</span>
      </div>
      {showAdvanced && (
        <div style={{marginTop:12}}>
          <TextMapEditor
            value={el.excludeReasons||{}}
            onChange={v => upd("excludeReasons", v)}
            label="対象外メッセージ（excludeReasons）"
            placeholder="例: お子さんがいない場合は対象外です"
          />
          <TextMapEditor
            value={el.hints||{}}
            onChange={v => upd("hints", v)}
            label="将来対象ヒント（hints）"
            placeholder="例: 就職すると対象になります"
          />
        </div>
      )}

      {/* JSON直接編集（上級者向け） */}
      <div style={{marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}
          onClick={()=>setShowJson(s=>!s)}>
          <span style={{color:C.t3,fontSize:11}}>🔧 JSON直接編集（上級者向け）</span>
          <span style={{color:C.t3,fontSize:14,transform:showJson?"rotate(90deg)":"none",display:"inline-block",transition:"transform .2s"}}>›</span>
        </div>
        {showJson && (
          <div style={{marginTop:8}}>
            <textarea value={jsonText} onChange={e=>setJsonText(e.target.value)} rows={10}
              style={{width:"100%",border:`1px solid ${jsonError?C.red:C.border}`,borderRadius:8,
                      padding:"8px 10px",fontSize:11,color:"#eeeeff",background:"#1a2332",
                      outline:"none",resize:"vertical",fontFamily:"monospace",lineHeight:1.6}}/>
            {jsonError && <div style={{color:C.red,fontSize:11,marginTop:4}}>{jsonError}</div>}
            <button onClick={applyJson}
              style={{marginTop:6,width:"100%",background:C.purple+"22",color:C.purple,
                      border:`1px solid ${C.purple}44`,borderRadius:6,padding:"7px",
                      fontWeight:700,fontSize:12,cursor:"pointer"}}>
              JSON を反映する
            </button>
          </div>
        )}
      </div>
    </div>
  );
}



/* ── 給付金額ルールエディター ── */
function SubsidyRulesEditor({rules, labelRules, onChange}) {
  const [localRules, setLocalRules] = useState(rules);
  const [localLabels, setLocalLabels] = useState(labelRules);

  const update = (r, l) => { setLocalRules(r); setLocalLabels(l); onChange(r, l); };

  const addRule = () => {
    const r = [...localRules, {"if":{"hasKids":"いる（または予定あり）"}, amount:0}];
    const l = [...localLabels, {"if":{"hasKids":"いる（または予定あり）"}, label:""}];
    update(r, l);
  };

  const removeRule = (i) => {
    update(localRules.filter((_,j)=>j!==i), localLabels.filter((_,j)=>j!==i));
  };

  const updateAmount = (i, v) => {
    const r = localRules.map((x,j)=>j===i?{...x,amount:Number(v)}:x);
    update(r, localLabels);
  };

  const updateLabel = (i, v) => {
    const l = localLabels.map((x,j)=>j===i?{...x,label:v||null}:x);
    update(localRules, l);
  };

  return (
    <div>
      {localRules.map((rule, i) => {
        const label = localLabels[i];
        const isDefault = !!rule.default;
        return (
          <div key={i} style={{background:C.bg2,borderRadius:8,padding:12,marginBottom:8,border:`1px solid ${C.border}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{color:C.t3,fontSize:12,fontWeight:700}}>{isDefault ? "デフォルト" : `条件 ${i+1}`}</span>
              {!isDefault && <button onClick={()=>removeRule(i)} style={{background:C.red+"11",color:C.red,border:"none",borderRadius:6,padding:"2px 8px",fontSize:12,cursor:"pointer"}}>削除</button>}
            </div>
            {!isDefault && (
              <div style={{color:C.t3,fontSize:11,marginBottom:6}}>
                条件キー: <code style={{background:C.bg1,padding:"1px 4px",borderRadius:4}}>{JSON.stringify(rule["if"]||{})}</code>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div>
                <div style={{color:C.t3,fontSize:11,marginBottom:4}}>金額（円）</div>
                <input type="number" value={rule.amount||0} onChange={e=>updateAmount(i,e.target.value)}
                  style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 8px",fontSize:13,outline:"none",background:C.bg1}}/>
              </div>
              <div>
                <div style={{color:C.t3,fontSize:11,marginBottom:4}}>ラベル</div>
                <input type="text" value={label?.label||""} onChange={e=>updateLabel(i,e.target.value)}
                  placeholder="例: 年約12万円〜"
                  style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 8px",fontSize:13,outline:"none",background:C.bg1}}/>
              </div>
            </div>
          </div>
        );
      })}
      <button onClick={addRule}
        style={{width:"100%",background:"none",border:`1px dashed ${C.border}`,borderRadius:8,padding:"8px",color:C.t3,fontSize:13,cursor:"pointer"}}>
        ＋ 条件ルールを追加
      </button>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   プロフィール拡張提案タブ（crawlerが付与した suggestedKeys を一覧）
   ════════════════════════════════════════════════════════ */
function ProposalsTab({ drafts, loading, onReload, showToast }) {
  const LS_KEY = "mgov_proposal_decisions";
  const [decisions, setDecisions] = useState(() => {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch(e) { return {}; }
  });
  const persist = (next) => {
    setDecisions(next);
    try { localStorage.setItem(LS_KEY, JSON.stringify(next)); } catch(e) {}
  };
  const decide = (pid, val) => persist({ ...decisions, [pid]: val });

  // drafts.json の各草稿に付いた suggestedKeys を集約
  const proposals = [];
  (drafts || []).forEach((d) => {
    (d.suggestedKeys || []).forEach((sk, i) => {
      proposals.push({
        pid: `${d.id || d._source || "draft"}:${sk.key}:${i}`,
        key: sk.key,
        reason: sk.reason || "",
        affectedItem: sk.affectedItem || d.id || "",
        warning: d.adminWarning || "",
      });
    });
  });
  const pending = proposals.filter(p => !decisions[p.pid]);
  const handled = proposals.filter(p => decisions[p.pid]);

  const Card = ({ p, done }) => (
    <div style={{background:C.bg1,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
        <span style={{background:C.purple+"22",color:C.purple,borderRadius:6,padding:"2px 10px",fontSize:13,fontWeight:700,fontFamily:"monospace"}}>{p.key}</span>
        {p.affectedItem && <span style={{background:C.bg2,color:C.t3,borderRadius:6,padding:"2px 8px",fontSize:11}}>影響制度: {p.affectedItem}</span>}
        {done && <span style={{color:done==="accepted"?C.green:C.red,fontSize:12,fontWeight:700}}>{done==="accepted"?"✅ 採用":"🚫 却下"}</span>}
      </div>
      <div style={{color:C.t2,fontSize:13,lineHeight:1.6,marginBottom:done?0:10}}>{p.reason}</div>
      {!done && (
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{decide(p.pid,"accepted");showToast("採用としてマーク（index.html の UNIFIED_GROUPS へ追加を検討してください）");}}
            style={{background:C.green+"22",color:C.green,border:`1px solid ${C.green}44`,borderRadius:8,padding:"6px 14px",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            採用してUNIFIED_GROUPSに追加
          </button>
          <button onClick={()=>decide(p.pid,"rejected")}
            style={{background:C.red+"11",color:C.red,border:`1px solid ${C.red}33`,borderRadius:8,padding:"6px 14px",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            却下
          </button>
        </div>
      )}
      {done && (
        <button onClick={()=>{const n={...decisions};delete n[p.pid];persist(n);}}
          style={{marginTop:8,background:"none",color:C.t3,border:`1px solid ${C.border}`,borderRadius:8,padding:"4px 12px",fontSize:12,cursor:"pointer"}}>
          ↩ 取り消す
        </button>
      )}
    </div>
  );

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{color:C.t1,fontWeight:700,fontSize:18}}>🧩 プロフィール拡張提案</div>
          <div style={{color:C.t3,fontSize:12,marginTop:2}}>
            収集AIが既存プロフィールキーで表現できない条件を検出した提案です（crawlerの suggestedKeys）。
          </div>
        </div>
        <button onClick={onReload} disabled={loading}
          style={{background:C.blue+"22",color:C.blue,border:`1px solid ${C.blue}44`,borderRadius:8,padding:"8px 14px",fontWeight:700,fontSize:13,cursor:loading?"not-allowed":"pointer"}}>
          {loading?"⏳ 読込中…":"🔄 再読込"}
        </button>
      </div>

      {loading ? (
        <div style={{color:C.t2,fontSize:13}}>drafts.json を読み込み中…</div>
      ) : proposals.length === 0 ? (
        <div style={{background:C.bg1,border:`1px dashed ${C.border}`,borderRadius:12,padding:"32px 16px",textAlign:"center",color:C.t3,fontSize:13}}>
          未対応の拡張提案はありません。<br/>新しい制度収集時に未定義キーが見つかると、ここに表示されます。
        </div>
      ) : (
        <>
          {pending.length > 0 && (
            <div style={{marginBottom:20}}>
              <div style={{color:C.t2,fontWeight:700,fontSize:13,marginBottom:8}}>未対応（{pending.length}）</div>
              {pending.map(p => <Card key={p.pid} p={p} />)}
            </div>
          )}
          {handled.length > 0 && (
            <div>
              <div style={{color:C.t3,fontWeight:700,fontSize:13,marginBottom:8}}>対応済み（{handled.length}）</div>
              {handled.map(p => <Card key={p.pid} p={p} done={decisions[p.pid]} />)}
            </div>
          )}
        </>
      )}
    </div>
  );
}
