        </button>
      </div>
      {detail&&<DetailModal item={detail} onClose={()=>setDetail(null)} liveData={null} conf={getConfidence(detail,profile)} profile={profile} setProfile={()=>{}} onHide={()=>{}} liked={[]} reminded={[]} onLike={()=>{}} onRemind={()=>{}} done={[]} onDone={()=>{}} easy={false}/>}
    </div>
  );
}


function BottomNav({tab,setTab,notifCount,festivalCount}){
  const tabs=[
    {id:"home",    icon:"🏠", label:"ホーム"},
    {id:"consult", icon:"💬", label:"相談"},
    {id:"notif",   icon:"🔔", label:"通知", badge:notifCount},
    {id:"festival",icon:"🎪", label:"お祭り", badge:festivalCount},
    {id:"profile", icon:"👤", label:"プロフィール"},
  ];
  return (
    <div style={{
      display:"flex",
      background:C.bg1,
      borderTop:`1px solid ${C.border}`,
      flexShrink:0,
      paddingBottom:"env(safe-area-inset-bottom, 16px)",
    }}>
      {tabs.map(t=>(
        <button key={t.id}
          style={{flex:1,background:"none",border:"none",padding:"10px 0 4px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative",WebkitTapHighlightColor:"transparent"}}
          onClick={()=>setTab(t.id)}>
          <div style={{fontSize:22,opacity:tab===t.id?1:.45,transition:"opacity .15s"}}>{t.icon}</div>
          <div style={{color:tab===t.id?C.blue:C.t3,fontSize:9,fontWeight:tab===t.id?700:400,letterSpacing:.3}}>{t.label}</div>
          {t.badge>0&&<div style={{position:"absolute",top:6,right:"50%",transform:"translateX(60%)",background:C.red,color:"#fff",borderRadius:10,fontSize:9,padding:"1px 5px",fontWeight:700,minWidth:16,textAlign:"center"}}>{t.badge}</div>}
          {tab===t.id&&<div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:20,height:2,background:C.blue,borderRadius:1}}/>}
        </button>
      ))}
    </div>
  );
}

/* ─── App ─── */
function App(){
  const [phase,setPhase]=useState("splash");
  const [profile,setProfile]=useState({});
  const [tab,setTab]=useState("home");
  const [easy,setEasy]=useState(false);
  const [darkMode,setDarkMode]=useState(false);
  const [,forceUpdate]=useState(0);

  // CをdarkModeに応じて更新（全コンポーネントに即反映）
  Object.assign(C, darkMode ? THEMES.dark : THEMES.light);

  // body背景を動的に変更
  if(typeof document !== "undefined") document.body.style.background = C.bg0;

  const toggleDark=(v)=>{setDarkMode(v);forceUpdate(n=>n+1);};
  const [liked,setLiked]=useState([]);
  const [reminded,setReminded]=useState([]);
  const [done,setDone]=useState([]); // 申請済・利用済
  const [hidden,setHidden]=useState([]);
  const [toast,setToast]=useState({msg:"",visible:false});
  const [festivalSettings,setFestivalSettings]=useState(null);
  const [festivalNotified,setFestivalNotified]=useState([]);
  const [dynamicItems,setDynamicItems]=useState([]);
  const [showAdmin,setShowAdmin]=useState(false);
  const allItems=[...ITEMS_BASE,...dynamicItems];
  const [liveData,setLiveData]=useState({});
  const [updating,setUpdating]=useState(false);
  const [updateProgress,setUpdateProgress]=useState(0);

  const showToast=(msg)=>{
    setToast({msg,visible:true});
    setTimeout(()=>setToast({msg:"",visible:false}),2200);
  };

  const [revealMode, setRevealMode] = useState(false);
  const [showTutorial, setShowTutorial] = useState(false);

  const handleQuizDone=(ans)=>{
    setProfile(ans);
    setFestivalSettings({
      coords:ans.festivalCoords||null,
      town:ans.festivalTown||{name:ans.town||"麻布十番"},
      radius:3000,
      fireworksRadius:5000,
    });
    setPhase("reveal");
  };

  const handleRevealEnter=()=>{
    setRevealMode(true);
    setPhase("main");
    setTimeout(()=>setShowTutorial(true), 900); // カード降下完了後に表示
  };

  const handleUpdate=async()=>{
    setUpdating(true);
    setUpdateProgress(0);
    const result={};
    for(let i=0;i<allItems.length;i++){
      const item=allItems[i];
      try {
        const data=await fetchLiveInfo(item);
        result[item.id]=data;
      } catch(e){
        result[item.id]={amount:"取得失敗",conditions:"—",deadline:"—",changes:"—",sourceNote:"—",fetchedAt:new Date().toLocaleDateString("ja-JP")};
      }
      setUpdateProgress(i+1);
      setLiveData({...result});
    }
    setUpdating(false);
    showToast(`✅ ${allItems.length}件の最新情報を取得しました`);
  };

  const handleChangeRadius=(key,val)=>{
    setFestivalSettings(prev=>({...prev,[key]:val}));
  };

  return (
    <div style={{
      position:"fixed", inset:0,
      background:C.bg0,
      display:"flex", alignItems:"center", justifyContent:"center",
    }}>
      <div style={{
        width:"100%", maxWidth:430,
        height:"100%",
        background:C.bg1,
        display:"flex", flexDirection:"column",
        overflow:"hidden", position:"relative",
      }}>
        {phase==="splash"&&<Splash onDone={()=>setPhase("preview")}/>}
        {phase==="preview"&&<PreviewHome items={allItems} onStart={()=>setPhase("quiz")}/>}
        {phase==="quiz"&&<Quiz onDone={handleQuizDone}/>}
        {phase==="reveal"&&<RevealScreen profile={profile} items={allItems} onEnter={handleRevealEnter} done={done} hidden={hidden}/>}
        {phase==="main"&&
          <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0,overflow:"hidden"}}>
            {/* Header */}
            <div style={{padding:"52px 16px 6px",borderBottom:`1px solid ${C.border}`,flexShrink:0,background:C.bg1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{color:C.t1,fontWeight:700,fontSize:13}}>🏙️ 君の代わりに全部やってあげるよアプリ</div>
                  <div style={{color:C.t3,fontSize:10,marginTop:1}}>{profile.town||""}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:9,color:easy?C.t3:C.blue,fontWeight:600}}>行政用語</span>
                  <div onClick={()=>setEasy(e=>!e)} style={{width:36,height:20,borderRadius:10,background:easy?C.green:C.t3,cursor:"pointer",position:"relative",transition:"background .25s",flexShrink:0}}>
                    <div style={{position:"absolute",top:2,left:easy?18:2,width:16,height:16,borderRadius:8,background:"#fff",transition:"left .25s"}}/>
                  </div>
                  <span style={{fontSize:9,color:easy?C.green:C.t3,fontWeight:600}}>かんたん</span>
                </div>
              </div>
            </div>

            {/* Tab content */}
            {tab==="home"&&<Home profile={profile} setProfile={setProfile} liked={liked} reminded={reminded} hidden={hidden}
              onLike={(id)=>{setLiked(l=>l.includes(id)?l.filter(x=>x!==id):[...l,id]);showToast(liked.includes(id)?"いいね解除":"❤️ いいね！");}}
              onRemind={(id)=>{setReminded(r=>r.includes(id)?r.filter(x=>x!==id):[...r,id]);showToast(reminded.includes(id)?"リマインド解除":"🔔 リマインドしました");}}
              onHide={(id)=>{setHidden(h=>[...h,id]);showToast("非表示にしました");}}
              done={done}
              onDone={(id,action)=>{
                if(action==="undo"){
                  setDone(d=>d.filter(x=>x!==id));
                  setHidden(h=>h.filter(x=>x!==id));
                  showToast("申請済みを取消しました");
                } else if(action==="done"){
                  setDone(d=>d.includes(id)?d:[...d,id]);
                  if(!REPEATABLE_IDS.has(id)) setHidden(h=>h.includes(id)?h:[...h,id]);
                  showToast("✅ 申請済みとして記録しました");
                }
              }}
              items={allItems} liveData={liveData} easy={easy}
              revealMode={revealMode}
              onUpdate={handleUpdate} updating={updating} updateProgress={updateProgress}
              onGoProfile={()=>setTab("profile")}
            />}
            {tab==="consult"&&<ConsultTab profile={profile}/>}
            {tab==="notif"&&<NotifTab liked={liked} reminded={reminded}
              onLike={(id)=>{setLiked(l=>l.includes(id)?l.filter(x=>x!==id):[...l,id]);showToast(liked.includes(id)?"いいね解除":"❤️ いいね！");}}
              onRemind={(id)=>{setReminded(r=>r.includes(id)?r.filter(x=>x!==id):[...r,id]);showToast(reminded.includes(id)?"リマインド解除":"🔔 リマインドしました");}}
              items={allItems} liveData={liveData} profile={profile} setProfile={setProfile}
              onHide={(id)=>{setHidden(h=>[...h,id]);showToast("非表示にしました");}}
              done={done}
              onUndone={(id)=>{setDone(d=>d.filter(x=>x!==id));setHidden(h=>h.filter(x=>x!==id));}}
              onDone={(id,action)=>{
                if(action==="undo"){
                  setDone(d=>d.filter(x=>x!==id));
                  setHidden(h=>h.filter(x=>x!==id));
                  showToast("申請済みを取消しました");
                } else if(action==="keep"){
                } else{
                  setDone(d=>d.includes(id)?d:[...d,id]);
                  if(!REPEATABLE_IDS.has(id)) setHidden(h=>h.includes(id)?h:[...h,id]);
                  showToast("✅ 申請済みとして記録しました");
                }
              }}/>}
            {tab==="festival"&&<FestivalTab festivalSettings={festivalSettings} onChangeRadius={handleChangeRadius}
              festivalNotified={festivalNotified} onToggleNotify={(id)=>setFestivalNotified(n=>n.includes(id)?n.filter(x=>x!==id):[...n,id])}/>}
            {tab==="profile"&&<ProfileTab profile={profile} setProfile={setProfile}
              hidden={hidden} done={done} allItems={allItems}
              onRestoreAll={()=>{setHidden([]);showToast("✅ 全件復元しました");}}
              onRestoreOne={(id)=>{setHidden(h=>h.filter(x=>x!==id));showToast("✅ 復元しました");}}
              onShowAdmin={()=>setShowAdmin(true)}
              onResetQuiz={()=>{setProfile({});setLiked([]);setReminded([]);setHidden([]);setPhase("quiz");}}
              darkMode={darkMode} setDarkMode={toggleDark}/>}

            {/* 管理モーダル */}
            {showAdmin&&(
              <div style={{position:"absolute",inset:0,background:C.bg1,zIndex:160,display:"flex",flexDirection:"column"}}>
                <div style={{padding:"16px 20px 8px",borderBottom:`1px solid ${C.border}`,flexShrink:0,display:"flex",alignItems:"center",gap:12}}>
                  <button style={{background:"none",border:"none",color:C.blue,fontSize:14,cursor:"pointer"}} onClick={()=>setShowAdmin(false)}>← 戻る</button>
                  <span style={{color:C.t1,fontWeight:700,fontSize:15}}>制度を追加</span>
                </div>
                <AdminTab
                  onAddItem={(item)=>{setDynamicItems(d=>[...d,item]);showToast(`✅「${item.title}」を追加しました`);}}
                  existingIds={allItems.map(it=>it.id)}
                />
              </div>
            )}

            <BottomNav tab={tab} setTab={setTab}
              notifCount={liked.length+reminded.length} festivalCount={festivalNotified.length}/>
            <Toast msg={toast.msg} visible={toast.visible}/>

            {/* チュートリアル：かんたん/行政モード体験 */}
            {showTutorial&&(
              <TutorialOverlay
                onSwitch={(isEasy)=>setEasy(isEasy)}
                onClose={()=>setShowTutorial(false)}
                item={allItems.find(it=>it.officialBody)||allItems[0]}
              />
            )}
          </div>
        }
      </div>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
