/* ─── App ─── */
function App(){
  // phaseをlocalStorageから復元（mainだった場合はmainから再開）
  const [phase,setPhase]=useState("loading");
  const [dbLoaded,setDbLoaded]=useState(false);
  const [dbError,setDbError]=useState(false);
  const [profile,setProfile]=useState(()=>lsLoad(LS_PROFILE,{}));
  const [tab,setTab]=useState("home");
  const [easy,setEasy]=useState(()=>lsLoad("mgov_easy",false));
  const [darkMode,setDarkMode]=useState(()=>lsLoad("mgov_dark",false));
  const [,forceUpdate]=useState(0);

  // CをdarkModeに応じて更新（全コンポーネントに即反映）
  Object.assign(C, darkMode ? THEMES.dark : THEMES.light);

  // body背景を動的に変更
  if(typeof document !== "undefined") document.body.style.background = C.bg0;

  // ── items-db.json を起動時に読み込む ──
  const [newItems, setNewItems] = useState([]);
  const [showNewPop, setShowNewPop] = useState(false);
  const [dbUpdatedAt, setDbUpdatedAt] = useState("");
  const [showSeasonal, setShowSeasonal] = useState(false);
  const [dueRecheck, setDueRecheck] = useState(null);
  const [interestAsk, setInterestAsk] = useState(null); // 興味ヒアリングのポップ（{l1,l2} or null）

  // 興味ヒアリング：1セッション1問、未取得の中分類を聞く（オンボーディングでは聞かない）
  useEffect(()=>{
    if(!dbLoaded || phase!=="main") return;
    if(sessionStorage.getItem("mgov_interest_session")) return; // 今セッションは確認済み
    if(showSeasonal || dueRecheck || showNewPop) return;        // 他のポップ優先
    const q=pickInterestQuestion(ITEMS_BASE, profile);
    if(!q) return;
    const t=setTimeout(()=>{ setInterestAsk(q); }, 1600);
    return ()=>clearTimeout(t);
  },[dbLoaded, phase, showSeasonal, dueRecheck, showNewPop, profile.interestScores]);

  const answerInterest=(yes)=>{
    if(interestAsk){
      const {l1,l2}=interestAsk;
      const k2="l2:"+l2, k1="l1:"+l1;
      if(yes){
        setProfile(p=>{ const prefs={...(p.interestPrefs||{}), [k2]:1, [k1]:1};
          return {...p, interestPrefs:prefs, interestScores:{...(p.interestScores||{}), ...prefs}}; });
      }else{
        setProfile(p=>({...p, interestDismissed:[...new Set([...(p.interestDismissed||[]), k2])]}));
      }
    }
    sessionStorage.setItem("mgov_interest_session","1");
    setInterestAsk(null);
  };

  useEffect(()=>{
    loadItemsDB().then(result=>{
      setDbLoaded(true);
      if(!result.ok) setDbError(true);
      if (result.updatedAt) setDbUpdatedAt(result.updatedAt);
      if (NEW_ITEMS_SINCE_LAST.length > 0) {
        setNewItems(NEW_ITEMS_SINCE_LAST);
        setShowNewPop(true);
      }
      // プロフィールが保存済みならmainから再開、なければsplash
      const savedPhase = lsLoad(LS_PHASE, null);
      const savedProfile = lsLoad(LS_PROFILE, {});
      const hasProfile = savedPhase === "main" && Object.keys(savedProfile).length > 0;
      setPhase(hasProfile ? "main" : "splash");
      if (hasProfile) {
        setTab("home");
        // 中間状態の再確認：期限が来ていれば最優先で出す
        const due = getDueRecheck();
        if (due) {
          setTimeout(()=>setDueRecheck(due), 800);
        } else if (shouldShowSeasonal() && NEW_ITEMS_SINCE_LAST.length === 0) {
          // 季節の確認ポップ：四半期ごとに1回・新着ポップが無いときだけ
          setTimeout(()=>setShowSeasonal(true), 800);
        }
      }
    });
  },[]);

  // digest通知タップ（?notif_digest=1）→ ホームへ誘導。「該当するかも」の給付をクイズで確認できる。
  useEffect(()=>{
    try{
      const params=new URLSearchParams(window.location.search);
      if(params.get("notif_digest")==="1"){
        setTab("home");
        setTimeout(()=>{ if(typeof showToast==="function") showToast("🆕 新着の給付があります。「該当するかも」をタップして確認しましょう"); },900);
        params.delete("notif_digest");
        const q=params.toString();
        window.history.replaceState({},"",window.location.pathname+(q?`?${q}`:""));
      }
    }catch(e){}
  },[]);

  // 新着を既読にする
  const markNewItemsRead = () => {
    const allIds = ITEMS_BASE.map(it => it.id);
    localStorage.setItem(LS_SEEN_IDS, JSON.stringify(allIds));
    localStorage.setItem(LS_LAST_SEEN_AT, dbUpdatedAt);
    // IndexedDB にも保存（Service Worker と共有）
    if (window.saveSeenToIDB) window.saveSeenToIDB(allIds, dbUpdatedAt);
    setShowNewPop(false);
    setNewItems([]);
  };

  const toggleDark=(v)=>{setDarkMode(v);lsSave("mgov_dark",v);forceUpdate(n=>n+1);};
  const [liked,setLiked]=useState(()=>lsLoad(LS_LIKED,[]));
  const [reminded,setReminded]=useState(()=>lsLoad(LS_REMINDED,[]));
  const [done,setDone]=useState(()=>lsLoad(LS_DONE,[]));
  const [hidden,setHidden]=useState(()=>lsLoad(LS_HIDDEN,[]));
  const [toast,setToast]=useState({msg:"",visible:false});
  // festivalSettings: リロード後もプロフィールから復元する
  const [festivalSettings,setFestivalSettings]=useState(()=>{
    const p=lsLoad(LS_PROFILE,{});
    const savedPhase=lsLoad(LS_PHASE,null);
    if(savedPhase!=="main") return null;
    if(!p.festivalCoords&&!p.coords) return null;
    return {
      coords: p.festivalCoords||p.coords||null,
      town:   p.festivalTown||{name:p.town||"麻布十番"},
      radius:         lsLoad("mgov_festival_radius",3000),
      fireworksRadius:lsLoad("mgov_festival_fw_radius",5000),
    };
  });
  const [festivalNotified,setFestivalNotified]=useState(()=>lsLoad("mgov_festival_notified",[]));
  const [dynamicItems,setDynamicItems]=useState([]);
  const [showAdmin,setShowAdmin]=useState(false);
  const allItems=[...ITEMS_BASE,...dynamicItems];
  const [liveData,setLiveData]=useState({});
  const [updating,setUpdating]=useState(false);
  const [updateProgress,setUpdateProgress]=useState(0);

  const showToast=(msg)=>{
    setToast({msg,visible:true});
    setTimeout(()=>setToast({msg:"",visible:false}),2200);
  };

  // ── SW からの通知起動メッセージを受け取る ──
  useEffect(()=>{
    const handler = (e) => {
      if (e.data?.type === "NOTIF_OPEN") {
        const { itemId, notifyLevel, miniQuizKey } = e.data;
        const item = (ITEMS_BASE||[]).find(it => it.id === itemId);
        if (!item) return;
        const miniQuizText = item.miniQuizText || "";
        // dbLoaded後に処理するため少し待つ
        setTimeout(() => {
          setNotifLaunch({ itemId, notifyLevel, miniQuizKey, miniQuizText, item });
        }, 800);
      }
    };
    navigator.serviceWorker?.addEventListener("message", handler);
    return () => navigator.serviceWorker?.removeEventListener("message", handler);
  }, []);
  // ── birthday → ageNum、kids[] → kidsAge（最年少帯）を自動同期 ──
  function syncDerivedProfile(p){
    const next={...p};
    // 本人の年齢：birthday があれば自動算出して ageNum に反映
    const a=ageFromBirthday(p.birthday);
    if(a!==null) next.ageNum=a;
    // 子の最年少年齢帯：kids[] があれば自動算出
    if(Array.isArray(p.kids)&&p.kids.length){
      const ages=p.kids.map(k=>ageFromBirthday(`${k.birthYear}-${k.birthMonth||1}`)).filter(x=>x!==null);
      if(ages.length){
        const min=Math.min(...ages);
        next.kidsAge = min<=2?"0〜2歳":min<=5?"3〜5歳":min<=12?"6〜12歳":min<=15?"13〜15歳":"16〜18歳";
        if(!p.hasKids) next.hasKids="いる（または予定あり）";
      }
    }
    // ペット種別に「犬」が含まれれば hasDog=true に同期（旧フィールド互換）
    if(Array.isArray(p.petType)&&p.petType.includes("犬")) next.hasDog="true";
    return next;
  }
  useEffect(()=>{
    const synced=syncDerivedProfile(profile);
    // 算出値が変わったら profile を更新（無限ループ防止のため差分チェック）
    if(synced.ageNum!==profile.ageNum || synced.kidsAge!==profile.kidsAge || synced.hasKids!==profile.hasKids || synced.hasDog!==profile.hasDog){
      setProfile(synced); return;
    }
    lsSave(LS_PROFILE, profile);
    if (window.saveProfileToIDB) window.saveProfileToIDB(profile);
    // 中間状態（申請中・購入予定）があれば再確認予定を登録
    registerRechecks(profile);
  },[profile]);
  // ライフステージ変更時に push-worker KV を更新（Cron送信時刻に反映）
  useEffect(()=>{
    if (profile.stage && typeof Notification !== "undefined" && Notification.permission === "granted") {
      updatePushStage(profile.stage);
    }
  },[profile.stage]);
  useEffect(()=>{ lsSave(LS_LIKED, liked); },[liked]);
  useEffect(()=>{ lsSave(LS_REMINDED, reminded); },[reminded]);
  useEffect(()=>{ lsSave(LS_DONE, done); },[done]);
  // liked/done 変化 → interestScores 再計算（明示的な興味回答 interestPrefs を上書きマージ）
  useEffect(()=>{
    if (!dbLoaded) return;
    const scores = calcInterestScores(liked, done, ITEMS_BASE);
    setProfile(p => ({...p, interestScores: {...scores, ...(p.interestPrefs||{})}}));
  },[liked, done, dbLoaded]);
  useEffect(()=>{ lsSave(LS_HIDDEN, hidden); },[hidden]);
  useEffect(()=>{ lsSave("mgov_festival_notified", festivalNotified); },[festivalNotified]);
  useEffect(()=>{ lsSave("mgov_easy", easy); },[easy]);
  useEffect(()=>{ if(phase==="main") lsSave(LS_PHASE,"main"); },[phase]);

  const [revealMode, setRevealMode] = useState(false);
  const [notifModal, setNotifModal] = useState(null); // null | "reveal" | "remind" | "notif"
  const [notifLaunch, setNotifLaunch] = useState(null);
  const [notifDetail, setNotifDetail] = useState(null); // 通知から直接開くDetailModal用
  const [toggleTried, setToggleTried] = useState(
    () => !!localStorage.getItem("mgov_toggle_tried")
  );

  const headerRef = React.useRef(null);
  const toggleRef = React.useRef(null);
  const [toggleOffset, setToggleOffset] = React.useState(0);

  React.useEffect(() => {
    if (!toggleTried && revealMode && headerRef.current && toggleRef.current) {
      const headerRect = headerRef.current.getBoundingClientRect();
      const toggleRect = toggleRef.current.getBoundingClientRect();
      const headerCenter = headerRect.left + headerRect.width / 2;
      const toggleCenter = toggleRect.left + toggleRect.width / 2;
      setToggleOffset(headerCenter - toggleCenter);
    } else {
      setToggleOffset(0);
    }
  }, [toggleTried, revealMode]);

  const handleToggleEasy = () => {
    setEasy(e => !e);
    if (!toggleTried) {
      setToggleTried(true);
      localStorage.setItem("mgov_toggle_tried", "1");
    }
  };

  const shouldShowNotifModal = () =>
    typeof Notification !== "undefined" &&
    Notification.permission === "default" &&
    !localStorage.getItem("mgov_notif_deferred");

  const handleSetTab = (t) => {
    setTab(t);
    if (t === "notif" && shouldShowNotifModal()) {
      localStorage.setItem("mgov_notif_deferred","true"); // 表示した時点でフラグ
      setTimeout(() => setNotifModal("notif"), 500);
    }
  };

  const handleQuizDone=(ans)=>{
    setProfile(ans);
    setFestivalSettings({
      coords:ans.festivalCoords||null,
      town:ans.festivalTown||{name:ans.town||"麻布十番"},
      radius:3000,
      fireworksRadius:5000,
    });
    setPhase("reveal");
  };

  const handleRevealEnter=()=>{
    setTab("home");
    setPhase("main");
    setTimeout(()=>setRevealMode(true), 1000);
    // GA4: クイズ完了計測
    window.gaEvent('quiz_complete', { items_count: allItems.length });
  };

  const handleUpdate=async()=>{
    setUpdating(true);
    setUpdateProgress(0);
    const result={};
    for(let i=0;i<allItems.length;i++){
      const item=allItems[i];
      try {
        const data=await fetchLiveInfo(item);
        result[item.id]=data;
      } catch(e){
        result[item.id]={amount:"取得失敗",conditions:"—",deadline:"—",changes:"—",sourceNote:"—",fetchedAt:new Date().toLocaleDateString("ja-JP")};
      }
      setUpdateProgress(i+1);
      setLiveData({...result});
    }
    setUpdating(false);
    showToast(`✅ ${allItems.length}件の最新情報を取得しました`);
  };

  const handleChangeRadius=(key,val)=>{
    setFestivalSettings(prev=>({...prev,[key]:val}));
    // 半径設定を永続化（リロード後も保持）
    lsSave(`mgov_festival_${key}`,val);
  };

  return (
    <div style={{
      position:"fixed", inset:0,
      background:C.bg0,
      display:"flex", alignItems:"center", justifyContent:"center",
    }}>
      <div style={{
        width:"100%", maxWidth:430,
        height:"100%",
        background:C.bg1,
        display:"flex", flexDirection:"column",
        overflow:"hidden", position:"relative",
      }}>
        {phase==="loading"&&(

<script>
// ── Service Worker & Web Push 登録 ──
const VAPID_PUBLIC_KEY = "BF4XLgKASTOesypO8_4x4AOQ9AimeIY3781caVoxI-r-dEHzneDlF8K_10hUnspXuTK-kYSkT9hHqEZOP66BhDM";
const PUSH_WORKER_URL = "https://minato-mygov-push.k-0k-i1k-2k-3.workers.dev";

// IndexedDB ヘルパー（SW と共有）
function openAppDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open("minato-mygov-db", 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("profile")) db.createObjectStore("profile", { keyPath: "key" });
      if (!db.objectStoreNames.contains("seen")) db.createObjectStore("seen", { keyPath: "key" });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function idbSet(store, key, value) {
  const db = await openAppDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readwrite");
    tx.objectStore(store).put({ key, value });
    tx.oncomplete = resolve;
    tx.onerror = e => reject(e.target.error);
  });
}

async function idbGet(store, key) {
  const db = await openAppDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, "readonly");
    const req = tx.objectStore(store).get(key);
    req.onsuccess = e => resolve(e.target.result?.value);
    req.onerror = e => reject(e.target.error);
  });
}

// プロフィールをIndexedDBに保存（SWと共有するため）
window.saveProfileToIDB = async (profile) => {
  await idbSet("profile", "current", profile);
  // SW にも通知
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: "SAVE_PROFILE", profile });
  }
};

window.saveSeenToIDB = async (ids, updatedAt) => {
  await idbSet("seen", "ids", ids);
  await idbSet("seen", "updatedAt", updatedAt);
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: "SAVE_SEEN", ids, updatedAt });

};

// Base64URL → Uint8Array（VAPID公開鍵変換用）
function urlB64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(base64);
  return new Uint8Array([...raw].map(c => c.charCodeAt(0)));
}

// Push通知の購読登録（ライフステージも一緒に送る）
async function subscribePush(sw, type = "user") {
  try {
    let sub = await sw.pushManager.getSubscription();
    if (!sub) {
      sub = await sw.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    }
    // ライフステージをプロフィールから取得（Cron送信時刻の決定に使用）
    const stage = lsLoad("mgov_profile", {}).stage || "";
    await fetch(`${PUSH_WORKER_URL}/subscribe`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ...sub.toJSON(), stage }),
    });
  } catch (e) {
    console.warn("Push通知登録失敗:", e.message);
  }
}

// ライフステージ変更時に Worker の KV を更新する
async function updatePushStage(stage) {
  try {
    const reg = window._swReg || (await navigator.serviceWorker?.ready);
    if (!reg) return;
    const sub = await reg.pushManager.getSubscription();
    if (!sub) return;
    await fetch(`${PUSH_WORKER_URL}/update-profile`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ endpoint: sub.endpoint, stage }),
    });
  } catch (e) {
    console.warn("Push stage 更新失敗:", e.message);
  }
}

// Service Worker 初期化
// SW登録（許可は求めない）
async function initSW() {
  if (!("serviceWorker" in navigator)) return;
  try {
    // パスを正しく解決（GitHub Pagesのサブディレクトリ対応）
    // GitHub Pagesのサブディレクトリに対応したSWパス
    const basePath = window.location.pathname.replace(/\/[^/]*$/, "/");
    const swPath = basePath + "sw.js";
    const reg = await navigator.serviceWorker.register(swPath, { scope: basePath });
    window._swReg = reg;

    // 起動時に必ず更新チェック（新しい sw.js があれば取りに行く）
    reg.update().catch(() => {});

    // 新SWが有効化され制御が切り替わったら一度だけ自動リロード（最新版で動かす）
    let _reloaded = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (_reloaded) return;
      _reloaded = true;
      location.reload();
    });

    // 既に許可済みなら即座に購読
    if (typeof Notification !== "undefined" && Notification.permission === "granted") {
      await subscribePush(reg, "user");
    }
  } catch (e) {
    console.warn("Service Worker初期化失敗:", e.message);
  }
}

// ユーザー操作で通知許可を求める（iOS対応）
window.requestPushPermission = async () => {
  if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
    alert("このブラウザはWeb Push通知に対応していません。\nホーム画面に追加してから再度お試しください。");
    return false;
  }
  try {
    const reg = window._swReg || await navigator.serviceWorker.ready;
    const permission = await Notification.requestPermission();
    if (permission === "granted") {
      await subscribePush(reg, "user");
      return true;
    } else {
      console.warn("通知が拒否されました");
      return false;
    }
  } catch (e) {
    console.warn("Push通知登録失敗:", e.message);
    return false;
  }
};

// 自分の端末にだけテスト通知を送る（Worker /test-push：認証不要・type:"TEST"で即時・SWの絞り込みを通さず必ず表示）
window.sendTestPush = async () => {
  try {
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
      return { ok: false, reason: "このブラウザはPush非対応（ホーム画面に追加して再試行）" };
    }
    const reg = window._swReg || await navigator.serviceWorker.ready;
    const sub = reg && await reg.pushManager.getSubscription();
    if (!sub) return { ok: false, reason: "未購読（先に通知を許可してください）" };
    const res = await fetch(`${PUSH_WORKER_URL}/test-push`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ endpoint: sub.endpoint }),
    });
    if (!res.ok) {
      const t = await res.text().catch(() => "");
      return { ok: false, reason: `Worker応答 ${res.status} ${t}` };
    }
    return { ok: true };
  } catch (e) {
    return { ok: false, reason: e.message };
  }
};

// アプリ/SWのビルド表示用（更新が反映されたか目視確認できるように）
window.APP_BUILD = "2026-06-08-v2.0";

// 現在アクティブな Service Worker の版を取得（sw.js の CACHE_NAME を問い合わせ）
window.getSWVersion = async () => {
  try {
    const reg = window._swReg || await navigator.serviceWorker?.ready;
    const sw = reg && (reg.active || navigator.serviceWorker.controller);
    if (!sw) return "なし";
    return await new Promise((resolve) => {
      const ch = new MessageChannel();
      const t = setTimeout(() => resolve("不明(無応答)"), 1500);
      ch.port1.onmessage = (e) => { clearTimeout(t); resolve(e.data?.version || "不明"); };
      sw.postMessage({ type: "GET_VERSION" }, [ch.port2]);
    });
  } catch (e) { return "取得失敗"; }
};

// 手動で最新へ更新：SWを更新→待機SWをskip→キャッシュ削除→リロード
window.forceAppUpdate = async () => {
  try {
    const reg = window._swReg || await navigator.serviceWorker?.ready;
    if (reg) { await reg.update().catch(()=>{}); if (reg.waiting) reg.waiting.postMessage({ type: "SKIP_WAITING" }); }
    if (window.caches) { const ks = await caches.keys(); await Promise.all(ks.map(k => caches.delete(k))); }
    location.reload();
  } catch (e) { location.reload(); }
};

// SW登録はページ読み込み時に実行（許可は求めない）
window.addEventListener("load", initSW);
</script>
