function Home({profile,setProfile,liked,reminded,hidden,onLike,onRemind,onHide,onDone,done,items,liveData,easy,onGoProfile,revealMode}){
  const [detail,setDetail]=useState(null);
  const [showBanner,setShowBanner]=useState(false);
  const [hideConfirm,setHideConfirm]=useState(null);
  const [repeatConfirmItem,setRepeatConfirmItem]=useState(null);
  const [expanded,setExpanded]=useState(false);
  const [showAllEvents,setShowAllEvents]=useState(false);
  const [revealed,setRevealed]=useState(!revealMode); // revealModeならfalseスタート
  const banner=calcBanner(profile,items,done,hidden);

  // revealMode時：マウント後すぐにtrueにしてアニメ開始、expandedは必ずfalse
  useEffect(()=>{
    if(revealMode){
      setExpanded(false);
      const t=setTimeout(()=>setRevealed(true),80);
      return()=>clearTimeout(t);
    }
  },[]);

  const getScore=(it)=>{
    const el=it.eligibility;
    const baseScore=el?calcEligibilityData(profile,el).matchScore:0;
    // certainな場合でも属性の関連度でさらに差をつける
    if(getConfidence(it,profile)==="certain"){
      // 金額が大きいほど上位
      const cashVal=it.subsidy(profile)||0;
      const potVal=it.potentialSubsidy||0;
      const moneyScore=Math.min((cashVal+potVal)/10000,50); // 最大50点
      // ライフステージに直結する制度を優遇
      let relevance=0;
      if(it.tag==="子育て"&&profile.hasKids==="いる（または予定あり）") relevance+=20;
      if(it.tag==="キャリア"&&(profile.stage==="社会人（会社員）"||profile.stage==="育休・産休中")) relevance+=15;
      if(it.tag==="教育"&&profile.stage==="学生") relevance+=20;
      if(it.tag==="健康"&&age(profile)!==null&&age(profile)>=60) relevance+=15;
      if(it.tag==="住まい"&&isOwner(profile)) relevance+=15;
      return 100+moneyScore+relevance;
    }
    return baseScore;
  };
  const interestOf=(it)=>getItemInterestScore(it, profile.interestScores);
  // 給付（eligibility）：対象(confidence!=="none")のみ縦リスト。確定→該当かも→利用済 の順。
  //  興味は表示可否をゲートしない（給付は興味無関係）。並び順のタイブレークにのみ興味を使う。
  const benefitItems=items
    .filter(it=>{
      if(hidden.includes(it.id)) return false;
      if((it.judgmentType||"eligibility")==="interest") return false; // イベントは別枠（横帯）
      return getConfidence(it,profile)!=="none";
    })
    .sort((a,b)=>{
      const da=done.includes(a.id)?1:0, db=done.includes(b.id)?1:0;
      if(da!==db) return da-db;                                  // 利用済みは最下位
      const ca=getConfidence(a,profile)==="certain"?0:1, cb=getConfidence(b,profile)==="certain"?0:1;
      if(ca!==cb) return ca-cb;                                  // 確定 > 該当かも
      const ia=interestOf(a), ib=interestOf(b);
      if(Math.abs(ia-ib)>0.05) return ib-ia;                     // 同率なら興味でタイブレーク
      return getScore(b)-getScore(a);
    });
  // イベント（interest）：関連=区民なら全件表示（興味で絞らない）。興味スコア順、利用済みは末尾。
  const eventItems=items
    .filter(it=> !hidden.includes(it.id) && (it.judgmentType||"eligibility")==="interest")
    .sort((a,b)=>{
      const da=done.includes(a.id)?1:0, db=done.includes(b.id)?1:0;
      if(da!==db) return da-db;
      return interestOf(b)-interestOf(a);
    });

  const featured=benefitItems.slice(0,3);
  const rest=benefitItems.slice(3);

  const CardItem=({it, index=0, animate=true})=>{
    const conf=getConfidence(it,profile);
    const isCertain=conf==="certain";
    const amount=it.subsidy(profile);
    const isDone=done&&done.includes(it.id);
    const isLiked=liked&&liked.includes(it.id);
    // revealMode: featuredのみアニメ（animate=trueのとき）
    const delay = (revealMode && animate) ? `${index * 80}ms` : "0ms";
    const cardAnim = (revealMode && animate)
      ? { opacity: revealed ? 1 : 0, transform: revealed ? "translateY(0)" : "translateY(-28px)", transition: `opacity .45s ease ${delay}, transform .45s cubic-bezier(.22,1,.36,1) ${delay}` }
      : {};
    return (
      <div style={{background:isDone?C.bg2+"88":C.bg2,borderRadius:16,padding:"12px 14px",marginBottom:8,border:`1px solid ${isDone?"#ffffff11":isCertain?C.green+"44":"#f0a03033"}`,cursor:"pointer",opacity:isDone?0.6:1,...cardAnim}} onClick={()=>setDetail(it)}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:26,flexShrink:0,filter:isDone?"grayscale(1)":"none"}}>{it.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",gap:5,marginBottom:3,flexWrap:"wrap"}}>
              {isDone&&<span style={{background:"#ffffff11",color:C.t3,borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:700}}>✅ 済み</span>}
              {!isDone&&<span style={S.tag(it.color)}>{it.gov}</span>}
              {!isDone&&<span style={{background:isCertain?C.green+"22":"#f0a03022",color:isCertain?C.green:"#f0a030",borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:700}}>
                {isCertain?"✅ 対象確実":"🔶 関係あるかも"}
              </span>}
            </div>
            <div style={{color:isDone?C.t3:C.t1,fontWeight:700,fontSize:13}}>{easy?(it.title):(it.officialName||it.title)}</div>
            {!isDone&&isCertain&&amount>0&&<div style={{color:it.subsidyType==="cash"?C.blue:C.green,fontWeight:700,fontSize:13,marginTop:2}}>{it.subsidyType==="savings"?"💚 ":"💙 "}{it.subsidyLabel(profile)}</div>}
            {!isDone&&!isCertain&&it.potentialSubsidy>0&&<div style={{color:"#f0a030",fontSize:12,marginTop:2}}>最大 {fmt(it.potentialSubsidy)}</div>}
          </div>
          {/* いいね・利用済みボタン */}
          <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}} onClick={e=>e.stopPropagation()}>
            <button
              style={{background:isLiked?C.red+"22":"none",border:`1px solid ${isLiked?C.red:C.border}`,borderRadius:8,padding:"4px 8px",cursor:"pointer",fontSize:14,lineHeight:1}}
              onClick={()=>onLike(it.id)}>
              {isLiked?"❤️":"🤍"}
            </button>
            <button
              style={{background:isDone?C.green+"22":"none",border:`1px solid ${isDone?C.green:C.border}`,borderRadius:8,padding:"4px 6px",cursor:"pointer",fontSize:10,color:isDone?C.green:C.t3,lineHeight:1.3,fontWeight:600,whiteSpace:"nowrap"}}
              onClick={()=>{
                if(isDone){ onDone(it.id,"undo"); }
                else if(REPEATABLE_IDS.has(it.id)){ setRepeatConfirmItem(it); }
                else{ onDone(it.id,"done"); }
              }}>
              {isDone?"✅ 済み":"申請済\nにする"}
            </button>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{flex:1,overflowY:"auto",padding:"8px 16px 16px"}}>
      {/* バナー */}
      <div style={{background:`linear-gradient(135deg,${C.bg2},${C.bg3})`,borderRadius:16,padding:"12px 16px",marginBottom:12,border:`1px solid ${C.border}`,cursor:"pointer"}} onClick={()=>setShowBanner(true)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:C.t3,fontSize:10,marginBottom:3}}>あなたが受け取れる年間総額（確実分）</div>
            <div style={{display:"flex",gap:16,alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                <span style={{color:C.t3,fontSize:10}}>給付</span>
                <span style={{color:C.blue,fontWeight:700,fontSize:18}}>{fmt(banner.cash)}</span>
              </div>
              <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                <span style={{color:C.t3,fontSize:10}}>節約</span>
                <span style={{color:C.green,fontWeight:700,fontSize:18}}>{fmt(banner.savings)}</span>
              </div>
            </div>
          </div>
          <div style={{color:C.t3,fontSize:20}}>›</div>
        </div>
      </div>

      {/* おすすめ給付（縦リスト・上位3件） */}
      {featured.length>0&&<div style={{color:C.t2,fontSize:11,fontWeight:600,marginBottom:8}}>✨ あなたへのおすすめ</div>}
      {featured.map((it,i)=><CardItem key={it.id} it={it} index={i}/>)}

      {/* イベント横カード列（区民は全件表示・興味順。給付の下＝上部で受動発見） */}
      {eventItems.length>0&&(
        <div style={{marginTop:14,marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <span style={{color:C.t2,fontSize:11,fontWeight:600}}>🎟️ あなたに合うイベント・お得</span>
            <button style={{background:"none",border:"none",color:C.blue,fontSize:12,cursor:"pointer",fontWeight:600}} onClick={()=>setShowAllEvents(true)}>すべて見る →</button>
          </div>
          <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:4,scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
            {eventItems.map(it=>{
              const isEvDone=done&&done.includes(it.id);
              return (
                <div key={it.id} onClick={()=>setDetail(it)}
                  style={{flex:"0 0 auto",width:150,background:C.bg2,borderRadius:14,padding:"12px",border:`1px solid ${C.border}`,cursor:"pointer",opacity:isEvDone?0.55:1}}>
                  <div style={{fontSize:24,marginBottom:6}}>{it.icon}</div>
                  <div style={{color:C.t1,fontWeight:700,fontSize:12,lineHeight:1.35,marginBottom:4,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{easy?it.title:(it.officialName||it.title)}</div>
                  <div style={{color:C.t2,fontSize:11,lineHeight:1.35,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{it["catch"]||it["catchText"]||""}</div>
                  {it.deadline&&it.deadline!=="通年"&&<div style={{color:C.blue,fontSize:10,marginTop:6}}>📅 {it.deadline}</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 展開ボタン or 展開後のリスト */}
      {rest.length>0&&!expanded&&(
        <button
          style={{width:"100%",background:"none",border:`1px solid ${C.border}`,borderRadius:12,padding:"11px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:4}}
          onClick={()=>setExpanded(true)}>
          <span style={{color:C.t2,fontSize:13,fontWeight:600}}>他 {rest.length}件の制度を見る</span>
          <span style={{color:C.t3,fontSize:13}}>↓</span>
        </button>
      )}
      {expanded&&<>
        <button
          style={{width:"100%",background:"none",border:"none",color:C.t3,fontSize:11,cursor:"pointer",padding:"4px",marginBottom:4,textAlign:"center"}}
          onClick={()=>setExpanded(false)}>
          ↑ 折りたたむ
        </button>
        <div style={{color:C.t3,fontSize:11,fontWeight:600,marginBottom:8}}>その他の制度</div>
        {rest.map((it,i)=><CardItem key={it.id} it={it} index={i+3} animate={false}/>)}
        <button
          style={{width:"100%",background:"none",border:"none",color:C.t3,fontSize:12,cursor:"pointer",padding:"8px",marginTop:4}}
          onClick={()=>setExpanded(false)}>
          ↑ 折りたたむ
        </button>
      </>}

      {detail&&<DetailModal item={detail} onClose={()=>setDetail(null)} liveData={liveData[detail.id]} conf={getConfidence(detail,profile)} profile={profile} setProfile={setProfile} onHide={(id)=>{onHide(id);setDetail(null);}} liked={liked} reminded={reminded} onLike={onLike} onRemind={onRemind} done={done} onDone={onDone} easy={easy} onGoProfile={onGoProfile} siblings={(detail.judgmentType||"eligibility")==="interest"?eventItems:null} onSwipeTo={(it)=>setDetail(it)}/>}

      {/* 全イベント一覧（すべて見る） */}
      {showAllEvents&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setShowAllEvents(false)}>
          <div style={{background:C.bg1,borderRadius:"20px 20px 0 0",padding:"16px 16px 24px",width:"100%",maxWidth:430,maxHeight:"82vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexShrink:0}}>
              <span style={{color:C.t1,fontWeight:700,fontSize:15}}>🎟️ イベント・お得 一覧</span>
              <button style={{background:"none",border:"none",color:C.t3,fontSize:20,cursor:"pointer"}} onClick={()=>setShowAllEvents(false)}>✕</button>
            </div>
            <div style={{flex:1,overflowY:"auto"}}>
              {eventItems.map(it=>{
                const isEvDone=done&&done.includes(it.id);
                return (
                  <div key={it.id} onClick={()=>{setShowAllEvents(false);setDetail(it);}}
                    style={{background:C.bg2,borderRadius:14,padding:"12px 14px",marginBottom:8,border:`1px solid ${C.border}`,cursor:"pointer",opacity:isEvDone?0.55:1,display:"flex",gap:10,alignItems:"center"}}>
                    <div style={{fontSize:24,flexShrink:0}}>{it.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{color:C.t1,fontWeight:700,fontSize:13}}>{easy?it.title:(it.officialName||it.title)}</div>
                      <div style={{color:C.t2,fontSize:12,marginTop:2}}>{it["catch"]||it["catchText"]||""}</div>
                      {it.deadline&&it.deadline!=="通年"&&<div style={{color:C.blue,fontSize:11,marginTop:2}}>📅 {it.deadline}</div>}
                    </div>
                    {isEvDone&&<span style={{color:C.t3,fontSize:11,flexShrink:0}}>✅ 済み</span>}
                  </div>
                );
              })}
              {eventItems.length===0&&<div style={{color:C.t3,textAlign:"center",padding:"30px 0"}}>イベントはまだありません</div>}
            </div>
          </div>
        </div>
      )}

      {/* 繰り返し使える制度の確認ポップ */}
      {repeatConfirmItem&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setRepeatConfirmItem(null)}>
          <div style={{background:C.bg1,borderRadius:20,padding:20,width:"100%",maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:8}}>{repeatConfirmItem.icon}</div>
            <div style={{color:C.t1,fontWeight:700,fontSize:15,textAlign:"center",marginBottom:6}}>{repeatConfirmItem.title}</div>
            <div style={{color:C.t2,fontSize:13,textAlign:"center",marginBottom:16,lineHeight:1.6}}>
              🔄 この制度は複数回使えます。<br/>利用済みとして非表示にしますか？
            </div>
            <div style={{display:"flex",gap:8}}>
              <button style={{flex:1,...S.btn(C.green),fontSize:13,fontWeight:700}}
                onClick={()=>{onDone(repeatConfirmItem.id,"done");setRepeatConfirmItem(null);}}>
                非表示にする
              </button>
              <button style={{flex:1,...S.btn(C.bg3),border:`1px solid ${C.border}`,fontSize:13}}
                onClick={()=>{onDone(repeatConfirmItem.id,"keep");setRepeatConfirmItem(null);}}>
                表示を残す
              </button>
            </div>
          </div>
        </div>
      )}
      {showBanner&&<BannerModal banner={banner} onClose={()=>setShowBanner(false)}/>}
      {hideConfirm&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.6)",zIndex:130,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:C.bg1,borderRadius:20,padding:20,width:"100%"}}>
            <div style={{color:C.t1,fontWeight:700,marginBottom:8}}>この情報を非表示にしますか？</div>
            <div style={{color:C.t2,fontSize:13,marginBottom:16}}>「プロフィール」タブから復元できます</div>
            <div style={{display:"flex",gap:8}}>
              <button style={{flex:1,...S.btn(C.red)}} onClick={()=>{onHide(hideConfirm);setHideConfirm(null);}}>非表示にする</button>
              <button style={{flex:1,...S.btn(C.bg3),border:`1px solid ${C.border}`}} onClick={()=>setHideConfirm(null)}>キャンセル</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function NotifTab({liked,reminded,done,onLike,onRemind,onUndone,onDone,items,liveData,profile,setProfile,onHide,onGoProfile}){
  const [seg,setSeg]=useState("liked");
  const [detail,setDetail]=useState(null);
  const likedItems=items.filter(it=>liked.includes(it.id));
  const remItems=items.filter(it=>reminded.includes(it.id));
  const doneItems=items.filter(it=>done.includes(it.id));

  const ItemRow=({it,showRemind})=>(
    <div style={{...S.card,cursor:"pointer"}} onClick={()=>setDetail(it)}>
      <div style={{display:"flex",gap:12,alignItems:"center"}}>
        <div style={{fontSize:24,flexShrink:0}}>{it.icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:C.t1,fontWeight:700,fontSize:13}}>{it.title}</div>
          <div style={{color:C.t2,fontSize:12,marginTop:2}}>{it["catchText"]||it["catch"]}</div>
          {showRemind&&<>
            <div style={{color:C.blue,fontSize:11,marginTop:2}}>📅 {it.deadline}</div>
            <div style={{color:C.t2,fontSize:11,marginTop:1}}>💡 {it.reminderLabel}</div>
          </>}
          {liveData[it.id]&&<div style={{color:C.red,fontSize:11,marginTop:4}}>🔴 {liveData[it.id].amount}</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
          <button style={{...S.btn(liked.includes(it.id)?C.red+"33":C.bg3,true),border:`1px solid ${liked.includes(it.id)?C.red:C.border}`,fontSize:16,padding:"4px 8px"}}
            onClick={e=>{e.stopPropagation();onLike(it.id);}}>
            {liked.includes(it.id)?"❤️":"🤍"}
          </button>
          <button style={{...S.btn(reminded.includes(it.id)?C.blue+"33":C.bg3,true),border:`1px solid ${reminded.includes(it.id)?C.blue:C.border}`,fontSize:16,padding:"4px 8px"}}
            onClick={e=>{e.stopPropagation();onRemind(it.id);}}>
            {reminded.includes(it.id)?"🔔":"🔕"}
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
      <div style={{display:"flex",gap:6,padding:"12px 16px 0",flexShrink:0}}>
        {[["liked",`❤️ ${likedItems.length}`],["remind",`🔔 ${remItems.length}`],["done",`✅ ${doneItems.length}`]].map(([v,l])=>(
          <button key={v} style={{flex:1,...S.btn(seg===v?C.blue:C.bg3,true),border:`1px solid ${seg===v?C.blue:C.border}`,fontSize:12}} onClick={()=>setSeg(v)}>{l}</button>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 16px 16px"}}>
        {seg==="liked"&&<>
          {likedItems.length===0&&<div style={{color:C.t3,textAlign:"center",marginTop:40}}>まだいいねした制度がありません</div>}
          {likedItems.map(it=><ItemRow key={it.id} it={it} showRemind={false}/>)}
        </>}
        {seg==="remind"&&<>
          {remItems.length===0&&<div style={{color:C.t3,textAlign:"center",marginTop:40}}>リマインドした制度がありません</div>}
          {remItems.map(it=><ItemRow key={it.id} it={it} showRemind={true}/>)}
        </>}
        {seg==="done"&&<>
          {doneItems.length===0&&<div style={{color:C.t3,textAlign:"center",marginTop:40}}>申請済み・利用済みの制度がありません</div>}
          {doneItems.map(it=>(
            <div key={it.id} style={{...S.card}}>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <div style={{fontSize:24,flexShrink:0}}>{it.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:C.t1,fontWeight:700,fontSize:13}}>{it.title}</div>
                  <div style={{color:C.green,fontSize:12,marginTop:2}}>✅ 申請済み・利用済み</div>
                  {REPEATABLE_IDS.has(it.id)&&<div style={{color:C.t3,fontSize:11,marginTop:2}}>🔄 繰り返し利用可能</div>}
                </div>
                <button style={{...S.btn(C.bg3,true),border:`1px solid ${C.border}`,fontSize:11,color:C.t3,flexShrink:0,padding:"6px 10px"}}
                  onClick={e=>{e.stopPropagation();onUndone(it.id);}}>
                  取消
                </button>
              </div>
            </div>
          ))}
        </>}
      </div>
      {detail&&<DetailModal item={detail} onClose={()=>setDetail(null)} liveData={liveData[detail.id]} conf={getConfidence(detail,profile)} profile={profile} setProfile={setProfile} onHide={(id)=>{onHide&&onHide(id);setDetail(null);}} liked={liked} reminded={reminded} onLike={onLike} onRemind={onRemind} done={done} onDone={onDone} easy={false} onGoProfile={onGoProfile}/>}
    </div>
  );
}



const FESTIVAL_RADIUS_OPTS=[1200,3000,999999];
const FIREWORKS_RADIUS_OPTS=[3000,5000,10000];

function FestivalTab({festivalSettings,onChangeRadius,festivalNotified,onToggleNotify}){
  const [filter,setFilter]=useState("all");
  const [sort,setSort]=useState("date");
  const [detail,setDetail]=useState(null);
  const [showReminded,setShowReminded]=useState(false);
  const [showSortPop,setShowSortPop]=useState(null);
  if(!festivalSettings) return <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.t3}}>設定情報がありません</div>;

  const {coords,town,radius,fireworksRadius}=festivalSettings;
  const curRadius=filter==="fireworks"?fireworksRadius:radius;
  const radiusOpts=filter==="fireworks"?FIREWORKS_RADIUS_OPTS:FESTIVAL_RADIUS_OPTS;

  const baseCoords = coords || (() => {
    const townName = typeof town==="object" ? town.name : town;
    const found = TOWN_COORDS.find(t=>townName&&townName.includes(t.name));
    return found ? {lat:found.lat,lng:found.lng} : null;
  })();

  // 月/日を数値化してソート（例: "8/23〜24" → 823）
  const dateNum=(d)=>{ const m=d.match(/(\d+)\/(\d+)/); return m?parseInt(m[1])*100+parseInt(m[2]):9999; };

  const filtered=[...FESTIVALS_DB]
    .filter(f=>{
      if(filter==="festival"&&f.type!=="festival") return false;
      if(filter==="fireworks"&&f.type!=="fireworks") return false;
      if(curRadius===999999) return true;
      if(!baseCoords) return true;
      return calcDist(baseCoords.lat,baseCoords.lng,f.lat,f.lng)<=curRadius;
    })
    .sort((a,b)=>{
      if(sort==="dist"&&baseCoords){
        return calcDist(baseCoords.lat,baseCoords.lng,a.lat,a.lng)
             - calcDist(baseCoords.lat,baseCoords.lng,b.lat,b.lng);
      }
      return dateNum(a.date)-dateNum(b.date);
    });

  return (
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
      <div style={{background:C.bg2,borderRadius:14,padding:12,marginBottom:12,border:`1px solid ${C.border}`}}>
        <div style={{color:C.t2,fontSize:11}}>📍 エリア：{typeof town==="object"?town.name:town} · {radiusLabel(curRadius)}</div>
      </div>

      {/* リマインド済み一覧ページ */}
      {showReminded&&(
        <div style={{position:"fixed",inset:0,background:C.bg0,zIndex:200,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"52px 16px 10px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
            <button style={{background:"none",border:"none",color:C.blue,fontSize:14,cursor:"pointer",fontWeight:700}} onClick={()=>setShowReminded(false)}>← 戻る</button>
            <span style={{color:C.t1,fontWeight:700,fontSize:15}}>🔔 リマインド済み（{festivalNotified.length}件）</span>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
            {festivalNotified.length===0&&<div style={{color:C.t3,textAlign:"center",marginTop:40}}>リマインドしたお祭り・花火がありません</div>}
            {FESTIVALS_DB.filter(f=>festivalNotified.includes(f.id)).map(f=>(
              <div key={f.id}
                style={{background:C.bg2,borderRadius:14,padding:"12px 14px",marginBottom:8,border:`1px solid ${C.blue}44`,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}
                onClick={()=>{setShowReminded(false);setDetail(f);}}>
                <div style={{fontSize:24,flexShrink:0}}>{f.type==="fireworks"?"🎆":"🎪"}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:C.t1,fontWeight:700,fontSize:13}}>{f.name}</div>
                  <div style={{color:C.t2,fontSize:11,marginTop:2}}>{f.area} · {f.date}</div>
                </div>
                <button
                  style={{background:C.blue+"22",border:`1px solid ${C.blue}`,borderRadius:8,padding:"6px 10px",cursor:"pointer",color:C.blue,fontSize:11,flexShrink:0}}
                  onClick={e=>{e.stopPropagation();onToggleNotify(f.id);}}>
                  解除
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 並び順ポップ */}
      {showSortPop==="sort"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:300,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowSortPop(null)}>
          <div style={{background:C.bg1,borderRadius:"20px 20px 0 0",padding:"20px 20px 36px",width:"100%"}} onClick={e=>e.stopPropagation()}>
            <div style={{color:C.t1,fontWeight:700,fontSize:14,marginBottom:14}}>並び順</div>
            <div style={{display:"flex",gap:8}}>
              {[["date","📅 日付順"],["dist","📍 距離順"]].map(([v,l])=>(
                <button key={v} style={{flex:1,...S.btn(sort===v?C.blue:C.bg3,true),border:`1px solid ${sort===v?C.blue:C.border}`}} onClick={()=>{setSort(v);setShowSortPop(null);}}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* 表示範囲ポップ（お祭り・花火それぞれ） */}
      {showSortPop==="radius"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:300,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowSortPop(null)}>
          <div style={{background:C.bg1,borderRadius:"20px 20px 0 0",padding:"20px 20px 36px",width:"100%"}} onClick={e=>e.stopPropagation()}>
            <div style={{color:C.t1,fontWeight:700,fontSize:14,marginBottom:16}}>表示範囲</div>
            <div style={{color:C.t3,fontSize:11,marginBottom:6}}>🎪 お祭り</div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {FESTIVAL_RADIUS_OPTS.map(r=>(
                <button key={r} style={{flex:1,...S.btn(radius===r?C.green:C.bg3,true),border:`1px solid ${radius===r?C.green:C.border}`,fontSize:12}}
                  onClick={()=>onChangeRadius("radius",r)}>{radiusLabel(r)}</button>
              ))}
            </div>
            <div style={{color:C.t3,fontSize:11,marginBottom:6}}>🎆 花火</div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {FIREWORKS_RADIUS_OPTS.map(r=>(
                <button key={r} style={{flex:1,...S.btn(fireworksRadius===r?C.purple:C.bg3,true),border:`1px solid ${fireworksRadius===r?C.purple:C.border}`,fontSize:12}}
                  onClick={()=>onChangeRadius("fireworksRadius",r)}>{radiusLabel(r)}</button>
              ))}
            </div>
            <button style={{width:"100%",...S.btn(C.blue),fontWeight:700}} onClick={()=>setShowSortPop(null)}>完了</button>
          </div>
        </div>
      )}

      {/* 1段目：フィルター＋🔔 */}
      <div style={{display:"flex",gap:6,marginBottom:6}}>
        {[["all","全て"],["festival","🎪 お祭り"],["fireworks","🎆 花火"]].map(([v,l])=>(
          <button key={v} style={{flex:1,...S.btn(filter===v?C.blue:C.bg3,true),border:`1px solid ${filter===v?C.blue:C.border}`,fontSize:12}} onClick={()=>setFilter(v)}>{l}</button>
        ))}
        <button
          style={{...S.btn(festivalNotified.length>0?C.blue+"22":C.bg3,true),border:`1px solid ${festivalNotified.length>0?C.blue:C.border}`,padding:"6px 10px",flexShrink:0,position:"relative"}}
          onClick={()=>setShowReminded(true)}>
          🔔{festivalNotified.length>0&&<span style={{position:"absolute",top:-4,right:-4,background:C.red,color:"#fff",borderRadius:8,fontSize:9,padding:"1px 4px",fontWeight:700}}>{festivalNotified.length}</span>}
        </button>
      </div>

      {/* 2段目：表示範囲・並び順 */}
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <button style={{flex:3,...S.btn(C.bg3,true),border:`1px solid ${C.border}`,fontSize:12}} onClick={()=>setShowSortPop("radius")}>
          📍 表示範囲：{radiusLabel(curRadius)}
        </button>
        <button style={{flex:2,...S.btn(C.bg3,true),border:`1px solid ${C.border}`,fontSize:12}} onClick={()=>setShowSortPop("sort")}>
          {sort==="date"?"📅 日付順":"📍 距離順"}
        </button>
      </div>

      {filtered.length===0&&<div style={{color:C.t3,textAlign:"center",marginTop:32}}>条件に合うイベントがありません</div>}
      {filtered.map(f=>{
        const dist=baseCoords?Math.round(calcDist(baseCoords.lat,baseCoords.lng,f.lat,f.lng)):null;
        const notified=festivalNotified.includes(f.id);
        return (
          <div key={f.id} style={{...S.card,cursor:"pointer"}} onClick={()=>setDetail(f)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",gap:6,marginBottom:4}}>
                  <span style={S.tag(f.type==="festival"?C.purple:C.red)}>{f.type==="festival"?"🎪 お祭り":"🎆 花火"}</span>
                </div>
                <div style={{color:C.t1,fontWeight:700,fontSize:14}}>{f.name}</div>
                <div style={{color:C.t2,fontSize:12,marginTop:2}}>📅 {f.date} · {f.area}</div>
                {dist!==null&&<div style={{color:C.t3,fontSize:11,marginTop:2}}>📍 約{dist<1000?`${dist}m`:`${(dist/1000).toFixed(1)}km`}</div>}
              </div>
              <button style={{...S.btn(notified?C.blue:C.bg3,true),border:`1px solid ${notified?C.blue:C.border}`,flexShrink:0}}
                onClick={e=>{e.stopPropagation();onToggleNotify(f.id);}}>
                {notified?"🔔":"🔕"}
              </button>
            </div>
          </div>
        );
      })}

      {/* 詳細シート - position:fixedで確実にボトムナビの上に表示 */}
      {detail&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:500,display:"flex",alignItems:"flex-end"}} onClick={()=>setDetail(null)}>
          <div style={{background:C.bg1,borderRadius:"24px 24px 0 0",padding:24,width:"100%",animation:"slideUp .3s ease"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:40,textAlign:"center",marginBottom:8}}>{detail.type==="festival"?"🎪":"🎆"}</div>
            <div style={{color:C.t1,fontWeight:700,fontSize:18,textAlign:"center",marginBottom:4}}>{detail.name}</div>
            <div style={{color:C.t2,fontSize:13,textAlign:"center",marginBottom:16}}>📅 {detail.date} · {detail.area}</div>
            {baseCoords&&(
              <div style={{background:C.bg2,borderRadius:12,padding:12,marginBottom:12,textAlign:"center"}}>
                <div style={{color:C.t2,fontSize:12}}>現在地からの距離</div>
                <div style={{color:C.t1,fontWeight:700,fontSize:18,marginTop:4}}>
                  {(()=>{const d=Math.round(calcDist(baseCoords.lat,baseCoords.lng,detail.lat,detail.lng));return d<1000?`約${d}m`:`約${(d/1000).toFixed(1)}km`;})()}
                </div>
              </div>
            )}
            <a
              href={"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(detail.name+" "+detail.area+" 東京")}
              target="_blank" rel="noreferrer"
              onClick={e=>e.stopPropagation()}
              style={{display:"block",background:C.blue,color:"#fff",textAlign:"center",padding:"12px",borderRadius:12,fontWeight:700,fontSize:14,marginBottom:8,textDecoration:"none"}}>
              🗺️ Google Mapsで開く
            </a>
            <a
              href={"https://www.google.com/search?q="+encodeURIComponent(detail.name+" "+detail.date+" "+detail.area)}
              target="_blank" rel="noreferrer"
              onClick={e=>e.stopPropagation()}
              style={{display:"block",background:C.bg2,color:C.t1,textAlign:"center",padding:"12px",borderRadius:12,fontWeight:700,fontSize:14,marginBottom:10,textDecoration:"none",border:`1px solid ${C.border}`}}>
              🔍 Google で検索
            </a>
            <button style={{...S.btn(C.bg3),width:"100%",border:`1px solid ${C.border}`}} onClick={()=>setDetail(null)}>閉じる</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── NotifLaunchQuiz: 通知起動時のミニクイズ先出し画面（mid） ─── */
function NotifLaunchQuiz({ item, quizText, categoryHint, onYes, onNo }) {
  const [answered, setAnswered] = React.useState(null); // null | "yes" | "no"

  const handleYes = () => {
    setAnswered("yes");
    setTimeout(onYes, 600);
  };
  const handleNo = () => {
    setAnswered("no");
    setTimeout(onNo, 800);
  };

  return (
    <div style={{
      position:"absolute", inset:0, zIndex:200,
      background:C.bg0,
      display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"center",
      padding:"32px 28px",
      animation:"fadeUp .35s ease",

      {/* アイコン */}
      <div style={{
        width:72, height:72, borderRadius:36,

      {answered === null && <>
        {/* カテゴリヒント */}
        {categoryHint && (
          <div style={{
            background:C.bg2, border:`1px solid ${C.border}`,

            display:"flex", alignItems:"center", gap:5,

          </div>
        )}
        {/* 質問文 */}
        <div style={{
          color:C.t1, fontSize:20, fontWeight:700,
          textAlign:"center", lineHeight:1.5, marginBottom:12,
        }}>
          {quizText}
        </div>
        <div style={{
          color:C.t3, fontSize:12, marginBottom:36, textAlign:"center",

          <button
            onClick={handleYes}
            style={{
              background:C.blue, color:"#fff",
              border:"none", borderRadius:16,
              padding:"16px", fontSize:16, fontWeight:700,

              boxShadow:`0 4px 16px ${C.blue}44`,

/* ─── NotificationModal: 通知許可誘導UI ─── */
function NotificationModal({ trigger, onAllow, onLater }) {
  const [loading, setLoading] = React.useState(false);
  const [done, setDone] = React.useState(false);

  const isRemind = trigger === "remind";

  const handleAllow = async () => {
    setLoading(true);
    const ok = await window.requestPushPermission();
    setLoading(false);
    if (ok) {
      setDone(true);
      setTimeout(onAllow, 1200);
    } else {
      onLater();
    }
  };

  return (
    <div style={{
      position:"absolute", inset:0,
      background:"rgba(0,0,0,.55)",
      zIndex:180,
      display:"flex", alignItems:"flex-end",
      animation:"fadeUp .2s ease",
    }}>
      <div style={{
        background:C.bg1,
        borderRadius:"24px 24px 0 0",
        width:"100%",
        padding:"28px 24px 40px",
        animation:"slideUp .32s cubic-bezier(.16,1,.3,1)",
        display:"flex", flexDirection:"column", alignItems:"center", gap:0,
      }}>
        {/* アイコン */}
        <div style={{
          width:64, height:64, borderRadius:32,
          background:done ? C.green+"22" : C.blue+"18",
          border:`2px solid ${done ? C.green+"55" : C.blue+"33"}`,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:30, marginBottom:16,
          transition:"background .4s, border-color .4s",
        }}>
          {done ? "✅" : "🔔"}
        </div>

        {/* タイトル */}
        <div style={{ color:C.t1, fontWeight:700, fontSize:18, marginBottom:8, textAlign:"center" }}>
          {done
            ? "通知をONにしました！"
            : isRemind
            ? "プッシュ通知でお届けできます"
            : trigger === "notif"
            ? "通知・リマインドを受け取る"
            : "新しい制度をお知らせします"}
        </div>

        {/* 説明 */}
        {!done && (
          <div style={{ color:C.t2, fontSize:13, textAlign:"center", lineHeight:1.7, marginBottom:20 }}>
            {isRemind
              ? <>リマインドした制度の期限が近づいたら<br/>プッシュ通知でお知らせします。</>
              : trigger === "notif"
              ? <>リマインド期限や新着制度を<br/>プッシュ通知でお知らせします。</>
              : <>あなたに関係する新しい制度が追加されたとき<br/>お知らせします。見逃しがなくなります。</>
            }
          </div>
        )}

        {/* 2回出る旨の注意（未許可時のみ） */}
        {!done && (
          <div style={{
            background:C.bg2,
            border:`1px solid ${C.border}`,
            borderRadius:12,
            padding:"10px 14px",
            width:"100%",
            marginBottom:22,
            display:"flex", alignItems:"flex-start", gap:8,
          }}>
            <span style={{ fontSize:15, flexShrink:0, marginTop:1 }}>ℹ️</span>
            <div style={{ color:C.t2, fontSize:12, lineHeight:1.6 }}>
              確認画面が<strong style={{color:C.t1}}>2回</strong>出ます。<br/>
              どちらも「<strong style={{color:C.t1}}>許可</strong>」を選んでください。
            </div>
          </div>
        )}

        {/* ボタン */}
        {!done && (
          <>
            <button
              onClick={handleAllow}
              disabled={loading}
              style={{
                width:"100%",
                background: loading ? C.blue+"88" : C.blue,
                color:"#fff",
                border:"none",
                borderRadius:14,
                padding:"15px",
                fontSize:16, fontWeight:700,
                cursor: loading ? "default" : "pointer",
                marginBottom:10,
                transition:"background .2s",
                display:"flex", alignItems:"center", justifyContent:"center", gap:8,
              }}>
              {loading
                ? <><span style={{width:16,height:16,border:"2px solid #fff",borderTopColor:"transparent",borderRadius:"50%",display:"inline-block",animation:"spin .7s linear infinite"}}/>設定中…</>
                : "🔔 通知をONにする"
              }
            </button>
            <button
              onClick={onLater}
              style={{
                width:"100%",
                background:"none",
                border:"none",
                color:C.t3,
                fontSize:14,
                cursor:"pointer",
                padding:"10px",
              }}>
              後で
            </button>
          </>
        )}
      </div>
    </div>
  );
}

/* ── 通知許可ボタン ── */
function NotificationButton() {
  const [status, setStatus] = React.useState(
    typeof Notification !== "undefined" ? Notification.permission : "unsupported"
  );
  const [loading, setLoading] = React.useState(false);
  const [testing, setTesting] = React.useState(false);
  const [swVer, setSwVer] = React.useState("確認中…");

  React.useEffect(() => { window.getSWVersion?.().then(v => setSwVer(v || "不明")); }, []);

  const handleClick = async () => {
    if (status === "granted") return;
    setLoading(true);
    const ok = await window.requestPushPermission();
    setStatus(typeof Notification !== "undefined" ? Notification.permission : "unsupported");
    setLoading(false);
    if (ok) alert("✅ 通知を許可しました！新着制度があるとお知らせします。");
  };

  const handleTest = async () => {
    setTesting(true);
    const r = await window.sendTestPush();
    setTesting(false);
    if (r.ok) alert("🧪 テスト通知を送信しました。数秒以内に通知が届くか確認してください（アプリを閉じると分かりやすいです）。");
    else alert("⚠️ テスト通知を送れませんでした: " + (r.reason || "不明") + "\n通知許可とホーム画面追加（インストール）を確認してください。");
  };

  if (status === "unsupported") return null;

  const label = status === "granted"
    ? "🔔 通知オン（設定済み）"
    : status === "denied"
    ? "🔕 通知がブロックされています（設定から変更してください）"
    : loading ? "設定中…" : "🔔 新着制度の通知を受け取る";

  const bg = status === "granted" ? C.green+"22" : status === "denied" ? C.red+"11" : C.blue+"22";
  const color = status === "granted" ? C.green : status === "denied" ? C.red : C.blue;
  const border = status === "granted" ? C.green+"44" : status === "denied" ? C.red+"33" : C.blue+"44";

  return (
    <>
      <button
        onClick={handleClick}
        disabled={status === "granted" || status === "denied" || loading}
        style={{width:"100%",background:bg,color,border:`1px solid ${border}`,borderRadius:12,padding:"13px",fontWeight:700,fontSize:14,cursor:status==="granted"||status==="denied"?"default":"pointer",marginBottom:8}}>
        {label}
      </button>
      {status === "granted" && (
        <button
          onClick={handleTest}
          disabled={testing}
          style={{width:"100%",background:C.bg2,color:C.t2,border:`1px solid ${C.border}`,borderRadius:12,padding:"11px",fontWeight:700,fontSize:13,cursor:testing?"default":"pointer",marginBottom:8}}>
          {testing ? "送信中…" : "🧪 通知テストを送る（自分の端末だけ）"}
        </button>
      )}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginTop:2}}>
        <span style={{fontSize:11,color:C.t3}}>
          アプリ {window.APP_BUILD || "?"} ／ SW {swVer}
        </span>
        <button
          onClick={() => window.forceAppUpdate && window.forceAppUpdate()}
          style={{background:"none",border:`1px solid ${C.border}`,color:C.t3,borderRadius:8,padding:"5px 10px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>
          🔄 最新に更新
        </button>
      </div>
    </>
  );
}

      <div style={{width:180,fontSize:12,color: bold?'#1a2332':'#4a5568',fontWeight:bold?700:400,flexShrink:0}}>{label}</div>
      <Bar score={score}/>
      <div style={{width:36,fontSize:12,color:'#4a5568',textAlign:'right',flexShrink:0}}>{Math.round(score*100)}%</div>
    </div>
  );

  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'20px 16px',overflowY:'auto'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:16,padding:20,width:'100%',maxWidth:460,boxShadow:'0 8px 32px rgba(0,0,0,0.15)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:16,color:'#1a2332'}}>📊 興味スコア</div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#8896a8'}}>✕</button>
        </div>

        <div style={{fontSize:11,color:'#8896a8',marginBottom:14}}>
          interestTags付き制度: {taggedCount}/{allItems.length}件 ／ スコアはいいね(1票)・申請済み(2票)の割合
        </div>

        {l2.length === 0 ? (
          <div style={{color:'#8896a8',fontSize:13,textAlign:'center',padding:'24px 0'}}>
            まだスコアがありません。<br/>制度をいいねや申請済みにすると表示されます。
          </div>
        ) : (
          <>
            <div style={{fontWeight:700,fontSize:12,color:'#4a5568',marginBottom:8}}>🏆 上位カテゴリ（l2）</div>
            {l2.slice(0, 8).map(([k, v]) => <Row key={k} label={k.replace('l2:','')} score={v} bold={v > 0.5}/>)}

            {l1.length > 0 && (
              <>
                <div style={{fontWeight:700,fontSize:12,color:'#4a5568',margin:'14px 0 8px'}}>大分類（l1）</div>
                {l1.map(([k, v]) => <Row key={k} label={k.replace('l1:','')} score={v}/>)}
              </>
            )}

            {entries.length > l1.length + l2.length && (
              <>
                <div style={{fontWeight:700,fontSize:12,color:'#4a5568',margin:'14px 0 8px'}}>小分類（l3）</div>
                {entries.filter(([k])=>k.startsWith('l3:')).map(([k,v]) => <Row key={k} label={k.replace('l3:','')} score={v}/>)}
              </>
            )}
          </>
        )}

        <div style={{marginTop:16,padding:'10px 12px',background:'#f5f7fa',borderRadius:10,fontSize:10,color:'#8896a8',wordBreak:'break-all'}}>
          <strong>raw:</strong> {JSON.stringify(scores)}
        </div>
      </div>
    </div>
  );
}

function ProfileTab({profile,setProfile,hidden,done,allItems,onRestoreAll,onRestoreOne,onShowAdmin,onResetQuiz,onClearAll,onTestNewItems,onTestSeasonal,onTestRecheck,onTestPush,onProfileGain,darkMode,setDarkMode}){
  const [showHiddenList,setShowHiddenList]=useState(false);
  const [showRestoreConfirm,setShowRestoreConfirm]=useState(false);
  const [showInterestDebug,setShowInterestDebug]=useState(false);
  const [showDetailSection,setShowDetailSection]=useState(false);
  const [openDetailGroup,setOpenDetailGroup]=useState(null);
  const trueHidden=(hidden||[]).filter(id=>!(done||[]).includes(id));
  const [sheet,setSheet]=useState(null);
  const [numInput,setNumInput]=useState("");
  const [numError,setNumError]=useState("");
  const [showHousehold,setShowHousehold]=useState(false);
  const [showBday,setShowBday]=useState(false);
  const [showKids,setShowKids]=useState(false);

  // 完成度：UNIFIED_GROUPS の全フィールドから算出
  const allUnifiedFields = UNIFIED_GROUPS
    .filter(g=>!g.showIf||g.showIf(profile))
    .flatMap(g=>g.fields)
    .filter(f=>{
      if(f.studentOnly && profile.stage!=="学生") return false;
      if(f.dependsOnKids && !(profile.hasKids==="いる（または予定あり）"||(Array.isArray(profile.kids)&&profile.kids.length>0))) return false;
      return true;
    });
  const isFieldFilled=(f)=>{
    if(f.special==="household") return Array.isArray(profile.household)&&profile.household.length>0;
    if(f.special==="kids") return Array.isArray(profile.kids)&&profile.kids.length>0;
    const v=profile[f.key]; return v!==undefined&&v!==null&&v!==""&&!(Array.isArray(v)&&v.length===0);
  };
  const filledCount=allUnifiedFields.filter(isFieldFilled).length;
  const totalFields=allUnifiedFields.length||1;
  const pct=Math.round((filledCount/totalFields)*100);

  const openSheet=(f)=>{
    setSheet(f);
    setNumInput((f.key==="ageNum"||f.inputType==="year")&&profile[f.key]?String(profile[f.key]):"");
    setNumError("");
  };

  const displayValue=(f)=>{
    const v=profile[f.key];
    if(v===undefined||v===null||v==="") return "未設定";
    if(Array.isArray(v)) return v.length? v.join("・") : "未設定";
    if(f.key==="ageNum") return `${v}歳`;
    if(f.inputType==="year") return `${v}年築`;
    if(DETAIL_DISPLAY_MAP[f.key]&&DETAIL_DISPLAY_MAP[f.key][v]) return DETAIL_DISPLAY_MAP[f.key][v];
    return String(v);
  };

  const stampAnswered=(prev,key)=>({...(prev.profileAnsweredAt||{}),[key]:Date.now()});

  // 対象確定している制度数を数える（即フィードバック用）
  const countCertain=(p)=>{
    if(!allItems) return 0;
    let n=0;
    for(const it of allItems){
      const el=it.eligibility; if(!el) continue;
      try{ if(calcEligibilityData(p,el).certain) n++; }catch(e){}
    }
    return n;
  };
  // プロフィール更新＋対象増加をフィードバック
  const applyProfile=(updater)=>{
    setProfile(prev=>{
      const before=countCertain(prev);
      const next=typeof updater==="function"?updater(prev):updater;
      const after=countCertain(next);
      if(after>before && onProfileGain) onProfileGain(after-before);
      return next;
    });
  };

  const saveSheetValue=(v)=>{
    const converted=sheet.boolKeys?(sheet.boolKeys[v]||v):v;
    if(sheet.multi){
      const exclusive=["なし","いない"];
      const cur=Array.isArray(profile[sheet.key])?[...profile[sheet.key]]:(profile[sheet.key]?[profile[sheet.key]]:[]);
      let next;
      if(exclusive.includes(v)) next=[v];
      else { next=cur.filter(x=>!exclusive.includes(x));
        next = next.includes(v)? next.filter(x=>x!==v) : [...next,v]; }
      applyProfile(p=>({...p,[sheet.key]:next,profileAnsweredAt:stampAnswered(p,sheet.key)}));
      return;
    }
    applyProfile(p=>{
      const next={...p,[sheet.key]:converted,profileAnsweredAt:stampAnswered(p,sheet.key)};
      if(sheet.key==="stage"&&v!=="学生") delete next.studentLevel;
      return next;
    });
    setSheet(null);
  };

  return (
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>

      {/* 完成度バー */}
      <div style={{background:C.bg2,borderRadius:14,padding:12,marginBottom:12,border:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{color:C.t1,fontWeight:700,fontSize:14}}>プロフィール完成度</span>
          <span style={{color:pct>=100?C.green:C.blue,fontWeight:700}}>{pct}%</span>
        </div>
        <div style={{background:C.bg3,borderRadius:4,height:6}}>
          <div style={{background:pct>=100?C.green:C.blue,height:6,borderRadius:4,width:`${pct}%`,transition:"width .4s"}}/>
        </div>
        <div style={{color:pct>=100?C.green:C.t3,fontSize:11,marginTop:6,fontWeight:pct>=100?700:400}}>
          {pct>=100
            ? "🎉 すべて入力済み！精度の高い判定ができます"
            : `あと${totalFields-filledCount}件で、より正確な制度判定ができます`}
        </div>
      </div>

      {/* 非表示一覧 */}
      {showHiddenList&&(
        <div style={{position:"fixed",inset:0,background:C.bg0,zIndex:200,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"16px 16px 8px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
            <button style={{background:"none",border:"none",color:C.blue,fontSize:14,cursor:"pointer",fontWeight:700}} onClick={()=>setShowHiddenList(false)}>← 戻る</button>
            <span style={{color:C.t1,fontWeight:700,fontSize:15}}>非表示にした制度（{trueHidden.length}件）</span>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
            {trueHidden.map(id=>{
              const it=allItems&&allItems.find(x=>x.id===id);
              if(!it) return null;
              return (
                <div key={id} style={{background:C.bg2,borderRadius:14,padding:"12px 14px",marginBottom:8,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
                  <div style={{fontSize:24,flexShrink:0,filter:"grayscale(1)"}}>{it.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:C.t2,fontSize:11}}>{it.gov}</div>
                    <div style={{color:C.t1,fontSize:13,fontWeight:600}}>{it.title}</div>
                  </div>
                  <button style={{...S.btn(C.blue,true),fontSize:12,flexShrink:0}} onClick={()=>onRestoreOne(id)}>復元</button>
                </div>
              );
            })}
            {trueHidden.length===0&&<div style={{color:C.t3,textAlign:"center",marginTop:40}}>非表示にした制度はありません</div>}
          </div>
          <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`,flexShrink:0}}>
            <button style={{width:"100%",...S.btn(C.bg3),border:`1px solid ${C.border}`,color:C.t2}} onClick={()=>setShowRestoreConfirm(true)}>
              すべて復元する（{trueHidden.length}件）
            </button>
          </div>
          {showRestoreConfirm&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setShowRestoreConfirm(false)}>
              <div style={{background:C.bg1,borderRadius:20,padding:20,width:"100%",maxWidth:380}} onClick={e=>e.stopPropagation()}>
                <div style={{color:C.t1,fontWeight:700,fontSize:15,marginBottom:8,textAlign:"center"}}>すべて復元しますか？</div>
                <div style={{color:C.t2,fontSize:13,textAlign:"center",marginBottom:16,lineHeight:1.6}}>非表示にした{trueHidden.length}件の制度を<br/>ホームに戻します</div>
                <div style={{display:"flex",gap:8}}>
                  <button style={{flex:1,...S.btn(C.blue),fontSize:13,fontWeight:700}} onClick={()=>{onRestoreAll();setShowHiddenList(false);setShowRestoreConfirm(false);}}>復元する</button>
                  <button style={{flex:1,...S.btn(C.bg3),border:`1px solid ${C.border}`,fontSize:13}} onClick={()=>setShowRestoreConfirm(false)}>キャンセル</button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── 統合プロフィールグループ ── */}
      {UNIFIED_GROUPS.map(group=>{
        if(group.showIf && !group.showIf(profile)) return null;
        const visFields = group.fields.filter(f=>{
          if(f.studentOnly && profile.stage!=="学生") return false;
          if(f.dependsOnKids && !(profile.hasKids==="いる（または予定あり）"||(Array.isArray(profile.kids)&&profile.kids.length>0))) return false;
          return true;
        });
        if(visFields.length===0) return null;
        const isOpen=openDetailGroup===group.id;
        const filled=visFields.filter(f=>{
          if(f.special==="household") return Array.isArray(profile.household)&&profile.household.length>0;
          if(f.special==="kids") return Array.isArray(profile.kids)&&profile.kids.length>0;
          const v=profile[f.key]; return v!==undefined&&v!==null&&v!==""&&!(Array.isArray(v)&&v.length===0);
        }).length;
        return (
          <div key={group.id} style={{marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.bg2,borderRadius:isOpen?"12px 12px 0 0":12,padding:"12px 14px",cursor:"pointer",border:`1px solid ${C.border}`}}
              onClick={()=>setOpenDetailGroup(g=>g===group.id?null:group.id)}>
              <div style={{color:C.t1,fontWeight:700,fontSize:14}}>{group.emoji} {group.label}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {filled>=visFields.length
                  ? <span style={{background:C.green+"22",color:C.green,borderRadius:10,padding:"2px 8px",fontSize:10,fontWeight:700}}>✅ 完了</span>
                  : filled>0&&<span style={{background:C.blue+"22",color:C.blue,borderRadius:10,padding:"2px 8px",fontSize:10,fontWeight:700}}>{filled}/{visFields.length}</span>}
                <div style={{color:C.t3,fontSize:16,transition:"transform .2s",transform:isOpen?"rotate(90deg)":"rotate(0deg)"}}>›</div>
              </div>
            </div>
            {isOpen&&(
              <div style={{border:`1px solid ${C.border}`,borderTop:"none",borderRadius:"0 0 12px 12px",overflow:"hidden"}}>
                {visFields.map((f,i)=>{
                  let valTxt;
                  if(f.special==="household"){const h=profile.household;const n=Array.isArray(h)?h.filter(p=>p.isSelf||p.cohabit).length:1;valTxt=`${n||1}人`;}
                  else if(f.special==="birthday"){valTxt=profile.birthday?`${profile.birthday}（${ageFromBirthday(profile.birthday)}歳）`:"未設定";}
                  else if(f.special==="kids"){const ks=profile.kids;if(Array.isArray(ks)&&ks.length){const ag=ks.map(k=>ageFromBirthday(`${k.birthYear}-${k.birthMonth||1}`)).filter(a=>a!==null);valTxt=ag.length?ag.map(a=>`${a}歳`).join("・"):"生年月を登録";}else valTxt="生年月を登録";}
                  else valTxt=displayValue(f);
                  const isSet=valTxt!=="未設定"&&valTxt!=="生年月を登録";
                  return (
                    <div key={f.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 14px",cursor:"pointer",background:i%2===0?C.bg1:C.bg2,borderTop:i>0?`1px solid ${C.border}`:"none"}}
                      onClick={()=>{ if(f.special==="household")setShowHousehold(true); else if(f.special==="birthday")setShowBday(true); else if(f.special==="kids")setShowKids(true); else openSheet(f); }}>
                      <div>
                        <div style={{color:C.t2,fontSize:10}}>{f.emoji} {f.label}</div>
                        <div style={{color:isSet?C.t1:C.t3,fontSize:13,marginTop:1,fontWeight:isSet?600:400}}>{valTxt}</div>
                      </div>
                      <div style={{color:C.t3,fontSize:16}}>›</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}

      {/* 世帯構成・誕生日・子どもシート描画 */}
      {showHousehold&&(
        <HouseholdPage
          household={profile.household}
          setHousehold={(fn)=>applyProfile(p=>({...p,household:typeof fn==="function"?fn(p.household||[{id:"self",isSelf:true,rel:"self",name:"あなた",emoji:"🧑"}]):fn}))}
          onBack={()=>setShowHousehold(false)}/>
      )}
      {showBday&&(
        <BirthdaySheetPop birthday={profile.birthday}
          onClose={()=>setShowBday(false)}
          onSave={(bd)=>{applyProfile(p=>({...p,birthday:bd,profileAnsweredAt:{...(p.profileAnsweredAt||{}),birthday:Date.now()}}));setShowBday(false);}}/>
      )}
      {showKids&&(
        <KidsSheetPop kids={profile.kids}
          onClose={()=>setShowKids(false)}
          onSave={(l)=>{applyProfile(p=>({...p,kids:l}));setShowKids(false);}}/>
      )}

      {/* ── ボトムシート（基本・詳細共通） ── */}
      {sheet&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.7)",zIndex:120,display:"flex",alignItems:"flex-end"}} onClick={()=>setSheet(null)}>
          <div style={{background:C.bg1,borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxHeight:"70%",overflowY:"auto",animation:"slideUp .3s ease"}} onClick={e=>e.stopPropagation()}>
            <div style={{color:C.t1,fontWeight:700,fontSize:16,marginBottom:4}}>{sheet.emoji} {sheet.label}</div>

            {sheet.inputType==="number"&&<>
              <input
                type="number" inputMode="numeric" min="1" max="110"
                value={numInput}
                onChange={e=>{setNumInput(e.target.value);setNumError("");}}
                placeholder="例：34"
                style={{background:C.bg3,border:`2px solid ${numError?C.red:C.blue}`,borderRadius:14,padding:"14px 18px",color:C.t1,fontSize:28,fontWeight:700,textAlign:"center",outline:"none",width:"100%",marginBottom:8,marginTop:12}}
                autoFocus
              />
              {numError&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>{numError}</div>}
              <button style={{...S.btn(C.blue),width:"100%"}} onClick={()=>{
                const n=parseInt(numInput,10);
                if(isNaN(n)||n<1||n>110){setNumError("1〜110の数字を入力してください");return;}
                setProfile({...profile,[sheet.key]:n}); setSheet(null);
              }}>保存</button>
            </>}

            {sheet.inputType==="year"&&<>
              <div style={{color:C.t2,fontSize:12,marginBottom:8,marginTop:4}}>建物が建てられた西暦を入力してください</div>
              <input
                type="number" inputMode="numeric" min="1900" max="2030"
                value={numInput}
                onChange={e=>{setNumInput(e.target.value);setNumError("");}}
                placeholder="例：2005"
                style={{background:C.bg3,border:`2px solid ${numError?C.red:C.blue}`,borderRadius:14,padding:"14px 18px",color:C.t1,fontSize:24,fontWeight:700,textAlign:"center",outline:"none",width:"100%",marginBottom:8}}
                autoFocus
              />
              {numError&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>{numError}</div>}
              <button style={{...S.btn(C.blue),width:"100%"}} onClick={()=>{
                const n=parseInt(numInput,10);
                if(isNaN(n)||n<1900||n>2030){setNumError("1900〜2030の西暦を入力してください");return;}
                setProfile({...profile,[sheet.key]:n}); setSheet(null);
              }}>保存</button>
            </>}

            {sheet.opts&&<>
              {sheet.multi&&<div style={{color:C.t2,fontSize:12,marginTop:6,marginBottom:2}}>複数選択できます</div>}
              <div style={{marginTop:8}}>
                {sheet.opts.map(v=>{
                  const converted=sheet.boolKeys?(sheet.boolKeys[v]||v):v;
                  const cur=profile[sheet.key];
                  const isSel=sheet.multi
                    ? (Array.isArray(cur)?cur.includes(v):cur===v)
                    : (cur===converted||cur===v);
                  return (
                    <button key={v}
                      style={{...S.btn(isSel?C.blue:C.bg3),border:`1px solid ${isSel?C.blue:C.border}`,width:"100%",marginBottom:8,textAlign:"left",display:"flex",alignItems:"center",gap:8}}
                      onClick={()=>saveSheetValue(v)}>
                      {sheet.multi&&<span style={{width:16,height:16,borderRadius:4,border:`2px solid ${isSel?"#fff":C.t3}`,background:isSel?"#fff":"transparent",color:C.blue,fontSize:12,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{isSel?"✓":""}</span>}
                      {v}
                    </button>
                  );
                })}
                {sheet.multi&&<button style={{...S.btn(C.blue),width:"100%",marginTop:4}} onClick={()=>setSheet(null)}>完了</button>}
              </div>
            </>}

            {sheet.useTownPicker&&<>
              <div style={{marginTop:8}}>
                <TownPicker
                  onSelect={v=>{setProfile({...profile,town:v});setSheet(null);}}
                  currentValue={profile.town||""}
                />
              </div>
            </>}

            {!sheet.opts&&!sheet.inputType&&(
              <div style={{color:C.t2,fontSize:13,marginBottom:12,marginTop:8}}>
                現在：{profile[sheet.key]||"未設定"}<br/>
                <span style={{fontSize:11,color:C.t3}}>クイズから自動設定されます</span>
              </div>
            )}
            <button style={{...S.btn(C.bg3),width:"100%",border:`1px solid ${C.border}`,marginTop:4}} onClick={()=>setSheet(null)}>キャンセル</button>
          </div>
        </div>
      )}

      {/* ── 設定ボタン群 ── */}
      <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:8}}>
        <div style={{background:C.bg2,borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{color:C.t1,fontWeight:600,fontSize:13}}>{darkMode?"🌙 ダークモード":"☀️ ライトモード"}</div>
            <div style={{color:C.t3,fontSize:11,marginTop:2}}>タップで切り替え</div>
          </div>
          <div onClick={()=>setDarkMode(d=>!d)} style={{width:44,height:26,borderRadius:13,background:darkMode?C.blue:C.t3,cursor:"pointer",position:"relative",transition:"background .25s",flexShrink:0}}>
            <div style={{position:"absolute",top:3,left:darkMode?21:3,width:20,height:20,borderRadius:10,background:"#fff",transition:"left .25s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}}/>
          </div>
        </div>
        {/* 通知許可ボタン */}
        <NotificationButton />
        <button style={{width:"100%",...S.btn(C.bg3,true),border:`1px solid ${C.border}`,color:C.t2,fontSize:13}} onClick={onResetQuiz}>
          🔄 最初の質問からやり直す
        </button>
        {onShowAdmin && (
        <button style={{width:"100%",...S.btn(C.bg3,true),border:`1px solid ${C.border}`,color:C.t3,fontSize:12}} onClick={onShowAdmin}>
          ⚙️ 制度を追加・管理する
        </button>
        )}
        {/* 🧪 開発テスト */}
        {(onTestNewItems||onTestSeasonal||onTestRecheck) && (
          <div style={{marginTop:8,padding:"12px",background:C.bg2,borderRadius:12,border:`1px dashed ${C.border}`}}>
            <div style={{color:C.t3,fontSize:10,marginBottom:8,fontWeight:600}}>🧪 開発テスト（通知・ポップ）</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {onTestNewItems && (

/* ─── AdminTab: URL/PDFテキスト → AI抽出 → 確認 → 追加 ─── */
function AdminTab({onAddItem, existingIds}){
  const [input,setInput]=useState("");
  const [inputType,setInputType]=useState("url"); // "url" | "text"
  const [loading,setLoading]=useState(false);
  const [proposals,setProposals]=useState([]);
  const [error,setError]=useState("");

  const CONDITION_OPTIONS=["全員","子あり","学生","社会人","賃貸","持ち家","40歳以上","60歳以上","65歳以上","70歳以上","20歳未満","年金生活者"];

  const extract = async () => {
    if(!input.trim()){setError("URLまたはテキストを入力してください");return;}
    setLoading(true); setError(""); setProposals([]);

    const sourceDesc = inputType==="url"
      ? "対象URL: "+input
      : "テキスト内容:\n"+input;
    const inputTypeLabel = inputType==="url" ? "URL（Web検索して内容を取得）" : "テキスト";

    const prompt = "あなたは港区民向け行政情報アプリの制度データ抽出AIです。\n\n"
      + "以下の"+inputTypeLabel+"から、港区民が受け取れる給付金・補助金・減免・手当・無料サービスの情報のみを抽出し、JSON配列で返してください。\n\n"
      + "【抽出する情報】給付金・補助金・手当・助成金・医療費助成・保育料減免・無料施設利用など、区民が金銭的または実質的メリットを受けられる制度\n\n"
      + "【抽出しない情報】講座・イベント・セミナーの参加募集、求人・委員募集、工事・道路閉鎖のお知らせ、選挙・投票のお知らせ、施設の休館・変更案内\n\n"
      + sourceDesc + "\n\n"
      + "以下のJSON形式で、見つかった制度を全て列挙してください。条件は必ず下記リストから選んでください：\n"
      + '条件の選択肢: "全員", "子あり", "学生", "社会人", "賃貸", "持ち家", "40歳以上", "60歳以上", "65歳以上", "70歳以上", "20歳未満", "年金生活者"\n\n'
      + "返すJSONの形式（配列、前置き・後置き・コードブロック不要）:\n"
      + '[\n  {\n'
      + '    "title": "制度名（簡潔に）",\n'
      + '    "gov": "国" または "東京都" または "港区",\n'
      + '    "tag": "子育て" または "住まい" または "健康" または "キャリア" または "教育" または "生活",\n'
      + '    "icon": "絵文字1文字",\n'
      + '    "catch": "一言でわかるキャッチコピー（20文字以内）",\n'
      + '    "body": "制度の詳細説明（150文字以内）",\n'
      + '    "subsidyType": "cash" または "savings" または "info",\n'
      + '    "subsidyAmount": 給付額（数値・円単位、不明なら0）,\n'
      + '    "subsidyLabel": "金額の表示文字列（例：年12万円）",\n'
      + '    "potentialSubsidy": 最大可能性額（数値・円単位）,\n'
      + '    "conditions": ["条件1", "条件2"],\n'
      + '    "needsMore": "確定に必要な追加情報または null",\n'
      + '    "deadline": "申請期限",\n'
      + '    "urgent": false,\n'
      + '    "reminderLabel": "リマインドすべき行動（1文）",\n'
      + '    "sourceUrl": "公式URL"\n'
      + '  }\n]\n\n'
      + "制度が見つからない場合は空配列 [] を返してください。JSONのみ返してください。";

    try {
      const tools = inputType==="url" ? [{type:"web_search_20250305",name:"web_search"}] : undefined;
      const resp = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:4000,
          ...(tools?{tools}:{}),
          messages:[{role:"user",content:prompt}],
        }),
      });
      const data = await resp.json();
      const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const clean = text.replace(/```json|```/g,"").trim();
      const start = clean.indexOf("["); const end = clean.lastIndexOf("]");
      if(start===-1) throw new Error("制度情報が見つかりませんでした");
      const parsed = JSON.parse(clean.slice(start,end+1));
      // 既存IDと重複チェック
      const filtered = parsed.filter(p=>!existingIds.includes(p.id));
      setProposals(filtered.map(p=>({...p,_accepted:false,_editing:false})));
      if(filtered.length===0) setError("新しい制度は見つかりませんでした（すでに登録済みの可能性）");
    } catch(e){
      setError("抽出に失敗しました: "+e.message);
    }
    setLoading(false);
  };

  const toggleAccept=(i)=>setProposals(ps=>ps.map((p,j)=>j===i?{...p,_accepted:!p._accepted}:p));
  const addAccepted=()=>{
    const accepted=proposals.filter(p=>p._accepted);
    accepted.forEach(p=>{
      const {_accepted,_editing,...raw}=p;
      onAddItem(buildDynamicItem(raw));
    });
    setProposals(ps=>ps.filter(p=>!p._accepted));
  };

  return (
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
      <div style={{color:C.t1,fontWeight:700,fontSize:15,marginBottom:4}}>⚙️ 制度を自動追加</div>
      <div style={{color:C.t2,fontSize:12,marginBottom:14}}>URLか広報テキストを貼るとAIが制度を抽出します</div>

      {/* 入力タイプ切替 */}
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {[["url","🔗 URL"],["text","📄 テキスト"]].map(([v,l])=>(
          <button key={v} style={{flex:1,...S.btn(inputType===v?C.blue:C.bg3,true),border:`1px solid ${inputType===v?C.blue:C.border}`}} onClick={()=>setInputType(v)}>{l}</button>
        ))}
      </div>

      {inputType==="url"?(
        <input
          value={input} onChange={e=>setInput(e.target.value)}
          placeholder="例: https://www.city.minato.tokyo.jp/..."
          style={{width:"100%",background:C.bg3,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 14px",color:C.t1,fontSize:13,outline:"none",marginBottom:10}}
        />
      ):(
        <textarea
          value={input} onChange={e=>setInput(e.target.value)}
          placeholder="広報みなとのPDFテキストや制度説明文をここに貼り付け..."
          rows={6}
          style={{width:"100%",background:C.bg3,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 14px",color:C.t1,fontSize:12,outline:"none",marginBottom:10,resize:"vertical",fontFamily:"inherit"}}
        />
      )}

      <button style={{...S.btn(C.blue),width:"100%",marginBottom:12,opacity:loading?0.6:1}} onClick={extract} disabled={loading}>
        {loading?"🔍 AIが抽出中...":"🔍 制度を抽出する"}
      </button>

      {loading&&(
        <div style={{textAlign:"center",marginBottom:12}}>
          <div style={{width:32,height:32,border:`3px solid ${C.blue}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 8px"}}/>
          <div style={{color:C.t2,fontSize:12}}>公式サイトを読んで制度を整理しています…</div>
        </div>
      )}
      {error&&<div style={{color:C.red,fontSize:12,marginBottom:10}}>{error}</div>}

      {/* 抽出結果 */}
      {proposals.length>0&&<>
        <div style={{color:C.t1,fontWeight:700,fontSize:13,marginBottom:8}}>{proposals.length}件の制度が見つかりました</div>
        {proposals.map((p,i)=>(
          <div key={i} style={{...S.card,border:`1px solid ${p._accepted?C.green+"66":C.border}`,marginBottom:10}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
              <div style={{fontSize:24,flexShrink:0}}>{p.icon||"📋"}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                  <span style={S.tag(C.blue)}>{p.gov}</span>
                  <span style={S.tag(C.t2)}>{p.tag}</span>
                  {p.conditions&&p.conditions.map(c=><span key={c} style={S.tag(C.purple)}>{c}</span>)}
                </div>
                <div style={{color:C.t1,fontWeight:700,fontSize:13,marginBottom:2}}>{p.title}</div>
                <div style={{color:C.t2,fontSize:11,marginBottom:4}}>{p["catchText"]||p["catch"]}</div>
                <div style={{color:C.t2,fontSize:11,lineHeight:1.5}}>{p.body}</div>
                {p.subsidyAmount>0&&<div style={{color:C.blue,fontWeight:700,fontSize:13,marginTop:4}}>💙 {p.subsidyLabel||fmt(p.subsidyAmount)}</div>}
                <div style={{color:C.t3,fontSize:10,marginTop:4}}>📅 {p.deadline}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:10,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
              <button style={{flex:1,...S.btn(p._accepted?C.green:C.bg3,true),border:`1px solid ${p._accepted?C.green:C.border}`}} onClick={()=>toggleAccept(i)}>
                {p._accepted?"✅ 追加する":"追加する"}
              </button>
              <button style={{...S.btn(C.bg3,true),border:`1px solid ${C.border}`}} onClick={()=>setProposals(ps=>ps.filter((_,j)=>j!==i))}>
                🗑 却下
              </button>
            </div>
          </div>
        ))}
        {proposals.some(p=>p._accepted)&&(
          <button style={{...S.btn(C.green),width:"100%",marginTop:4,fontWeight:700}} onClick={addAccepted}>
            ✅ 選択した制度をアプリに追加
          </button>
        )}
      </>}
    </div>
  );
}

/* ══════ 中間状態の再確認ポップ ══════ */
function RecheckPopup({ recheck, profile, onResolve, onClose }){
  // その項目の選択肢（中間状態を除いた確定値）を出す
  const fieldDef = (function(){
    for(const g of UNIFIED_GROUPS) for(const f of g.fields) if(f.key===recheck.field) return f;
    return null;
  })();
  const opts = (fieldDef?.opts||[]).filter(o=>!INTERIM_VALUES.includes(o));
  const pick=(opt)=>{
    const bk = fieldDef?.boolKeys ? (fieldDef.boolKeys[opt]||opt) : opt;
    onResolve(recheck.field, recheck.value, bk);
  };
  return (
    <PopSheet onClose={onClose} z={320} maxH="auto">
      <div style={{textAlign:"center",marginBottom:16}}>
        <div style={{fontSize:28,marginBottom:6}}>🔔</div>
        <div style={{fontSize:15,fontWeight:700,color:C.t1,lineHeight:1.5}}>{recheck.msg}</div>
        <div style={{fontSize:12,color:C.t2,marginTop:6}}>現在の状況を選んでください</div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
        {opts.map(o=>(
          <button key={o} onClick={()=>pick(o)}
            style={{...S.btn(C.bg3),border:`1px solid ${C.border}`,color:C.t1,flex:"1 1 calc(50% - 4px)",fontSize:13}}>{o}</button>
        ))}
      </div>
      <button onClick={onClose} style={{background:"none",border:"none",padding:6,color:C.t2,fontSize:13,fontWeight:600,cursor:"pointer",width:"100%"}}>まだ変わっていない</button>
    </PopSheet>
  );
}

/* ══════ 季節の確認ポップ（年2回・4月初旬と10月初旬のみ） ══════ */
// 表示対象の期間キーを返す。4月初旬・10月初旬の各2週間だけ非nullを返す。
// それ以外の期間は null（＝表示しない）。同一期間は1回だけ（キーで重複排除）。
function currentSeasonKey(){
  const n=new Date();
  const m=n.getMonth()+1, d=n.getDate();
  if(m===4  && d<=14) return `${n.getFullYear()}-04`; // 4月初旬（新年度）
  if(m===10 && d<=14) return `${n.getFullYear()}-10`; // 10月初旬（秋）
  return null;
}
function shouldShowSeasonal(){
  const key=currentSeasonKey();
  return key!==null && lsLoad(LS_SEASONAL_AT,null)!==key;
}
function seasonGreeting(){
  const m=new Date().getMonth()+1;
  // 4〜9月（春夏）
  if(m>=4&&m<=9) return {emoji:"🌸",text:"新年度になりました。状況に変化はありましたか？"};
  // 10〜3月（秋冬）
  return {emoji:"🍁",text:"秋になりました。最近、変化はありましたか？"};
}
const SEASONAL_KIDS_UNDER13 = (p)=>{
  if(Array.isArray(p.kids)&&p.kids.length) return p.kids.some(k=>{const a=ageFromBirthday(`${k.birthYear}-${k.birthMonth||1}`);return a!==null&&a<=12;});
  return ["0〜2歳","3〜5歳","6〜12歳"].includes(p.kidsAge);
};
const SEASONAL_FIELDS = [
  {key:"income",always:true},
  {key:"housing",always:true},
  {key:"stage",always:true},
  {key:"childcareStatus",showIf:p=>SEASONAL_KIDS_UNDER13(p)},
  {key:"leaveStatus",showIf:p=>p.leaveStatus&&p.leaveStatus!=="通常勤務"},
  {key:"pregnancyStatus",showIf:p=>p.pregnancyStatus==="pregnant"},
];
const SEASONAL_DEFS = {
  income:{label:"世帯年収",emoji:"💰"},
  housing:{label:"住居形態",emoji:"🏠"},
  stage:{label:"ライフステージ",emoji:"🧭"},
  childcareStatus:{label:"保育・通園状況",emoji:"🏫"},
  leaveStatus:{label:"休職・休業状況",emoji:"🛌"},
  pregnancyStatus:{label:"妊娠の状況",emoji:"🤰"},
};
const seasonalHasKids = (p)=> p.hasKids==="いる（または予定あり）" || (Array.isArray(p.kids)&&p.kids.length>0);

                return <button key={opt} onClick={()=>{setDraft(d=>({...d,[k]:bk,profileAnsweredAt:stamp(d,k)}));setEditing(null);}}
                  style={{...S.btn(sel?C.blue:C.bg3),border:`1px solid ${sel?C.blue:C.border}`,fontSize:13,padding:"8px 13px"}}>{opt}</button>;})}
            </div>}
          </div>;
        })}
      </div>
      <button onClick={()=>onSave(draft)} style={{...S.btn(C.blue),width:"100%",marginBottom:9}}>更新して閉じる</button>
      <button onClick={onOpenProfile} style={{...S.btn(C.bg2),border:`1px solid ${C.border}`,color:C.t1,width:"100%",marginBottom:9}}>他のプロフィールも確認する →</button>
      <button onClick={onClose} style={{background:"none",border:"none",padding:6,color:C.t2,fontSize:13,fontWeight:600,cursor:"pointer",width:"100%"}}>変化なし・閉じる</button>
    </PopSheet>
    {kidsSheet&&<KidsSheetPop kids={draft.kids} onClose={()=>setKidsSheet(false)} onSave={(l)=>{setDraft(d=>({...d,kids:l}));setKidsSheet(false);}}/>}
    {bdaySheet&&<BirthdaySheetPop birthday={draft.birthday} onClose={()=>setBdaySheet(false)} onSave={(bd)=>{setDraft(d=>({...d,birthday:bd}));setBdaySheet(false);}}/>}
  </React.Fragment>;
}
