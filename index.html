     {"_alwaysExclude": true}→ 常に除外（期限切れ制度）
   ════════════════════════════════════════════════════════ */

// 中間状態ごとの再確認までの待機日数
const RECHECK_AFTER_DAYS = {
  "申請中": 28, "購入予定（軽自動車）": 56, "購入予定（EV）": 56,
  "購入予定（普通車）": 56, "購入予定": 84, "飼育予定": 42,
};
function recheckMessage(field){
  if(field==="hasMynumber") return "マイナンバーカードは届きましたか？";
  if(field==="vehicleType") return "車のご予定はその後どうなりましたか？";
  if(field==="housingDetail") return "お住まいのご予定はその後どうなりましたか？";
  if(field==="petType") return "ペットのお迎えはその後どうなりましたか？";
  return "その後、状況に変化はありましたか？";
}
const LS_RECHECKS = "mgov_rechecks";
function registerRechecks(profile){
  const list = lsLoad(LS_RECHECKS, []); const now = Date.now(); let changed=false;
  for(const [field, raw] of Object.entries(profile)){
    const vals = Array.isArray(raw) ? raw : [raw];
    for(const v of vals){
      if(!INTERIM_VALUES.includes(v)) continue;
      if(list.some(r=>r.field===field && r.value===v && r.dueAt>now)) continue;
      const days = RECHECK_AFTER_DAYS[v] ?? 42;
      list.push({ field, value:v, dueAt: now+days*86400000, msg: recheckMessage(field) });
      changed=true;
      if(typeof Notification!=="undefined" && Notification.permission==="granted")
        scheduleServerRecheck(field, v, now+days*86400000, recheckMessage(field));
    }
  }
  const cleaned = list.filter(r=>{ const cur=profile[r.field]; const vals=Array.isArray(cur)?cur:[cur]; return vals.includes(r.value); });
  if(changed || cleaned.length!==list.length) lsSave(LS_RECHECKS, cleaned);
}
function getDueRecheck(){ const now=Date.now(); return lsLoad(LS_RECHECKS,[]).find(r=>r.dueAt<=now)||null; }
function clearRecheck(field,value){ lsSave(LS_RECHECKS, lsLoad(LS_RECHECKS,[]).filter(r=>!(r.field===field&&r.value===value))); }
async function scheduleServerRecheck(field,value,dueAt,msg){
  try{ const reg=window._swReg||(await navigator.serviceWorker?.ready); const sub=reg&&await reg.pushManager.getSubscription(); if(!sub) return;
    await fetch(`${PUSH_WORKER_URL}/schedule-recheck`,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({endpoint:sub.endpoint,field,value,dueAt,message:msg})}); }catch(e){}
}

// ── 判定ロジックは eligibility-engine.js に集約（SWと共有） ──
// ageFromBirthday / householdSize / isLikelyTaxExempt / isInterim / calcHouseholdStats /
// matchCount / evalCondition / evalCondArray / PROFILE_RECHECK_DAYS / shouldAsk /
// evaluateProfileCheckMatch / checkProfileQuiz / calcEligibilityData は engine 側で定義。

function getConfidenceData(item, profile) {
  const el = item.eligibility;
  if (!el) return "needs_profile";
  const { certain, matchScore, missing } = calcEligibilityData(profile, el);
  if (certain) return "certain";
  if (matchScore === 0) {
    // matchScore 0 でも未回答の判定質問が残るなら「関係あるかも(要確認)」として表示し、
    // クイズで確認させる（exclude確定時は missing=[] になり "none" のまま非表示）。
    if (missing && missing.length > 0) return "needs_profile";
    return "none";
  }
  return "needs_profile";
}

function getMissingQuestionsData(item, profile) {
  const el = item.eligibility;
  if (!el) return [];
  const keys = [];
  (el.missingFor || []).forEach(k => { if (!profile[k] || profile[k] === "") keys.push(k); });
  // profileCheck の未回答も質問対象に合流
  const pq = checkProfileQuiz(el, profile);
  if (pq.status === "needs_quiz") pq.questions.forEach(q => { if (!keys.includes(q.field)) keys.push(q.field); });
  return keys
    .map(k => ALL_PROFILE_QUESTIONS[k] ? { key: k, ...ALL_PROFILE_QUESTIONS[k] } : null)
    .filter(Boolean);
}

function getExclusionReasonData(item, profile) {
  const el = item.eligibility;
  if (!el || !el.excludeReasons) return "現在の条件では対象外です";
  const reasons = el.excludeReasons;
  const hit = Object.keys(reasons).find(k => {
    if (k === "hasKids") return profile.hasKids !== "いる（または予定あり）";
    if (k === "ageNum") return true;
    return !!profile[k];
  });
  return hit ? reasons[hit] : "現在の条件では対象外です";
}

function getEligibilityHintData(item, profile) {
  const el = item.eligibility;
  if (!el || !el.hints) return null;
  const vals = Object.values(el.hints);
  return vals.length > 0 ? vals[0] : null;
}

// ── 補助金額計算 ──────────────────────────────────────────
function calcSubsidy(item, profile) {
  if (!item.subsidyRules) return item.subsidyFixed || 0;
  for (const rule of item.subsidyRules) {
    if (rule.default) return rule.amount;
    if (rule["if"] && evalCondition(rule["if"], profile)) return rule.amount;
  }
  return 0;
}

function calcSubsidyLabel(item, profile) {
  if (!item.subsidyLabelRules) return null;
  for (const rule of item.subsidyLabelRules) {
    if (rule.default) return rule.label;
    if (rule["if"] && evalCondition(rule["if"], profile)) return rule.label;
  }
  return null;
}

function convertDbItem(raw) {

    red: ()=>C.red, t2: ()=>C.t2, t3: ()=>C.t3,
  };
  return {
    ...raw,
    get color() { return (colorMap[raw.colorKey] || (() => C.blue))(); },
    title: raw.easyTitle || raw.title, // easyTitle優先（後でeasyフラグで切り替え）
    subsidy: (p) => calcSubsidy(raw, p),
    subsidyLabel: (p) => calcSubsidyLabel(raw, p),
    // 旧API互換（easyTitle/catchTextアクセス）
    easyTitle: raw.easyTitle || raw.title,
    catchText: raw.catch,
  };
}

// ── items-db.json 読み込み ─────────────────────────────────
async function loadItemsDB() {
  try {
    const res = await fetch("./items-db.json?" + Date.now());
    const db = await res.json();
    ITEMS_BASE = (db.items || []).map(convertDbItem);
    REPEATABLE_IDS = new Set(db.repeatableIds || []);
    FESTIVALS_DB = db.festivals || [];
    if (db.townCoords) TOWN_COORDS = db.townCoords;

    // ── 新着チェック ──
    const dbUpdatedAt = db._meta?.updatedAt || "";
    const lastSeenAt  = localStorage.getItem(LS_LAST_SEEN_AT) || "";
    const seenIds     = JSON.parse(localStorage.getItem(LS_SEEN_IDS) || "[]");
    const allIds      = (db.items || []).map(it => it.id);

    if (!lastSeenAt) {
      // 初回アクセス → 全IDを既読として記録、通知なし
      NEW_ITEMS_SINCE_LAST = [];
      localStorage.setItem(LS_SEEN_IDS, JSON.stringify(allIds));
      localStorage.setItem(LS_LAST_SEEN_AT, dbUpdatedAt);
      // IDBにも同期（SWが「全件既読」と認識できるよう）
      if (window.saveSeenToIDB) window.saveSeenToIDB(allIds, dbUpdatedAt);
    } else if (dbUpdatedAt && dbUpdatedAt !== lastSeenAt) {
      // 2回目以降 かつ DB更新あり → 未見IDのみ新着
      NEW_ITEMS_SINCE_LAST = allIds.filter(id => !seenIds.includes(id));
      // 旧seenIdsをIDBへ同期（SWが正確な差分を計算できるよう）
      // ※ allIdsへの更新はポップアップを閉じる markNewItemsRead() で行う
      if (window.saveSeenToIDB) window.saveSeenToIDB(seenIds, lastSeenAt);
    } else {
      // 変化なし → 現在の全IDをIDBに同期しておく
      NEW_ITEMS_SINCE_LAST = [];
      if (window.saveSeenToIDB) window.saveSeenToIDB(allIds, dbUpdatedAt);
    }

    return { ok: true, updatedAt: dbUpdatedAt, allIds };
  } catch (e) {
    console.error("items-db.json の読み込みに失敗しました:", e);
    return { ok: false };
  }
}

/* ════════════════════════════════════════════════════════
   interestScores — いいね・申請済みから興味スコアを計算
   ════════════════════════════════════════════════════════ */

// getItemTags / getItemInterestScore は eligibility-engine.js に集約（SWと共有）

// いいね=1票、申請済み=2票の割合で管理（腐らない）
function calcInterestScores(liked, done, allItems) {
  const votes = {};
  const totalVotes = { l1: 0, l2: 0, l3: 0 };
  [...liked.map(id => ({id, weight:1})), ...done.map(id => ({id, weight:2}))]
    .forEach(({id, weight}) => {
      const item = allItems.find(it => it.id === id);
      getItemTags(item).forEach(({l1, l2, l3}) => {
        if (l1) { votes[`l1:${l1}`] = (votes[`l1:${l1}`]||0) + weight; totalVotes.l1 += weight; }
        if (l2) { votes[`l2:${l2}`] = (votes[`l2:${l2}`]||0) + weight; totalVotes.l2 += weight; }
        if (l3) { votes[`l3:${l3}`] = (votes[`l3:${l3}`]||0) + weight; totalVotes.l3 += weight; }
      });
    });
  const scores = {};
  Object.entries(votes).forEach(([key, v]) => {
    const level = key.split(':')[0];
    const total = totalVotes[level];
    scores[key] = total > 0 ? v / total : 0;
  });
  return scores;
}

function getEligibilityHint(item, profile) { return getEligibilityHintData(item, profile); }

// ── 興味ヒアリング：まだ興味が分からない中分類(l2)を1つ選ぶ（無ければnull） ──
// いいね/申請で貯まる興味スコアの空白を、ポップで1問ずつ埋めて通知精度・並び順を上げる。
function pickInterestQuestion(allItems, profile){
  const scores=(profile&&profile.interestScores)||{};
  const prefs=(profile&&profile.interestPrefs)||{};
  const dismissed=(profile&&profile.interestDismissed)||[];
  const counts={}, meta={};
  // 興味は「イベント(interest型)」の通知・並び順にのみ効くので、イベントのタグだけを対象にする
  (allItems||[]).filter(it=>(it.judgmentType||"eligibility")==="interest").forEach(it=>{
    (getItemTags(it)||[]).forEach(({l1,l2})=>{
      if(!l2) return;
      const key="l2:"+l2;
      if((scores[key]||0)>0) return;     // 既に興味が分かっている
      if(prefs[key]!==undefined) return; // 既に明示回答済み
      if(dismissed.includes(key)) return;// 「興味なし」で除外済み
      counts[l2]=(counts[l2]||0)+1; meta[l2]={l1,l2};
    });
  });
  const ranked=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  return ranked.length? meta[ranked[0]] : null;
}

// ── バナー計算（UI互換） ──────────────────────────────────
const calcBanner = (profile, items, done=[], hidden=[]) => {
  let cash=0, savings=0, potential=0;
  items.forEach(it => {
    if ((done||[]).includes(it.id) || (hidden||[]).includes(it.id)) return;
    try {
      const el = it.eligibility;
      let isCertain = false;
      if (el) {
        if (el.exclude && el.exclude.some(c => evalCondition(c, profile))) return;
        isCertain = !!(el.certain && el.certain.length > 0 && evalCondArray(el.certain, profile, "and"));
      }
      if (isCertain && it.subsidy(profile) > 0) {
        if (it.subsidyType === "cash") cash += it.subsidy(profile);
        else if (it.subsidyType === "savings") savings += it.subsidy(profile);
      } else if (!isCertain && it.potentialSubsidy > 0) {
        potential += it.potentialSubsidy;
      }
    } catch(e) {}
  });
  return { cash, savings, potential };
};

// ── 動的制度ビルダー（AdminTab用） ────────────────────────
function buildDynamicItem(raw) {
  const conditions = raw.conditions || [];
  const id = raw.id || `dynamic_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;

  // 条件テキスト → eligibility データ形式に変換
  const certainConds = [];
  const scoreConds = [];

  conditions.forEach(c => {
    if (c === "全員") {
      certainConds.push({ _always: true });
    } else if (c === "子あり") {
      certainConds.push({ hasKids: "いる（または予定あり）" });
      scoreConds.push({ "if": { hasKids: "いる（または予定あり）" }, score: 40 });
    } else if (c.includes("歳以上")) {
      const n = parseInt(c);
      certainConds.push({ ageMin: n });
      scoreConds.push({ "if": { ageMin: n }, score: 40 });
    } else if (c.includes("歳未満")) {
      const n = parseInt(c);
      certainConds.push({ ageMax: n - 1 });
      scoreConds.push({ "if": { ageMax: n - 1 }, score: 30 });
    } else if (c === "学生") {
      certainConds.push({ stage: "学生" });
      scoreConds.push({ "if": { stage: "学生" }, score: 40 });
    } else if (c === "社会人") {
      certainConds.push({ stage: ["社会人（会社員）","社会人（フリーランス・自営）"] });
      scoreConds.push({ "if": { stage: ["社会人（会社員）","社会人（フリーランス・自営）"] }, score: 35 });
    } else if (c === "賃貸") {
      certainConds.push({ housing: "賃貸" });
      scoreConds.push({ "if": { housing: "賃貸" }, score: 40 });
    } else if (c === "持ち家") {
      certainConds.push({ housing: ["持ち家（戸建て）","持ち家（マンション）"] });
      scoreConds.push({ "if": { housing: ["持ち家（戸建て）","持ち家（マンション）"] }, score: 40 });
    } else if (c === "年金生活者") {
      certainConds.push({ stage: "年金生活者" });
      scoreConds.push({ "if": { stage: "年金生活者" }, score: 40 });
    } else {
      scoreConds.push({ "if": { _always: true }, score: 20 });
    }
  });

  const eligibility = {
    certain: certainConds,
    exclude: [],
    matchRules: scoreConds,
    baseScore: conditions.length === 0 ? 50 : 0,
    missingFor: [],
    excludeReasons: {},
    hints: {},
  };

  const subsidyAmount = raw.subsidyAmount || 0;
  return {
    ...raw,
    id,
    eligibility,
    get color() { return C.blue; },
    subsidy: (p) => {
      const { certain } = calcEligibilityData(p, eligibility);
      return certain ? subsidyAmount : 0;
    },
    subsidyLabel: (p) => {
      const { certain } = calcEligibilityData(p, eligibility);
      return certain ? (raw.subsidyLabel || null) : null;
    },
    dynamic: true,
  };
}

const calcDist = (a1,o1,a2,o2) => {
  const R=6371000,dLat=(a2-a1)*Math.PI/180,dLng=(o2-o1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};

/* ─── RevealScreen: クイズ完了後の演出 ─── */
function RevealScreen({profile, items, onEnter, done=[], hidden=[]}){
  const banner = calcBanner(profile, items, done, hidden);
  const total = banner.cash + banner.savings;
  const certainCount = items.filter(it=>{
    const el=it.eligibility;
    return el ? calcEligibilityData(profile,el).certain : false;
  }).length;
  const maybeCount = items.filter(it=>{
    const el=it.eligibility;
    const score = el ? calcEligibilityData(profile,el).matchScore : 0;
    return score>0 && score<100;
  }).length;

  const [displayed, setDisplayed] = useState(0);
  const [phase2, setPhase2] = useState(false);
  const [phase3, setPhase3] = useState(false);
  const [exiting, setExiting] = useState(false); // ← 退場アニメ用

  useEffect(()=>{
    if(total===0){ setPhase2(true); setTimeout(()=>setPhase3(true),600); return; }
    let start = null;
    const duration = 1800;
    const ease = (t) => t<0.5 ? 2*t*t : -1+(4-2*t)*t;
    const step = (ts) => {
      if(!start) start=ts;
      const progress = Math.min((ts-start)/duration, 1);
      setDisplayed(Math.floor(ease(progress)*total));
      if(progress<1){ requestAnimationFrame(step); }
      else{
        setDisplayed(total);
        setTimeout(()=>setPhase2(true), 300);
        setTimeout(()=>setPhase3(true), 900);
      }
    };
    const raf = requestAnimationFrame(step);
    return ()=>cancelAnimationFrame(raf);
  },[]);

  const handleEnter = () => {
    setExiting(true);
    setTimeout(onEnter, 480); // アニメ完了後に遷移
  };

  return (
    <div style={{
      flex:1, display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"center",
      background:C.bg0, padding:"32px 28px 48px", gap:0,
      // 入場：下からフェードイン / 退場：拡大しながらフェードアウト
      animation: exiting ? "none" : "fadeUp .4s ease",
      opacity: exiting ? 0 : 1,
      transform: exiting ? "scale(1.12)" : "scale(1)",
      transition: exiting ? "opacity .5s cubic-bezier(.4,0,1,1), transform .5s cubic-bezier(.4,0,1,1)" : "none",
      pointerEvents: exiting ? "none" : "all",
    }}>
      <div style={{color:C.t3, fontSize:12, letterSpacing:1, marginBottom:20, fontWeight:600}}>
        診断完了 🎉
      </div>

      <div style={{textAlign:"center", marginBottom:8}}>
        <div style={{color:C.t3, fontSize:12, marginBottom:8}}>あなたが受け取れる年間総額（確実分）</div>
        <div style={{
          color:C.blue, fontWeight:700,
          fontSize: displayed >= 1000000 ? 42 : displayed >= 100000 ? 46 : 50,
          letterSpacing:-1, lineHeight:1.1,
          transition:"font-size .2s",
          minHeight:60,
        }}>
          ¥{displayed.toLocaleString()}
        </div>
      </div>

      <div style={{
        display:"flex", gap:16, marginTop:20, marginBottom:24,
        opacity:phase2?1:0, transform:phase2?"translateY(0)":"translateY(10px)",
        transition:"opacity .5s ease, transform .5s ease",
      }}>
        <div style={{textAlign:"center", background:C.blue+"15", borderRadius:14, padding:"12px 20px"}}>
          <div style={{color:C.t3, fontSize:10, marginBottom:4}}>💙 現金給付</div>
          <div style={{color:C.blue, fontWeight:700, fontSize:18}}>{banner.cash.toLocaleString()}円</div>
        </div>
        <div style={{textAlign:"center", background:C.green+"15", borderRadius:14, padding:"12px 20px"}}>
          <div style={{color:C.t3, fontSize:10, marginBottom:4}}>💚 節約・割引</div>
          <div style={{color:C.green, fontWeight:700, fontSize:18}}>{banner.savings.toLocaleString()}円</div>
        </div>
      </div>

      <div style={{
        display:"flex", gap:10, marginBottom:36,
        opacity:phase2?1:0, transition:"opacity .5s ease .2s",
      }}>
        <span style={{background:C.green+"22", color:C.green, borderRadius:8, padding:"4px 12px", fontSize:12, fontWeight:700}}>
          ✅ 対象確実 {certainCount}件
        </span>
        <span style={{background:"#f0a03022", color:"#f0a030", borderRadius:8, padding:"4px 12px", fontSize:12, fontWeight:700}}>
          🔶 可能性あり {maybeCount}件
        </span>
      </div>

      <button
        onClick={handleEnter}
        style={{
          width:"100%", maxWidth:320,
          background:C.blue, color:"#fff",
          border:"none", borderRadius:18,
          padding:"18px", fontSize:17, fontWeight:700,
          cursor:"pointer",
          boxShadow:`0 6px 24px ${C.blue}55`,
          opacity:phase3?1:0, transform:phase3?"translateY(0)":"translateY(12px)",
          transition:"opacity .4s ease, transform .4s ease",
          pointerEvents:phase3?"all":"none",
        }}>
        制度を見る →
      </button>
      {phase3 && (
        <div style={{color:C.t3, fontSize:11, marginTop:12}}>
          可能性額を含めると最大 {(banner.potential+total).toLocaleString()}円
        </div>
      )}
      {/* 通知ボタン：許可済み・非対応は非表示 */}
      {phase3 && typeof Notification !== "undefined" && Notification.permission === "default" && (
        <NotifInlineButton/>
      )}
    </div>
  );
}

      {/* 固定CTA — スクロールエリアの外に独立して配置（backdropFilterの影響なし）*/}
      <div style={{
        flexShrink:0,
        background:`linear-gradient(to top, ${C.bg1} 65%, transparent)`,
        padding:"20px 24px 40px",
        display:"flex", flexDirection:"column", alignItems:"center", gap:10,
      }}>
        <div style={{color:C.t2, fontSize:12, textAlign:"center"}}>
          いくつ対象か、まだわかりません
        </div>
        <button
          onClick={onStart}
          style={{
            width:"100%", maxWidth:320,
            background:C.blue, color:"#fff",
            border:"none", borderRadius:16,
            padding:"16px", fontSize:16, fontWeight:700,
            cursor:"pointer",
            boxShadow:`0 4px 20px ${C.blue}66`,
            animation:"pulse 2s ease infinite",
          }}>
          ✨ あなたの制度を調べる
        </button>
        <div style={{color:C.t3, fontSize:11}}>約1分で完了・無料</div>
      </div>
    </div>
  );
}

/* ─── Quiz: 4問 + GPS ─── */
const MINATO_DISTRICTS = [
  { group: "麻布エリア",       towns: ["麻布十番","東麻布","元麻布","西麻布","南麻布","麻布台","麻布狸穴町","麻布永坂町"] },
  { group: "六本木・赤坂エリア", towns: ["六本木","赤坂","北青山","南青山"] },
  { group: "虎ノ門・愛宕エリア", towns: ["虎ノ門","愛宕","西新橋","新橋","東新橋"] },
  { group: "芝・浜松町エリア",  towns: ["芝","芝大門","芝公園","浜松町","海岸"] },
  { group: "三田・高輪エリア",  towns: ["三田","高輪","白金","白金台"] },
  { group: "港南・芝浦エリア",  towns: ["港南","芝浦"] },
];
const ALL_TOWNS = MINATO_DISTRICTS.flatMap(g => g.towns);
const AREA_OPTS = ALL_TOWNS; // GPS fallbackでも同じ地区リストを使う

const QUIZ_STEPS=[
  {key:"stage",   q:"ライフステージは？", opts:["学生","社会人（会社員）","社会人（フリーランス・自営）","育休・産休中","主婦・主夫","年金生活者","その他・無職"]},
  {key:"hasKids", q:"18歳未満のお子さんはいますか？",   opts:["いる（または予定あり）","いない（または18歳以上のみ）"]},
  {key:"housing", q:"住まいの形態は？",   opts:["持ち家（戸建て）","持ち家（マンション）","賃貸","社宅・寮","その他"]},
];

// 分岐質問
const BRANCH_STEPS={
  studentLevel:{q:"学校の種別は？", opts:["小学生","中学生","高校生","大学生・専門学生"]},
  kidsAge:{q:"お子さんの年齢は？（最年少）", opts:["0〜2歳","3〜5歳","6〜12歳","13〜15歳","16〜18歳"]},
};

// 次のステップを返す関数（分岐込み）
function getNextStep(currentKey, val, ans){
  if(currentKey==="stage"&&val==="学生") return "studentLevel";
  if(currentKey==="studentLevel") return "hasKids";
  if(currentKey==="hasKids"&&val==="いる（または予定あり）") return "kidsAge";
  if(currentKey==="kidsAge") return "housing";
  // 通常のQUIZ_STEPSの次へ
  const idx=QUIZ_STEPS.findIndex(s=>s.key===currentKey);
  if(idx>=0&&idx+1<QUIZ_STEPS.length) return QUIZ_STEPS[idx+1].key;
  return "gps";
}

function Quiz({onDone}){
  const [currentKey,setCurrentKey]=useState("age"); // age → stage → (studentLevel?) → hasKids → (kidsAge?) → housing → gps
  const [ans,setAns]=useState({});
  const [ageInput,setAgeInput]=useState("");
  const [ageError,setAgeError]=useState("");
  const [history,setHistory]=useState([]); // 戻る用
  const [gpsPhase,setGpsPhase]=useState("idle");
  const [gpsResult,setGpsResult]=useState(null);
  const [displayedTotal,setDisplayedTotal]=useState(0);
  const rafRef=useRef(null);
  const ageNumRef=useRef(null);

  const allKeys=["age","stage","studentLevel","hasKids","kidsAge","housing","gps"];
  const progress=(allKeys.indexOf(currentKey)/allKeys.length)*100;

  const handleAgeSubmit=()=>{
    const n=parseInt(ageInput,10);
    if(isNaN(n)||n<1||n>110){setAgeError("1〜110の数字を入力してください");return;}
    ageNumRef.current=n;
    setAns(a=>({...a,ageNum:n}));
    setHistory(h=>[...h,"age"]);
    setCurrentKey("stage");
  };

  const handleOpt=(key,val)=>{
    const next={...ans,[key]:val,ageNum:ageNumRef.current};
    setAns(next);
    setHistory(h=>[...h,key]);
    const nextKey=getNextStep(key,val,next);
    if(nextKey==="gps") setCurrentKey("gps");
    else setCurrentKey(nextKey);
  };

  const handleBack=()=>{
    if(history.length===0) return;
    const prev=history[history.length-1];
    setHistory(h=>h.slice(0,-1));
    setCurrentKey(prev);
  };

  // リアルタイム金額計算（その時点で確定している制度のみ）
  const calcLiveAmount=(currentAns)=>{
    const p={...currentAns};
    let cash=0, savings=0, count=0;
    const allItems=typeof ITEMS_BASE!=="undefined"?ITEMS_BASE:[];
    allItems.forEach(it=>{
      try{
        const el=it.eligibility;
        if(!el) return;
        // ELIGIBILITYのexcludeで除外される場合は絶対に含めない
        if(el.exclude&&el.exclude.some(c=>evalCondition(c,p))) return;
        // certainの全条件を満たす場合のみ確定
        if(!el.certain||el.certain.length===0) return;
        if(!evalCondArray(el.certain,p,"and")) return;
        const sub=it.subsidy(p);
        if(sub>0){
          if(it.subsidyType==="cash") cash+=sub;
          else savings+=sub;
        }
        count++;
      }catch(e){}
    });
    return{cash,savings,count};
  };

  const liveAmt=calcLiveAmount(ans);

  // 金額が変わるたびにカウントアップ
  const displayedRef=useRef(0);
  useEffect(()=>{
    const target=liveAmt.cash+liveAmt.savings;
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    if(target===0){ displayedRef.current=0; setDisplayedTotal(0); return; }
    const start=displayedRef.current;
    const diff=target-start;
    if(diff===0) return;
    const duration=700;
    let startTime=null;
    const step=(ts)=>{
      if(!startTime) startTime=ts;
      const p=Math.min((ts-startTime)/duration,1);
      const eased=1-Math.pow(1-p,3); // ease-out cubic
      const current=Math.round(start+diff*eased);
      displayedRef.current=current;
      setDisplayedTotal(current);
      if(p<1){ rafRef.current=requestAnimationFrame(step); }
      else{ displayedRef.current=target; setDisplayedTotal(target); }
    };
    rafRef.current=requestAnimationFrame(step);
    return()=>{ if(rafRef.current) cancelAnimationFrame(rafRef.current); };
  },[liveAmt.cash,liveAmt.savings]);

  // 金額バナー（クイズ中）- 常に上部に固定表示
  const LiveBanner=()=>{
    const hasAmount = liveAmt.count > 0;
    return(
      <div style={{
        background: hasAmount ? C.blue+"11" : C.bg2,
        border:`1px solid ${hasAmount ? C.blue+"33" : C.border}`,
        borderRadius:14, padding:"10px 16px",
        transition:"background .4s ease, border-color .4s ease",
        flexShrink:0,
      }}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <div style={{color:C.t3, fontSize:10}}>✨ いま確定している受給額</div>
          {hasAmount && <div style={{color:C.t3,fontSize:10}}>{liveAmt.count}件確定</div>}
        </div>
        <div style={{
          color: hasAmount ? C.blue : C.t3,
          fontWeight:700, fontSize:22, marginTop:4,
          transition:"color .4s ease",
          letterSpacing:-0.5,
        }}>
          {hasAmount ? `${displayedTotal.toLocaleString()}円` : "回答するほど確定していきます"}
        </div>
      </div>
    );
  };

  const startGps=()=>{
    setGpsPhase("loading");
    if(!navigator.geolocation){
      setGpsPhase("fallback");
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        const lat=pos.coords.latitude;
        const lng=pos.coords.longitude;
        const town=nearestTown(lat,lng);
        const dist=calcDist(lat,lng,town.lat,town.lng);
        // 港区の最寄りエリアから3km以上離れていたら港区外とみなす
        if(dist>3000){
          setGpsPhase("fallback");
          return;
        }
        setGpsResult({lat,lng,town});
        setGpsPhase("confirm");
      },
      ()=>{ setGpsPhase("fallback"); }, // 拒否・エラー時
      {timeout:10000,enableHighAccuracy:true}
    );
  };

  const finishGps=(confirmed,manualTown=null)=>{
    const coords=confirmed&&gpsResult?{lat:gpsResult.lat,lng:gpsResult.lng}:null;
    const town=confirmed&&gpsResult?gpsResult.town:{name:manualTown||"麻布十番"};
    onDone({...ans,ageNum:ageNumRef.current,coords,town:town.name,festivalCoords:coords,festivalTown:town});
  };

  const BackBtn=()=>history.length>0?(
    <button style={{background:"none",border:"none",color:C.blue,fontSize:14,cursor:"pointer",padding:"4px 0",fontWeight:600}} onClick={handleBack}>← 戻る</button>
  ):<div/>;

  // GPS画面
  if(currentKey==="gps"){
    return (
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* 上部固定エリア */}
        <div style={{padding:"16px 24px 12px",flexShrink:0,display:"flex",flexDirection:"column",gap:10}}>
          <LiveBanner/>
          <div style={{height:4,background:C.bg3,borderRadius:2}}><div style={{height:4,background:C.blue,borderRadius:2,width:"95%",transition:"width .3s"}}/></div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <BackBtn/>
            <div style={{color:C.t2,fontSize:12}}>最後のステップ</div>
            <div style={{width:40}}/>
          </div>
        </div>
        {/* スクロールコンテンツ */}
        <div style={{flex:1,padding:"0 24px 24px",display:"flex",flexDirection:"column",gap:16,overflowY:"auto"}}>
          {gpsPhase==="idle"&&<>
            <div style={{color:C.t1,fontSize:18,fontWeight:700,marginTop:8}}>📍 現在地を教えてください</div>
            <div style={{color:C.t2,fontSize:13}}>近くのお祭り・花火情報をお届けするために使います</div>
            <button style={{...S.btn(C.blue),marginTop:16}} onClick={startGps}>📍 現在地を取得する</button>
            <button style={{...S.btn(C.bg3),border:`1px solid ${C.border}`}} onClick={()=>setGpsPhase("fallback")}>許可しない</button>
          </>}
          {gpsPhase==="loading"&&<>
            <div style={{color:C.t1,fontSize:18,fontWeight:700,marginTop:8}}>📍 取得中…</div>
            <div style={{width:40,height:40,border:`3px solid ${C.blue}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"24px auto"}}/>
          </>}
          {gpsPhase==="confirm"&&gpsResult&&<>
            <div style={{color:C.t1,fontSize:18,fontWeight:700,marginTop:8}}>📍 {gpsResult.town.name}付近ですね？</div>
            <button style={{...S.btn(C.blue),marginTop:8}} onClick={()=>finishGps(true)}>✓ はい</button>
            <button style={{...S.btn(C.bg3),border:`1px solid ${C.border}`}} onClick={()=>setGpsPhase("fallback")}>違う</button>
          </>}
          {gpsPhase==="fallback"&&<>
            <div style={{color:C.t1,fontSize:18,fontWeight:700,marginTop:8}}>お住まいの地区は？</div>
            <div style={{color:C.t2,fontSize:12,marginBottom:4}}>近くのイベント情報の精度が上がります</div>
            <TownPicker
              onSelect={town => finishGps(false, town)}
              currentValue={null}
            />
          </>}
        </div>
      </div>
    );
  }

  // 年齢入力
  if(currentKey==="age") return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* 上部固定エリア */}
      <div style={{padding:"16px 24px 12px",flexShrink:0,display:"flex",flexDirection:"column",gap:10}}>
        <LiveBanner/>
        <div style={{height:4,background:C.bg3,borderRadius:2}}>
          <div style={{height:4,background:C.blue,borderRadius:2,width:`${progress}%`}}/>
        </div>
      </div>
      {/* スクロールコンテンツ */}
      <div style={{flex:1,padding:"8px 24px 24px",display:"flex",flexDirection:"column",gap:16,overflowY:"auto"}}>
        <div style={{color:C.t1,fontSize:20,fontWeight:700,marginTop:8}}>何歳ですか？</div>
        <div style={{color:C.t2,fontSize:13}}>年齢によって受けられる制度が変わります</div>
        <input
          type="number" inputMode="numeric" min="1" max="110"
          value={ageInput}
          onChange={e=>{setAgeInput(e.target.value);setAgeError("");}}
          onKeyDown={e=>e.key==="Enter"&&handleAgeSubmit()}
          placeholder="例：34"
          style={{background:C.bg3,border:`2px solid ${ageError?C.red:C.blue}`,borderRadius:14,padding:"14px 18px",color:C.t1,fontSize:28,fontWeight:700,textAlign:"center",outline:"none",width:"100%"}}
          autoFocus
        />
        {ageError&&<div style={{color:C.red,fontSize:12}}>{ageError}</div>}
        <button style={{...S.btn(C.blue),marginTop:4,fontSize:16}} onClick={handleAgeSubmit}>次へ →</button>
      </div>
    </div>
  );

  // 選択肢ステップ（QUIZ_STEPS + BRANCH_STEPS）
  const stepDef=QUIZ_STEPS.find(s=>s.key===currentKey)||
    (BRANCH_STEPS[currentKey]?{key:currentKey,...BRANCH_STEPS[currentKey]}:null);

  if(!stepDef) return null;
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* 上部固定エリア */}
      <div style={{padding:"16px 24px 12px",flexShrink:0,display:"flex",flexDirection:"column",gap:10}}>
        <LiveBanner/>
        <div style={{height:4,background:C.bg3,borderRadius:2}}>
          <div style={{height:4,background:C.blue,borderRadius:2,width:`${progress}%`,transition:"width .3s"}}/>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <BackBtn/>
          <div style={{width:40}}/>
        </div>
      </div>
      {/* スクロールコンテンツ */}
      <div style={{flex:1,padding:"0 24px 24px",display:"flex",flexDirection:"column",gap:12,overflowY:"auto"}}>
        <div style={{color:C.t1,fontSize:18,fontWeight:700,animation:"fadeUp .3s ease"}}>{stepDef.q}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:4}}>
          {stepDef.opts.map(v=>(
            <button key={v}
              style={{...S.btn(ans[currentKey]===v?C.blue:C.bg3),border:`1px solid ${ans[currentKey]===v?C.blue:C.border}`,textAlign:"left"}}
              onClick={()=>handleOpt(currentKey,v)}>
              {v}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

  return visible?(
    <div style={{position:"absolute",bottom:90,left:"50%",transform:"translateX(-50%)",background:C.bg3,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 18px",color:C.t1,fontSize:13,zIndex:200,animation:"toastIn .3s ease",whiteSpace:"nowrap"}}>
      {msg}
    </div>
  ):null;
}

function LiveBadge(){
  return <span style={S.liveTag}><span style={{width:6,height:6,background:C.red,borderRadius:"50%",animation:"pulse 1s ease infinite"}}/>LIVE</span>;
}

function InfoCard({item,profile,liked,reminded,hidden,onLike,onRemind,onHide,onClick,liveData,conf}){
  if(hidden.includes(item.id)) return null;
  const isCertain = conf==="certain";
  const amount = item.subsidy(profile);
  const isLiked = liked.includes(item.id);
  const isReminded = reminded.includes(item.id);
  const hasLive = !!liveData;

  const confBadge = isCertain
    ? {label:"✅ 対象確実",  bg:C.green+"22", color:C.green,  border:C.green+"44"}
    : {label:"🔶 関係あるかも", bg:"#f0a03022", color:"#f0a030", border:"#f0a03044"};

  return (
    <div style={{...S.card, border:`1px solid ${confBadge.border}`}} onClick={onClick}>
      <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
        <div style={{fontSize:28,flexShrink:0}}>{item.icon}</div>
        <div style={{flex:1,minWidth:0}}>
          {/* tag row */}
          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:5}}>
            <span style={S.tag(item.color)}>{item.gov}</span>
            <span style={S.tag(C.t2)}>{item.tag}</span>
            <span style={{background:confBadge.bg,color:confBadge.color,borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:700}}>
              {confBadge.label}
            </span>
            {hasLive&&<LiveBadge/>}
            {item.urgent&&<span style={S.tag(C.red)}>⚠️ 期限注意</span>}
          </div>

          <div style={{color:C.t1,fontWeight:700,fontSize:14,marginBottom:2}}>{item.title}</div>
          <div style={{color:C.t2,fontSize:12,marginBottom:6}}>{easy?(item["catchText"]||item["catch"]):item.officialName}</div>

          {/* amount */}
          {isCertain&&amount>0&&(
            <div style={{color:item.subsidyType==="cash"?C.blue:C.green,fontWeight:700,fontSize:16}}>
              {item.subsidyType==="savings"?"💚 ":"💙 "}{item.subsidyLabel(profile)}
            </div>
          )}
          {isCertain&&item.subsidyType==="info"&&(
            <div style={{color:C.t2,fontSize:13}}>📋 手続き情報</div>
          )}
          {!isCertain&&item.potentialSubsidy>0&&(
            <div style={{color:"#f0a030",fontWeight:600,fontSize:14}}>
              最大 {fmt(item.potentialSubsidy)}
              <span style={{color:C.t3,fontSize:11,fontWeight:400,marginLeft:4}}>（条件次第）</span>
            </div>
          )}
          {!isCertain&&(()=>{
            const el=item.eligibility;
            const {missing=[]}=el?calcEligibility(profile,el):{};
            if(missing.length===0) return null;
            const labels=missing.map(k=>ALL_PROFILE_QUESTIONS[k]?.label||k).join("・");
            return <div style={{color:C.t3,fontSize:11,marginTop:4}}>🔑 {labels}を入力すると確定できます</div>;
          })()}

          {/* live strip */}
          {hasLive&&(
            <div style={{marginTop:6,padding:"6px 8px",background:C.bg3,borderRadius:8,border:`1px solid ${C.red}22`}}>
              <div style={{color:C.red,fontSize:10,fontWeight:700,marginBottom:2}}>🔴 最新情報 ({liveData.fetchedAt})</div>
              <div style={{color:C.t1,fontSize:12}}>{liveData.amount}</div>
              {liveData.changes&&liveData.changes!=="変更なし"&&
                <div style={{color:C.t2,fontSize:11,marginTop:2}}>📌 {liveData.changes}</div>}
            </div>
          )}
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:10}}>

          onClick={e=>{e.stopPropagation();onLike(item.id);}}>
          {isLiked?"❤️ いいね":"🤍 いいね"}
        </button>
        <button style={{flex:1,...S.btn(isReminded?C.blue+"33":C.bg3,true),border:`1px solid ${isReminded?C.blue:C.border}`}}
          onClick={e=>{e.stopPropagation();onRemind(item.id);}}>
          {isReminded?"🔔 済":"🔕 リマインド"}
        </button>
        <button style={{flex:1,...S.btn(C.bg3,true),border:`1px solid ${C.border}`}}
          onClick={e=>{e.stopPropagation();onHide(item.id);}}>
          🙅 関係ない
        </button>
      </div>
    </div>
  );
}

function DetailModal({item,onClose,liveData,conf,profile,setProfile,onHide,liked,reminded,onLike,onRemind,done,onDone,easy,setEasy,onGoProfile,siblings,onSwipeTo}){
  const [miniQuiz,setMiniQuiz]=useState(false);
  // イベント詳細：左右スワイプで隣のイベントへ（siblings=同カテゴリ順の配列）
  const swipeRef=React.useRef({x:0,y:0});
  const swipeNav=(dir)=>{
    if(!siblings||!onSwipeTo) return;
    const i=siblings.findIndex(s=>s.id===item.id);
    if(i<0) return;
    const j=i+dir;
    if(j<0||j>=siblings.length) return;
    onSwipeTo(siblings[j]);
  };
  const onTouchStart=(e)=>{ const t=e.touches[0]; swipeRef.current={x:t.clientX,y:t.clientY}; };
  const onTouchEnd=(e)=>{ const t=e.changedTouches[0]; const dx=t.clientX-swipeRef.current.x; const dy=t.clientY-swipeRef.current.y;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){ swipeNav(dx<0?1:-1); } };
  const [hideConfirmed,setHideConfirmed]=useState(false);
  const [showRepeatConfirm,setShowRepeatConfirm]=useState(false);
  const [fetchedUrl,setFetchedUrl]=useState(null);
  const [fetching,setFetching]=useState(true);
  const bodyText = easy ? item.body : (item.officialBody||item.body);
  const missingQ=getMissingQuestions(item,profile);
  const isNeeds=conf==="needs_profile";
  // クイズ結果メッセージの出し分け用：この制度の判定に必要な質問数（回答前に捕捉）。
  // 非該当時に 2問以下→「ご回答ありがとうございます！」/ 3問以上→「申し訳ございません」。
  const qcRef=React.useRef({id:null,count:0});
  if(qcRef.current.id!==item.id){
    qcRef.current={id:item.id,count:(typeof countDecidingQuestions==="function"?countDecidingQuestions(item,profile):missingQ.length)};
  }
  const quizQCount=qcRef.current.count;

  const hasOfficialBody=!!(item.officialBody);

  const [miniAnswers,setMiniAnswers]=useState({});

  // ミニクイズの回答をプロフィールに保存し、次回開いた時に再表示しない
  const saveMiniAnswersToProfile = (answers) => {
    if(Object.keys(answers).length > 0) {
      setProfile(p=>({...p,...answers}));
    }
  };

  // ミニクイズ回答後の判定（ローカルstateで管理）
  const mergedProfile = {...profile, ...miniAnswers};
  const currentMissingQ = getMissingQuestions(item, mergedProfile);
  const allAnswered = miniQuiz && currentMissingQ.length === 0;
  const nowExcluded = allAnswered && (()=>{
    const el=item.eligibility;
    if(!el) return false;
    if(el.exclude && el.exclude.some(c=>evalCondition(c,mergedProfile))) return true;
    // profileCheck の回答が不一致 → 対象外
    if(typeof checkProfileQuiz==="function" && checkProfileQuiz(el,mergedProfile).status==="excluded") return true;
    return false;
  })();
  const nowCertain = allAnswered && !nowExcluded && getConfidence(item,mergedProfile)==="certain";

  const [showExcludedScreen,setShowExcludedScreen]=useState(false);
  // 対象外確定したら自動で対象外画面へ
  useEffect(()=>{
    if(nowExcluded) setShowExcludedScreen(true);
  },[nowExcluded]);

  // モーダルが開いた瞬間にバックグラウンドでURL検索
  useEffect(()=>{
    let cancelled=false;
    // AI検索なし：即座にフォールバックURLを設定
    setFetchedUrl(null);
    setFetching(false);
    return ()=>{};
  },[item.id]);

  // フォールバックURL（方法A）
  const fallbackUrl="https://www.google.com/search?q="+encodeURIComponent(
    item.title.replace(/（拡充版）|（港区独自）|（厚生労働省）|（文部科学省）|（国土交通省）/g,"")
    +" "+(item.gov==="港区"?"港区 申請":item.gov==="東京都"?"東京都 申請":"申請 公式")
  );

  const targetUrl=fetchedUrl||fallbackUrl;

  // ── 対象外確定画面（モーダル全体を覆うオーバーレイ） ──
  if(showExcludedScreen){
    const reason = getExclusionReason(item, mergedProfile);
    const hint   = getEligibilityHint(item, mergedProfile);
    return (
      <div style={{position:"absolute",inset:0,top:90,background:"rgba(0,0,0,.7)",zIndex:40,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
        <div style={{
          background:C.bg1, borderRadius:"24px 24px 0 0", width:"100%",
          padding:"32px 24px 40px", animation:"slideUp .3s ease",
          display:"flex", flexDirection:"column", alignItems:"center", gap:0,
        }} onClick={e=>e.stopPropagation()}>

          {/* アイコン＋✕バッジ */}
          <div style={{position:"relative", marginBottom:20}}>
            <div style={{
              width:80, height:80, borderRadius:40,
              background:C.red+"18", border:`2px solid ${C.red}44`,
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:40,
            }}>{item.icon}</div>
            <div style={{
              position:"absolute", bottom:-4, right:-4,
              width:28, height:28, borderRadius:14,
              background:C.red, display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:15, color:"#fff", fontWeight:700,
              boxShadow:`0 2px 8px ${C.red}66`,
            }}>✕</div>
          </div>

          {/* タイトル（クイズ質問数で文言を出し分け） */}
          <div style={{color:C.t1,fontWeight:700,fontSize:18,marginBottom:6,textAlign:"center"}}>
            {quizQCount>=3?"申し訳ございません":"ご回答ありがとうございます！"}
          </div>
          <div style={{color:C.t2,fontSize:13,marginBottom:14,textAlign:"center"}}>
            {quizQCount>=3?"当てはまりませんでした":"今回は対象ではありませんでした"}
          </div>
          <div style={{
            background:C.red+"11", border:`1px solid ${C.red}33`,
            borderRadius:12, padding:"12px 16px", width:"100%", marginBottom:16,
          }}>
            <div style={{color:C.red,fontWeight:700,fontSize:13,marginBottom:4}}>❌ 対象外の理由</div>
            <div style={{color:C.t1,fontSize:14,lineHeight:1.7}}>{reason}</div>
          </div>

          {/* ヒント（あれば） */}
          {hint&&(
            <div style={{
              background:C.blue+"0d", border:`1px solid ${C.blue}22`,
              borderRadius:12, padding:"12px 16px", width:"100%", marginBottom:16,
            }}>
              <div style={{color:C.blue,fontWeight:700,fontSize:12,marginBottom:4}}>💡 状況が変わったら</div>
              <div style={{color:C.t2,fontSize:13,lineHeight:1.6}}>{hint}</div>
            </div>
          )}

          {/* 他の制度を見るメッセージ */}
          <div style={{color:C.t3,fontSize:12,textAlign:"center",marginBottom:20,lineHeight:1.7}}>
            ホームに戻って、他の対象制度を確認しましょう
          </div>

          {/* 状況が変わったらプロフィール更新へ誘導 */}
          {onGoProfile&&(
            <button
              style={{width:"100%",...S.btn(C.blue,false),fontSize:13,fontWeight:700,marginBottom:10}}
              onClick={e=>{e.stopPropagation();onGoProfile();onClose();}}>
              🔄 状況が変わった場合はプロフィールを更新
            </button>
          )}

          {/* ボタン群 */}
          <div style={{display:"flex",gap:10,width:"100%"}}>
            <button
              style={{flex:1,...S.btn(C.bg3,false),border:`1px solid ${C.border}`,fontSize:13}}
              onClick={e=>{e.stopPropagation();setShowExcludedScreen(false);}}>
              ← 詳細に戻る
            </button>
            <button
              style={{flex:1,...S.btn(C.red,false),fontSize:13,fontWeight:700}}
              onClick={e=>{e.stopPropagation();onHide&&onHide(item.id);onClose();}}>
              非表示にする
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{position:"absolute",inset:0,top:90,background:"rgba(0,0,0,.7)",zIndex:40,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div style={{background:C.bg1,borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxHeight:"80%",overflowY:"auto",animation:"slideUp .3s ease"}} onClick={e=>e.stopPropagation()} onTouchStart={siblings?onTouchStart:undefined} onTouchEnd={siblings?onTouchEnd:undefined}>
        {siblings&&siblings.length>1&&(
          <div style={{color:C.t3,fontSize:11,textAlign:"center",marginBottom:8}}>← スワイプで他のイベント →</div>
        )}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <div style={{fontSize:36}}>{item.icon}</div>
          <div>
            <div style={{color:C.t1,fontWeight:700,fontSize:16}}>{easy?(item.title):(item.officialName||item.title)}</div>
            {item.officialName&&easy&&(
              <div style={{color:C.t3,fontSize:10,marginTop:2}}>正式名称：{item.officialName}</div>
            )}
            <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
              <span style={S.tag(item.color)}>{item.gov}</span>
              <span style={S.tag(C.t2)}>{item.tag}</span>
              {liveData&&<LiveBadge/>}
            </div>
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{color:C.t2,fontSize:13,lineHeight:1.7,transition:"opacity .2s"}}>{bodyText}</div>
        </div>

        {liveData&&(
          <div style={{background:C.bg2,borderRadius:12,padding:12,border:`1px solid ${C.red}33`,marginBottom:12}}>
            <div style={{color:C.red,fontWeight:700,fontSize:12,marginBottom:8}}>🔴 AIによる最新情報（{liveData.fetchedAt}取得）</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <div><span style={{color:C.t2,fontSize:11}}>最新の金額・上限：</span><span style={{color:C.t1,fontSize:13,fontWeight:600}}>{liveData.amount}</span></div>
              <div><span style={{color:C.t2,fontSize:11}}>対象条件：</span><span style={{color:C.t1,fontSize:12}}>{liveData.conditions}</span></div>
              <div><span style={{color:C.t2,fontSize:11}}>申請期限：</span><span style={{color:C.t1,fontSize:12}}>{liveData.deadline}</span></div>
              {liveData.changes&&liveData.changes!=="変更なし"&&(
                <div><span style={{color:C.t2,fontSize:11}}>変更点：</span><span style={{color:C.green,fontSize:12}}>{liveData.changes}</span></div>
              )}
              <div style={{color:C.t3,fontSize:10,marginTop:4}}>参照：{liveData.sourceNote}</div>
            </div>
          </div>
        )}

        <div style={{background:C.bg2,borderRadius:12,padding:12,marginBottom:12}}>
          <div style={{color:C.t2,fontSize:12,marginBottom:4}}>📅 申請期限</div>
          <div style={{color:C.t1,fontSize:14,fontWeight:600}}>{item.deadline}</div>
        </div>
        <div style={{background:C.bg2,borderRadius:12,padding:12,marginBottom:16}}>
          <div style={{color:C.t2,fontSize:12,marginBottom:4}}>🔔 リマインド</div>
          <div style={{color:C.t1,fontSize:13}}>{item.reminderLabel}</div>
        </div>

        {/* 対象確認ミニクイズ（関係あるかも の場合のみ） */}
        {isNeeds&&currentMissingQ.length>0&&!miniQuiz&&(
          <button
            style={{width:"100%",background:"#f0a03022",border:"2px solid #f0a030",borderRadius:12,padding:"12px 16px",marginBottom:12,cursor:"pointer",textAlign:"left"}}
            onClick={e=>{e.stopPropagation();setMiniQuiz(true);}}>
            <div style={{color:"#f0a030",fontWeight:700,fontSize:13,marginBottom:4}}>🔍 対象か確認する</div>
            <div style={{color:C.t2,fontSize:12}}>あと{currentMissingQ.length}問答えると対象かどうかわかります</div>
          </button>
        )}
        {isNeeds&&miniQuiz&&(
          <div style={{background:C.bg2,borderRadius:12,padding:14,marginBottom:12,border:`2px solid #f0a030`}}>
            <div style={{color:"#f0a030",fontWeight:700,fontSize:13,marginBottom:10}}>🔍 対象か確認する</div>
            {currentMissingQ.map(q=>(
              <div key={q.key} style={{marginBottom:12}}>
                <div style={{color:C.t1,fontSize:13,fontWeight:600,marginBottom:6}}>{q.label}は？</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {q.opts.map(v=>(
                    <button key={v}
                      style={{...S.btn(miniAnswers[q.key]===v?C.blue:C.bg3,true),border:`1px solid ${miniAnswers[q.key]===v?C.blue:C.border}`,fontSize:12}}
                      onClick={e=>{
                        e.stopPropagation();
                        // booleanライクなキーは変換してから保存
                        const converted = BOOL_KEYS[q.key] ? (BOOL_KEYS[q.key][v]||v) : v;
                        const newAnswers={...miniAnswers,[q.key]:converted};
                        setMiniAnswers(newAnswers);
                        // 即座にプロフィールへ反映
                        setProfile(p=>({...p,[q.key]:converted}));
                      }}>
                      {v}
                    </button>
                  ))}
                </div>
              </div>
            ))}
            {/* 回答後：その人がもらえる金額の目安（段階補助でも具体額を表示） */}
            {allAnswered&&(()=>{
              const myLabel = calcSubsidyLabel(item, mergedProfile);
              const myAmount = calcSubsidy(item, mergedProfile);
              if(!myLabel && !(myAmount>0)) return null;
              return (
                <div style={{background:C.bg1,borderRadius:10,padding:"12px 14px",margin:"6px 0",textAlign:"center",border:`1.5px solid ${C.green}55`}}>
                  <div style={{color:C.t3,fontSize:11,marginBottom:3}}>💰 あなたがもらえる目安</div>
                  <div style={{color:item.subsidyType==="cash"?C.blue:C.green,fontWeight:800,fontSize:20}}>
                    {item.subsidyType==="savings"?"💚 ":"💙 "}{myLabel || (myAmount.toLocaleString()+"円")}
                  </div>
                </div>
              );
            })()}
            {allAnswered&&nowCertain&&(
              <div style={{background:C.green+"22",borderRadius:10,padding:12,border:`1px solid ${C.green}44`,marginTop:4}}>
                <div style={{color:C.green,fontWeight:700,fontSize:14,marginBottom:4}}>✅ 対象です！受け取れる可能性があります</div>
                <div style={{color:C.t2,fontSize:12,marginBottom:8}}>プロフィールに反映するとホームの「受け取れる給付」に追加されます。下の公式ページから申請方法をご確認ください。</div>
                <button style={{width:"100%",...S.btn(C.green,true),fontSize:12,fontWeight:700}}
                  onClick={e=>{e.stopPropagation();setProfile(p=>({...p,...miniAnswers}));}}>
                  ✓ プロフィールに反映する
                </button>
              </div>
            )}
            {/* nowExcluded → showExcludedScreen で全画面表示するため、ここでは何も出さない */}
            {allAnswered&&!nowCertain&&!nowExcluded&&(
              <div style={{background:C.bg3,borderRadius:10,padding:12,marginTop:4}}>
                <div style={{color:"#f0a030",fontWeight:700,fontSize:13,marginBottom:4}}>🔶 引き続き関係あるかもしれません</div>
                <div style={{color:C.t2,fontSize:12,marginBottom:8}}>他の条件によって変わります。公式サイトでご確認ください。</div>
                <button style={{width:"100%",...S.btn(C.bg3,true),border:`1px solid ${C.border}`,fontSize:12}}
                  onClick={e=>{e.stopPropagation();setProfile(p=>({...p,...miniAnswers}));}}>
                  ✓ プロフィールに反映する
                </button>
              </div>
            )}
          </div>
        )}
        {isNeeds&&!miniQuiz&&currentMissingQ.length===0&&(
          <div style={{background:C.bg2,borderRadius:12,padding:12,marginBottom:12,border:`1px solid ${C.green}44`}}>
            <div style={{color:C.green,fontSize:12,fontWeight:700}}>✅ プロフィール情報は十分です。ホームの表示を確認してください。</div>
          </div>
        )}


        <a
          href={targetUrl}
          target="_blank"
          rel="noopener noreferrer"
          onClick={e=>e.stopPropagation()}
          style={{
            display:"flex",alignItems:"center",justifyContent:"center",gap:8,
            width:"100%",
            background:fetching?C.bg3:C.blue,
            color:"#fff",
            padding:"14px",borderRadius:12,fontWeight:700,fontSize:15,
            marginBottom:10,textDecoration:"none",
            pointerEvents:fetching?"none":"auto",
            opacity:fetching?0.6:1,
            transition:"background .3s,opacity .3s",

          {fetching?(
            <><div style={{width:14,height:14,border:"2px solid #fff",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>

            fetchedUrl

              : <>🔍 公式ページを検索する</>
          )}

        {!fetching&&(
          <div style={{color:C.t3,fontSize:10,textAlign:"center",marginBottom:12}}>

        {/* いいね・リマインドボタン */}
        {onLike&&onRemind&&(
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <button

              onClick={e=>{e.stopPropagation();onLike(item.id);}}>
              {liked&&liked.includes(item.id)?"❤️ いいね済み":"🤍 いいね"}
            </button>
            <button
              style={{flex:1,...S.btn(reminded&&reminded.includes(item.id)?C.blue+"33":C.bg3,true),border:`1px solid ${reminded&&reminded.includes(item.id)?C.blue:C.border}`,padding:"10px"}}
              onClick={e=>{e.stopPropagation();onRemind(item.id);}}>
              {reminded&&reminded.includes(item.id)?"🔔 リマインド済":"🔕 リマインド"}
            </button>
          </div>
        )}
        {/* 申請済み・利用済みボタン */}
        {onDone&&(
          done&&done.includes(item.id)?(
            <div style={{background:C.green+"22",borderRadius:12,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>

              <button style={{background:"none",border:"none",color:C.t3,fontSize:12,cursor:"pointer"}} onClick={e=>{e.stopPropagation();onDone(item.id,"undo");}}>取消</button>

          ):(
            <>
              <button
                style={{width:"100%",background:C.bg3,border:`1px solid ${C.green}66`,borderRadius:12,padding:"12px",marginBottom:showRepeatConfirm?6:10,cursor:"pointer",color:C.green,fontWeight:700,fontSize:13}}
                onClick={e=>{e.stopPropagation();REPEATABLE_IDS.has(item.id)?setShowRepeatConfirm(true):onDone(item.id,"done");}}>
                ✅ 申請済み・利用済みにする
              </button>
              {showRepeatConfirm&&(
                <div style={{background:C.bg2,borderRadius:12,padding:12,marginBottom:10,border:`1px solid ${C.green}44`}}>
                  <div style={{color:C.t1,fontSize:13,marginBottom:8}}>🔄 この制度は複数回使えます。利用済みとして非表示にしますか？</div>
                  <div style={{display:"flex",gap:8}}>
                    <button style={{flex:1,...S.btn(C.green,true),fontSize:12}} onClick={e=>{e.stopPropagation();onDone(item.id,"done");onClose();}}>非表示にする</button>
                    <button style={{flex:1,...S.btn(C.bg3,true),border:`1px solid ${C.border}`,fontSize:12}} onClick={e=>{e.stopPropagation();onDone(item.id,"keep");setShowRepeatConfirm(false);}}>表示を残す</button>
                  </div>
                </div>
              )}
            </>
          )
        )}
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button style={{...S.btn(C.bg3),flex:1,border:`1px solid ${C.border}`}} onClick={onClose}>閉じる</button>
          <button style={{background:"none",border:`1px solid ${C.t3}44`,borderRadius:10,padding:"10px 14px",cursor:"pointer",color:C.t3,fontSize:12,whiteSpace:"nowrap",flexShrink:0}}
            onClick={e=>{e.stopPropagation();onHide&&onHide(item.id);onClose();}}>
            関係ない
          </button>
        </div>
      </div>
    </div>
  );
}

function BannerModal({banner,onClose}){

            <div style={{color:C.t2,fontSize:11}}>節約（確実）</div>
            <div style={{color:C.green,fontWeight:700,fontSize:18,marginTop:4}}>{fmt(banner.savings)}</div>
          </div>
        </div>
        <div style={{background:C.bg2,borderRadius:12,padding:12,marginBottom:16}}>
          <div style={{color:C.t2,fontSize:12,marginBottom:4}}>条件次第の可能性額</div>
          <div style={{color:C.purple,fontWeight:700,fontSize:18}}>{fmt(banner.potential)}</div>
          <div style={{color:C.t3,fontSize:11,marginTop:4}}>プロフィールを充実させるとあなたが実際に得られる額がわかります</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button style={{...S.btn(C.bg3),flex:1,border:`1px solid ${C.border}`}} onClick={onClose}>閉じる</button>
          <button style={{background:"none",border:`1px solid ${C.t3}44`,borderRadius:10,padding:"10px 14px",cursor:"pointer",color:C.t3,fontSize:12,whiteSpace:"nowrap",flexShrink:0}}
            onClick={e=>{e.stopPropagation();onHide&&onHide(item.id);onClose();}}>
            関係ない
          </button>
        </div>
      </div>
    </div>
  );
}
