/* ─── Info DB (18件) ───

   match(p):   0=完全対象外, 1〜99=条件次第で表示
   needsMore:  条件次第カードに表示する「何を追加すれば確定できるか」
─── */
const age = (p) => p.ageNum ? Number(p.ageNum) : null; // 数値年齢ヘルパー

// 年収ヘルパー
const isLowIncome = (p) => p.income==="～200万円"||p.income==="200～400万円";
const isMidIncome = (p) => p.income==="400～600万円"||p.income==="600～800万円";
const isHighIncome = (p) => p.income==="800万円～";
const incomeUnknown = (p) => !p.income;

// 住居ヘルパー
const isOwner = (p) => p.housing==="持ち家（戸建て）"||p.housing==="持ち家（マンション）";
const isRenter = (p) => p.housing==="賃貸";

// 子の年齢ヘルパー
const kidsAgeUnder3  = (p) => p.kidsAge==="0〜2歳";
const kidsAgeUnder6  = (p) => p.kidsAge==="0〜2歳"||p.kidsAge==="3〜5歳";
const kidsAgeUnder13 = (p) => p.kidsAge==="0〜2歳"||p.kidsAge==="3〜5歳"||p.kidsAge==="6〜12歳";
const kidsAgeUnder16 = (p) => kidsAgeUnder13(p)||p.kidsAge==="13〜15歳";
const kidsAgeUnder19 = (p) => kidsAgeUnder16(p)||p.kidsAge==="16〜18歳";
const kidsAgeUnknown = (p) => p.hasKids==="いる（または予定あり）"&&!p.kidsAge;
// 出産・妊娠系：子が0〜2歳 or 年齢不明（予定含む）の場合のみ
const isNewbornPhase = (p) => p.hasKids==="いる（または予定あり）"&&kidsAgeUnder3(p);

// 年齢ヘルパー
const ageGte = (n) => (p) => { const a=age(p); return a!==null && a>=n; };
const ageLt  = (n) => (p) => { const a=age(p); return a!==null && a<n; };

/* ─── 宣言的判定エンジン ───────────────────────────
   eligibility: {
     certain: [fn, ...]   全部trueならcertain（4問で断言可能）
     exclude: [fn, ...]   どれか1つでもtrueならmatch=0（非表示）
     score:   [{check:fn, pts:number}, ...]  スコア加算ルール
     baseScore: number    デフォルトスコア（未設定時40）
   }
────────────────────────────────────────── */
function calcEligibility(p, el){
  if(el.exclude && el.exclude.some(fn=>fn(p))) return {certain:false, matchScore:0};
  // certain が空配列 or 未定義の場合は certain=false（空配列のevery()はtrueになるバグを防ぐ）
  const certain = !!(el.certain && el.certain.length > 0 && el.certain.every(fn=>fn(p)));
  if(certain) return {certain:true, matchScore:100};
  let score = el.baseScore !== undefined ? el.baseScore : 40;
  if(el.score) el.score.forEach(({check,pts})=>{ if(check(p)) score+=pts; });
  return {certain:false, matchScore:Math.min(score,95)};
}

/* ─── Utils ─── */
const fmt = (n) => `${n.toLocaleString()}円`;
const calcDist = (a1,o1,a2,o2) => {
  const R=6371000,dLat=(a2-a1)*Math.PI/180,dLng=(o2-o1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};
const nearestTown = (lat,lng) => TOWN_COORDS.reduce((a,b) => calcDist(lat,lng,a.lat,a.lng)<calcDist(lat,lng,b.lat,b.lng)?a:b);
const radiusLabel = (r) => r===999999?"区全域":r>=1000?`半径${r/1000}km以内`:`半径${r}m以内`;
const calcBanner = (profile, items, done=[], hidden=[]) => {
  let cash=0, savings=0, potential=0;
  items.forEach(it=>{
    // 申請済み（一度きり）または非表示は除外
    if((done||[]).includes(it.id) || (hidden||[]).includes(it.id)) return;
    try{
      const el=ELIGIBILITY[it.id];
      let isCertain=false;
      if(el){
        if(el.exclude&&el.exclude.some(fn=>fn(profile))) return;
        isCertain=!!(el.certain&&el.certain.length>0&&el.certain.every(fn=>fn(profile)));
      } else {
        isCertain=it.certain(profile);
      }
      if(isCertain && it.subsidy(profile)>0){
        if(it.subsidyType==="cash") cash+=it.subsidy(profile);
        else if(it.subsidyType==="savings") savings+=it.subsidy(profile);
      } else if(!isCertain && it.potentialSubsidy>0){
        potential+=it.potentialSubsidy;
      }
    }catch(e){}
  });
  return {cash,savings,potential};
};

const fetchLiveInfo = async (item) => {
  const today = new Date().toLocaleDateString("ja-JP");
  const prompt = "以下の行政給付・補助制度について、2026年5月現在の最新情報を調べてください。\n\n"
    + "制度名：" + item.title + "\n"
    + "所管：" + item.gov + "\n"
    + "公式URL参考：" + item.sourceUrl + "\n\n"
    + "調査してほしい内容：\n"
    + "1. 2025〜2026年度の最新の給付額・補助上限額\n"
    + "2. 申請条件・対象者の変更点\n"
    + "3. 申請期限・受付状況（現在受付中か）\n"
    + "4. 前年度からの主な変更点（あれば）\n\n"
    + "必ず以下のJSON形式のみで返答してください（前置きや説明文は不要）：\n"
    + '{\n'
    + '  "amount": "最新の金額・上限額（文字列）",\n'
    + '  "conditions": "主な対象条件（1〜2文）",\n'
    + '  "deadline": "申請期限・受付状況",\n'
    + '  "changes": "前年度からの変更点（なければ変更なし）",\n'
    + '  "sourceNote": "参照した情報源（サイト名）",\n'
    + '  "fetchedAt": "' + today + '"\n'
    + "}";

  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      tools:[{type:"web_search_20250305",name:"web_search"}],
      messages:[{role:"user",content:prompt}],
    }),
  });
  const data = await resp.json();
  const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("") || "";
  try {
    const clean = text.replace(/```json|```/g,"").trim();
    const start = clean.indexOf("{"); const end = clean.lastIndexOf("}");
    return JSON.parse(clean.slice(start, end+1));
  } catch {
    return {amount:"取得失敗",conditions:"—",deadline:"—",changes:"—",sourceNote:"—",fetchedAt:new Date().toLocaleDateString("ja-JP")};
  }
};

/* ─── RevealScreen: クイズ完了後の演出 ─── */
function RevealScreen({profile, items, onEnter, done=[], hidden=[]}){
  const banner = calcBanner(profile, items, done, hidden);
  const total = banner.cash + banner.savings;
  const certainCount = items.filter(it=>{
    const el=ELIGIBILITY[it.id];
    return el ? calcEligibility(profile,el).certain : it.certain(profile);
  }).length;
  const maybeCount = items.filter(it=>{
    const el=ELIGIBILITY[it.id];
    const score = el ? calcEligibility(profile,el).matchScore : it.match(profile);
    return score>0 && score<100;
  }).length;

  const [displayed, setDisplayed] = useState(0);
  const [phase2, setPhase2] = useState(false);
  const [phase3, setPhase3] = useState(false);
  const [exiting, setExiting] = useState(false); // ← 退場アニメ用

  useEffect(()=>{
    if(total===0){ setPhase2(true); setTimeout(()=>setPhase3(true),600); return; }
    let start = null;
    const duration = 1800;
    const ease = (t) => t<0.5 ? 2*t*t : -1+(4-2*t)*t;
    const step = (ts) => {
      if(!start) start=ts;
      const progress = Math.min((ts-start)/duration, 1);
      setDisplayed(Math.floor(ease(progress)*total));
      if(progress<1){ requestAnimationFrame(step); }
      else{
        setDisplayed(total);
        setTimeout(()=>setPhase2(true), 300);
        setTimeout(()=>setPhase3(true), 900);
      }
    };
    const raf = requestAnimationFrame(step);
    return ()=>cancelAnimationFrame(raf);
  },[]);

  const handleEnter = () => {
    setExiting(true);
    setTimeout(onEnter, 480); // アニメ完了後に遷移
  };

  return (
    <div style={{
      flex:1, display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"center",
      background:C.bg0, padding:"32px 28px 48px", gap:0,
      // 入場：下からフェードイン / 退場：拡大しながらフェードアウト
      animation: exiting ? "none" : "fadeUp .4s ease",
      opacity: exiting ? 0 : 1,
      transform: exiting ? "scale(1.12)" : "scale(1)",
      transition: exiting ? "opacity .5s cubic-bezier(.4,0,1,1), transform .5s cubic-bezier(.4,0,1,1)" : "none",
      pointerEvents: exiting ? "none" : "all",
    }}>
      <div style={{color:C.t3, fontSize:12, letterSpacing:1, marginBottom:20, fontWeight:600}}>
        診断完了 🎉
      </div>

      <div style={{textAlign:"center", marginBottom:8}}>
        <div style={{color:C.t3, fontSize:12, marginBottom:8}}>あなたが受け取れる年間総額（確実分）</div>
        <div style={{
          color:C.blue, fontWeight:700,
          fontSize: displayed >= 1000000 ? 42 : displayed >= 100000 ? 46 : 50,
          letterSpacing:-1, lineHeight:1.1,
          transition:"font-size .2s",
          minHeight:60,
        }}>
          ¥{displayed.toLocaleString()}
        </div>
      </div>

      <div style={{
        display:"flex", gap:16, marginTop:20, marginBottom:24,
        opacity:phase2?1:0, transform:phase2?"translateY(0)":"translateY(10px)",
        transition:"opacity .5s ease, transform .5s ease",
      }}>
        <div style={{textAlign:"center", background:C.blue+"15", borderRadius:14, padding:"12px 20px"}}>
          <div style={{color:C.t3, fontSize:10, marginBottom:4}}>💙 現金給付</div>
          <div style={{color:C.blue, fontWeight:700, fontSize:18}}>{banner.cash.toLocaleString()}円</div>
        </div>
        <div style={{textAlign:"center", background:C.green+"15", borderRadius:14, padding:"12px 20px"}}>
          <div style={{color:C.t3, fontSize:10, marginBottom:4}}>💚 節約・割引</div>
          <div style={{color:C.green, fontWeight:700, fontSize:18}}>{banner.savings.toLocaleString()}円</div>
        </div>
      </div>

      <div style={{
        display:"flex", gap:10, marginBottom:36,
        opacity:phase2?1:0, transition:"opacity .5s ease .2s",
      }}>
        <span style={{background:C.green+"22", color:C.green, borderRadius:8, padding:"4px 12px", fontSize:12, fontWeight:700}}>
          ✅ 対象確実 {certainCount}件
        </span>
        <span style={{background:"#f0a03022", color:"#f0a030", borderRadius:8, padding:"4px 12px", fontSize:12, fontWeight:700}}>
          🔶 可能性あり {maybeCount}件
        </span>
      </div>

      <button
        onClick={handleEnter}
        style={{
          width:"100%", maxWidth:320,
          background:C.blue, color:"#fff",
          border:"none", borderRadius:18,
          padding:"18px", fontSize:17, fontWeight:700,
          cursor:"pointer",
          boxShadow:`0 6px 24px ${C.blue}55`,
          opacity:phase3?1:0, transform:phase3?"translateY(0)":"translateY(12px)",
          transition:"opacity .4s ease, transform .4s ease",
          pointerEvents:phase3?"all":"none",
        }}>
        制度を見る →
      </button>
      {phase3 && (
        <div style={{color:C.t3, fontSize:11, marginTop:12}}>
          可能性額を含めると最大 {(banner.potential+total).toLocaleString()}円
        </div>
      )}
    </div>
  );
}

          </div>
        </div>

        {/* ラベル */}
        <div style={{color:C.t2, fontSize:11, fontWeight:600, marginBottom:8}}>
          🔒 {items.length}件の制度があなたを待っています
        </div>

        {/* ぼかしカード一覧 — opacity薄め、モザイク弱め */}
        {previewItems.map((it, i)=>(
          <div key={it.id} style={{
            background:C.bg2, borderRadius:16, padding:"12px 14px", marginBottom:8,
            border:`1px solid ${C.border}`,

            opacity: 0.45,           // ← リスト全体を薄く
          }}>
            {/* ロックオーバーレイ：背景色なし・blur弱め */}
            <div style={{
              position:"absolute", inset:0,
              backdropFilter:"blur(1.5px)",          // ← モザイク弱く
              WebkitBackdropFilter:"blur(1.5px)",
              borderRadius:16,
              display:"flex", alignItems:"center", justifyContent:"center",
              zIndex:2,
            }}>
              <span style={{fontSize:16, opacity:0.6}}>🔒</span>
            </div>
            {/* カード本体 */}
            <div style={{display:"flex", alignItems:"center", gap:10}}>
              <div style={{fontSize:26, flexShrink:0}}>{it.icon}</div>
              <div style={{flex:1, minWidth:0}}>
                <div style={{display:"flex", gap:5, marginBottom:3, flexWrap:"wrap"}}>
                  <span style={{background:it.color+"22", color:it.color, borderRadius:6, padding:"2px 7px", fontSize:10, fontWeight:700}}>{it.gov}</span>
                  <span style={{background:C.green+"22", color:C.green, borderRadius:6, padding:"2px 7px", fontSize:10, fontWeight:700}}>🔒 情報入力で解除</span>
                </div>
                <div style={{color:C.t1, fontWeight:700, fontSize:13}}>{it.officialName||it.title}</div>
                <div style={{color:C.blue, fontWeight:700, fontSize:13, marginTop:2, filter:"blur(4px)", userSelect:"none"}}>
                  💙 {dummyAmounts[i % dummyAmounts.length]}
                </div>
              </div>
            </div>
          </div>
        ))}

        {items.length > 12 && (
          <div style={{textAlign:"center", color:C.t3, fontSize:12, padding:"8px 0 4px", opacity:0.45}}>
            他 {items.length - 12}件の制度も確認できます
          </div>
        )}
      </div>

      {/* 固定CTA — スクロールエリアの外に独立して配置（backdropFilterの影響なし）*/}
      <div style={{
        flexShrink:0,
        background:`linear-gradient(to top, ${C.bg1} 65%, transparent)`,
        padding:"20px 24px 40px",
        display:"flex", flexDirection:"column", alignItems:"center", gap:10,
      }}>
        <div style={{color:C.t2, fontSize:12, textAlign:"center"}}>
          いくつ対象か、まだわかりません
        </div>
        <button
          onClick={onStart}
          style={{
            width:"100%", maxWidth:320,
            background:C.blue, color:"#fff",
            border:"none", borderRadius:16,
            padding:"16px", fontSize:16, fontWeight:700,
            cursor:"pointer",
            boxShadow:`0 4px 20px ${C.blue}66`,
            animation:"pulse 2s ease infinite",
          }}>
          ✨ あなたの制度を調べる
        </button>
        <div style={{color:C.t3, fontSize:11}}>約1分で完了・無料</div>
      </div>
    </div>
  );
}

/* ─── Quiz: 4問 + GPS ─── */
const AREA_OPTS=["麻布・元麻布・麻布十番","青山・赤坂","六本木・西麻布","芝・三田","高輪・白金","港南・芝浦","その他（港区内）"];

const QUIZ_STEPS=[
  {key:"stage",   q:"ライフステージは？", opts:["学生","社会人（会社員）","社会人（フリーランス・自営）","育休・産休中","年金生活者","その他・無職"]},
  {key:"hasKids", q:"18歳未満のお子さんはいますか？",   opts:["いる（または予定あり）","いない（または18歳以上のみ）"]},
  {key:"housing", q:"住まいの形態は？",   opts:["持ち家（戸建て）","持ち家（マンション）","賃貸","社宅・寮","その他"]},
];

// 分岐質問
const BRANCH_STEPS={
  studentLevel:{q:"学校の種別は？", opts:["小学生","中学生","高校生","大学生・専門学生"]},
  kidsAge:{q:"お子さんの年齢は？（最年少）", opts:["0〜2歳","3〜5歳","6〜12歳","13〜15歳","16〜18歳"]},
};

// 次のステップを返す関数（分岐込み）
function getNextStep(currentKey, val, ans){
  if(currentKey==="stage"&&val==="学生") return "studentLevel";
  if(currentKey==="studentLevel") return "hasKids";
  if(currentKey==="hasKids"&&val==="いる（または予定あり）") return "kidsAge";
  if(currentKey==="kidsAge") return "housing";
  // 通常のQUIZ_STEPSの次へ
  const idx=QUIZ_STEPS.findIndex(s=>s.key===currentKey);
  if(idx>=0&&idx+1<QUIZ_STEPS.length) return QUIZ_STEPS[idx+1].key;
  return "gps";
}

function Quiz({onDone}){
  const [currentKey,setCurrentKey]=useState("age"); // age → stage → (studentLevel?) → hasKids → (kidsAge?) → housing → gps
  const [ans,setAns]=useState({});
  const [ageInput,setAgeInput]=useState("");
  const [ageError,setAgeError]=useState("");
  const [history,setHistory]=useState([]); // 戻る用
  const [gpsPhase,setGpsPhase]=useState("idle");
  const [gpsResult,setGpsResult]=useState(null);
  const [displayedTotal,setDisplayedTotal]=useState(0);
  const rafRef=useRef(null);
  const ageNumRef=useRef(null);

  const allKeys=["age","stage","studentLevel","hasKids","kidsAge","housing","gps"];
  const progress=(allKeys.indexOf(currentKey)/allKeys.length)*100;

  const handleAgeSubmit=()=>{
    const n=parseInt(ageInput,10);
    if(isNaN(n)||n<1||n>110){setAgeError("1〜110の数字を入力してください");return;}
    ageNumRef.current=n;
    setAns(a=>({...a,ageNum:n}));
    setHistory(h=>[...h,"age"]);
    setCurrentKey("stage");
  };

  const handleOpt=(key,val)=>{
    const next={...ans,[key]:val,ageNum:ageNumRef.current};
    setAns(next);
    setHistory(h=>[...h,key]);
    const nextKey=getNextStep(key,val,next);
    if(nextKey==="gps") setCurrentKey("gps");
    else setCurrentKey(nextKey);
  };

  const handleBack=()=>{
    if(history.length===0) return;
    const prev=history[history.length-1];
    setHistory(h=>h.slice(0,-1));
    setCurrentKey(prev);
  };

  // リアルタイム金額計算（その時点で確定している制度のみ）
  const calcLiveAmount=(currentAns)=>{
    const p={...currentAns};
    let cash=0, savings=0, count=0;
    const allItems=typeof ITEMS_BASE!=="undefined"?ITEMS_BASE:[];
    allItems.forEach(it=>{
      try{
        const el=ELIGIBILITY[it.id];
        if(!el) return;
        // ELIGIBILITYのexcludeで除外される場合は絶対に含めない
        if(el.exclude&&el.exclude.some(fn=>fn(p))) return;
        // certainの全条件を満たす場合のみ確定
        if(!el.certain||el.certain.length===0) return;
        if(!el.certain.every(fn=>fn(p))) return;
        const sub=it.subsidy(p);
        if(sub>0){
          if(it.subsidyType==="cash") cash+=sub;
          else savings+=sub;
        }
        count++;
      }catch(e){}
    });
    return{cash,savings,count};
  };

  const liveAmt=calcLiveAmount(ans);

  // 金額が変わるたびにカウントアップ
  const displayedRef=useRef(0);
  useEffect(()=>{
    const target=liveAmt.cash+liveAmt.savings;
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    if(target===0){ displayedRef.current=0; setDisplayedTotal(0); return; }
    const start=displayedRef.current;
    const diff=target-start;
    if(diff===0) return;
    const duration=700;
    let startTime=null;
    const step=(ts)=>{
      if(!startTime) startTime=ts;
      const p=Math.min((ts-startTime)/duration,1);
      const eased=1-Math.pow(1-p,3); // ease-out cubic
      const current=Math.round(start+diff*eased);
      displayedRef.current=current;
      setDisplayedTotal(current);
      if(p<1){ rafRef.current=requestAnimationFrame(step); }
      else{ displayedRef.current=target; setDisplayedTotal(target); }
    };
    rafRef.current=requestAnimationFrame(step);
    return()=>{ if(rafRef.current) cancelAnimationFrame(rafRef.current); };
  },[liveAmt.cash,liveAmt.savings]);

  // 金額バナー（クイズ中）- 常に上部に固定表示
  const LiveBanner=()=>{
    const hasAmount = liveAmt.count > 0;
    return(
      <div style={{
        background: hasAmount ? C.blue+"11" : C.bg2,
        border:`1px solid ${hasAmount ? C.blue+"33" : C.border}`,
        borderRadius:14, padding:"10px 16px",
        transition:"background .4s ease, border-color .4s ease",
        flexShrink:0,
      }}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <div style={{color:C.t3, fontSize:10}}>✨ いま確定している受給額</div>
          {hasAmount && <div style={{color:C.t3,fontSize:10}}>{liveAmt.count}件確定</div>}
        </div>
        <div style={{
          color: hasAmount ? C.blue : C.t3,
          fontWeight:700, fontSize:22, marginTop:4,
          transition:"color .4s ease",
          letterSpacing:-0.5,
        }}>
          {hasAmount ? `${displayedTotal.toLocaleString()}円` : "回答するほど確定していきます"}
        </div>
      </div>
    );
  };

  const startGps=()=>{
    setGpsPhase("loading");
    if(!navigator.geolocation){
      setGpsPhase("fallback");
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        const lat=pos.coords.latitude;
        const lng=pos.coords.longitude;
        const town=nearestTown(lat,lng);
        const dist=calcDist(lat,lng,town.lat,town.lng);
        // 港区の最寄りエリアから3km以上離れていたら港区外とみなす
        if(dist>3000){
          setGpsPhase("fallback");
          return;
        }
        setGpsResult({lat,lng,town});
        setGpsPhase("confirm");
      },
      ()=>{ setGpsPhase("fallback"); }, // 拒否・エラー時
      {timeout:10000,enableHighAccuracy:true}
    );
  };

  const finishGps=(confirmed,manualTown=null)=>{
    const coords=confirmed&&gpsResult?{lat:gpsResult.lat,lng:gpsResult.lng}:null;
    const town=confirmed&&gpsResult?gpsResult.town:{name:manualTown||"麻布十番"};
    onDone({...ans,ageNum:ageNumRef.current,coords,town:town.name,festivalCoords:coords,festivalTown:town});
  };

  const BackBtn=()=>history.length>0?(
    <button style={{background:"none",border:"none",color:C.blue,fontSize:14,cursor:"pointer",padding:"4px 0",fontWeight:600}} onClick={handleBack}>← 戻る</button>
  ):<div/>;

  // GPS画面
  if(currentKey==="gps"){
    return (
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* 上部固定エリア */}
        <div style={{padding:"16px 24px 12px",flexShrink:0,display:"flex",flexDirection:"column",gap:10}}>
          <LiveBanner/>
          <div style={{height:4,background:C.bg3,borderRadius:2}}><div style={{height:4,background:C.blue,borderRadius:2,width:"95%",transition:"width .3s"}}/></div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <BackBtn/>
            <div style={{color:C.t2,fontSize:12}}>最後のステップ</div>
            <div style={{width:40}}/>
          </div>
        </div>
        {/* スクロールコンテンツ */}
        <div style={{flex:1,padding:"0 24px 24px",display:"flex",flexDirection:"column",gap:16,overflowY:"auto"}}>
          {gpsPhase==="idle"&&<>
            <div style={{color:C.t1,fontSize:18,fontWeight:700,marginTop:8}}>📍 現在地を教えてください</div>
            <div style={{color:C.t2,fontSize:13}}>近くのお祭り・花火情報をお届けするために使います</div>
            <button style={{...S.btn(C.blue),marginTop:16}} onClick={startGps}>📍 現在地を取得する</button>
            <button style={{...S.btn(C.bg3),border:`1px solid ${C.border}`}} onClick={()=>setGpsPhase("fallback")}>許可しない</button>
          </>}
          {gpsPhase==="loading"&&<>
            <div style={{color:C.t1,fontSize:18,fontWeight:700,marginTop:8}}>📍 取得中…</div>
            <div style={{width:40,height:40,border:`3px solid ${C.blue}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"24px auto"}}/>
          </>}
          {gpsPhase==="confirm"&&gpsResult&&<>
            <div style={{color:C.t1,fontSize:18,fontWeight:700,marginTop:8}}>📍 {gpsResult.town.name}付近ですね？</div>
            <button style={{...S.btn(C.blue),marginTop:8}} onClick={()=>finishGps(true)}>✓ はい</button>
            <button style={{...S.btn(C.bg3),border:`1px solid ${C.border}`}} onClick={()=>setGpsPhase("fallback")}>違う</button>
          </>}
          {gpsPhase==="fallback"&&<>
            <div style={{color:C.t1,fontSize:18,fontWeight:700,marginTop:8}}>お住まいのエリアは？</div>
            {AREA_OPTS.map(a=>(
              <button key={a} style={{...S.btn(C.bg3),border:`1px solid ${C.border}`,textAlign:"left",marginBottom:4}} onClick={()=>finishGps(false,a)}>{a}</button>
            ))}
          </>}
        </div>
      </div>
    );
  }

  // 年齢入力
  if(currentKey==="age") return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* 上部固定エリア */}
      <div style={{padding:"16px 24px 12px",flexShrink:0,display:"flex",flexDirection:"column",gap:10}}>
        <LiveBanner/>
        <div style={{height:4,background:C.bg3,borderRadius:2}}>
          <div style={{height:4,background:C.blue,borderRadius:2,width:`${progress}%`}}/>
        </div>
      </div>
      {/* スクロールコンテンツ */}
      <div style={{flex:1,padding:"8px 24px 24px",display:"flex",flexDirection:"column",gap:16,overflowY:"auto"}}>
        <div style={{color:C.t1,fontSize:20,fontWeight:700,marginTop:8}}>何歳ですか？</div>
        <div style={{color:C.t2,fontSize:13}}>年齢によって受けられる制度が変わります</div>
        <input
          type="number" inputMode="numeric" min="1" max="110"
          value={ageInput}
          onChange={e=>{setAgeInput(e.target.value);setAgeError("");}}
          onKeyDown={e=>e.key==="Enter"&&handleAgeSubmit()}
          placeholder="例：34"
          style={{background:C.bg3,border:`2px solid ${ageError?C.red:C.blue}`,borderRadius:14,padding:"14px 18px",color:C.t1,fontSize:28,fontWeight:700,textAlign:"center",outline:"none",width:"100%"}}
          autoFocus
        />
        {ageError&&<div style={{color:C.red,fontSize:12}}>{ageError}</div>}
        <button style={{...S.btn(C.blue),marginTop:4,fontSize:16}} onClick={handleAgeSubmit}>次へ →</button>
      </div>
    </div>
  );

  // 選択肢ステップ（QUIZ_STEPS + BRANCH_STEPS）
  const stepDef=QUIZ_STEPS.find(s=>s.key===currentKey)||
    (BRANCH_STEPS[currentKey]?{key:currentKey,...BRANCH_STEPS[currentKey]}:null);

  if(!stepDef) return null;
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* 上部固定エリア */}
      <div style={{padding:"16px 24px 12px",flexShrink:0,display:"flex",flexDirection:"column",gap:10}}>
        <LiveBanner/>
        <div style={{height:4,background:C.bg3,borderRadius:2}}>
          <div style={{height:4,background:C.blue,borderRadius:2,width:`${progress}%`,transition:"width .3s"}}/>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <BackBtn/>
          <div style={{width:40}}/>
        </div>
      </div>
      {/* スクロールコンテンツ */}
      <div style={{flex:1,padding:"0 24px 24px",display:"flex",flexDirection:"column",gap:12,overflowY:"auto"}}>
        <div style={{color:C.t1,fontSize:18,fontWeight:700,animation:"fadeUp .3s ease"}}>{stepDef.q}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:4}}>
          {stepDef.opts.map(v=>(
            <button key={v}
              style={{...S.btn(ans[currentKey]===v?C.blue:C.bg3),border:`1px solid ${ans[currentKey]===v?C.blue:C.border}`,textAlign:"left"}}
              onClick={()=>handleOpt(currentKey,v)}>
              {v}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function Toast({msg,visible}){
  return visible?(
    <div style={{position:"absolute",bottom:90,left:"50%",transform:"translateX(-50%)",background:C.bg3,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 18px",color:C.t1,fontSize:13,zIndex:200,animation:"toastIn .3s ease",whiteSpace:"nowrap"}}>
      {msg}
    </div>
  ):null;
}

function LiveBadge(){
  return <span style={S.liveTag}><span style={{width:6,height:6,background:C.red,borderRadius:"50%",animation:"pulse 1s ease infinite"}}/>LIVE</span>;
}

/* ── getConfidence: 4問の情報だけで「確実」と言えるかのみ判定
   certain  = クイズ4問だけで対象と断言できる
   needs_profile = 年収・住居などプロフィール追加が必要
   none     = 明らかに対象外
──*/
function getConfidence(item, profile){
  const el = ELIGIBILITY[item.id];
  if(!el) {
    // エンジン未定義の場合は旧ロジックにフォールバック
    if(item.certain(profile)) return "certain";
    if(item.match(profile)===0) return "none";
    return "needs_profile";
  }
  const {certain, matchScore} = calcEligibility(profile, el);
  if(certain) return "certain";
  if(matchScore===0) return "none";
  return "needs_profile";
}

function InfoCard({item,profile,liked,reminded,hidden,onLike,onRemind,onHide,onClick,liveData,conf}){
  if(hidden.includes(item.id)) return null;
  const isCertain = conf==="certain";
  const amount = item.subsidy(profile);
  const isLiked = liked.includes(item.id);
  const isReminded = reminded.includes(item.id);
  const hasLive = !!liveData;

  const confBadge = isCertain
    ? {label:"✅ 対象確実",  bg:C.green+"22", color:C.green,  border:C.green+"44"}
    : {label:"🔶 関係あるかも", bg:"#f0a03022", color:"#f0a030", border:"#f0a03044"};

  return (
    <div style={{...S.card, border:`1px solid ${confBadge.border}`}} onClick={onClick}>
      <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
        <div style={{fontSize:28,flexShrink:0}}>{item.icon}</div>
        <div style={{flex:1,minWidth:0}}>
          {/* tag row */}
          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:5}}>
            <span style={S.tag(item.color)}>{item.gov}</span>
            <span style={S.tag(C.t2)}>{item.tag}</span>
            <span style={{background:confBadge.bg,color:confBadge.color,borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:700}}>
              {confBadge.label}
            </span>
            {hasLive&&<LiveBadge/>}
            {item.urgent&&<span style={S.tag(C.red)}>⚠️ 期限注意</span>}
          </div>

          <div style={{color:C.t1,fontWeight:700,fontSize:14,marginBottom:2}}>{item.title}</div>
          <div style={{color:C.t2,fontSize:12,marginBottom:6}}>{easy?(item["catchText"]||item["catch"]):item.officialName}</div>

          {/* amount */}
          {isCertain&&amount>0&&(
            <div style={{color:item.subsidyType==="cash"?C.blue:C.green,fontWeight:700,fontSize:16}}>
              {item.subsidyType==="savings"?"💚 ":"💙 "}{item.subsidyLabel(profile)}
            </div>
          )}
          {isCertain&&item.subsidyType==="info"&&(
            <div style={{color:C.t2,fontSize:13}}>📋 手続き情報</div>
          )}
          {!isCertain&&item.potentialSubsidy>0&&(
            <div style={{color:"#f0a030",fontWeight:600,fontSize:14}}>
              最大 {fmt(item.potentialSubsidy)}
              <span style={{color:C.t3,fontSize:11,fontWeight:400,marginLeft:4}}>（条件次第）</span>
            </div>
          )}
          {!isCertain&&item.needsMore&&(
            <div style={{color:C.t3,fontSize:11,marginTop:4}}>🔑 {item.needsMore}</div>
          )}

          {/* live strip */}
          {hasLive&&(
            <div style={{marginTop:6,padding:"6px 8px",background:C.bg3,borderRadius:8,border:`1px solid ${C.red}22`}}>
              <div style={{color:C.red,fontSize:10,fontWeight:700,marginBottom:2}}>🔴 最新情報 ({liveData.fetchedAt})</div>
              <div style={{color:C.t1,fontSize:12}}>{liveData.amount}</div>
              {liveData.changes&&liveData.changes!=="変更なし"&&
                <div style={{color:C.t2,fontSize:11,marginTop:2}}>📌 {liveData.changes}</div>}
            </div>
          )}
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:10}}>
        <button style={{flex:1,...S.btn(isLiked?C.red+"33":C.bg3,true),border:`1px solid ${isLiked?C.red:C.border}`,animation:isLiked?"popIn .3s ease":"none"}}
          onClick={e=>{e.stopPropagation();onLike(item.id);}}>
          {isLiked?"❤️ いいね":"🤍 いいね"}
        </button>
        <button style={{flex:1,...S.btn(isReminded?C.blue+"33":C.bg3,true),border:`1px solid ${isReminded?C.blue:C.border}`}}
          onClick={e=>{e.stopPropagation();onRemind(item.id);}}>
          {isReminded?"🔔 済":"🔕 リマインド"}
        </button>
        <button style={{flex:1,...S.btn(C.bg3,true),border:`1px solid ${C.border}`}}
          onClick={e=>{e.stopPropagation();onHide(item.id);}}>
          🙅 関係ない
        </button>
      </div>

/* ─── 不足フィールド特定 ───────────────────────────────
   ELIGIBILITYの certain 条件から、profileに何が足りないかを返す
   [{key, label, opts}] の配列
──────────────────────────────────────── */
const PROFILE_QUESTIONS = [
  {key:"housing", label:"住居形態", opts:["持ち家（戸建て）","持ち家（マンション）","賃貸","社宅・寮","その他"]},
  {key:"income",  label:"世帯年収", opts:["～200万円","200～400万円","400～600万円","600～800万円","800万円～"]},
  {key:"kidsAge", label:"お子さんの年齢（最年少）", opts:["0〜2歳","3〜5歳","6〜12歳","13〜15歳","16〜18歳"]},
];


/* ─── 各制度に必要な情報・除外理由のメタデータ ─────────────
   ELIGIBILITYのfn.toString()に頼らず明示的に定義する
──────────────────────────────────────── */
const ITEM_META = {
  // key: 制度ID
  // missingKeys: 不足している場合に質問するフィールド
  // excludeReasons: 除外された場合の理由文
  // hints: 将来対象になる可能性のヒント
  solar_tokyo:    { missingKeys:["housing"], excludeReasons:{housing:"持ち家でない場合は対象外です"}, hints:{housing:"持ち家に引っ越した場合は対象になります"} },
  solar_minato:   { missingKeys:["housing"], excludeReasons:{housing:"持ち家でない場合は対象外です"}, hints:{housing:"持ち家に引っ越した場合は対象になります"} },
  chintai_hojo:   { missingKeys:["housing","income"], excludeReasons:{income:"世帯年収が一定以上の場合は対象外です",housing:"持ち家の場合は対象外です"}, hints:{income:"離職・休業で収入が下がった場合は対象になる可能性があります"} },
  scholarship:    { missingKeys:["income"], excludeReasons:{income:"世帯年収が高い場合は対象外です（目安：400万円超）"}, hints:{income:"世帯収入が減った場合は対象になる可能性があります"} },
  shiritsu_muryou:{ missingKeys:["income"], excludeReasons:{income:"世帯年収910万円以上の場合は対象外です"}, hints:{income:"所得制限は年々緩和される傾向があります"} },
  teishotoku_kyufu:{ missingKeys:["income"], excludeReasons:{income:"住民税課税世帯は対象外です"}, hints:{income:"離職等で住民税非課税になった場合は対象になります"} },
  flat35_kosodate:{ missingKeys:["housing"], excludeReasons:{housing:"住宅ローン利用予定でない場合は対象外です"}, hints:{} },
  shogai_kyufu:   { missingKeys:["stage"], excludeReasons:{stage:"会社員・育休中の方（健康保険加入者）が対象です"}, hints:{stage:"就職して健康保険に加入した場合は対象になります"} },
  hoiku_muryou:   { missingKeys:["kidsAge"], excludeReasons:{kidsAge:"0〜2歳のお子さんがいる場合に主に対象となります"}, hints:{kidsAge:"次のお子さんが生まれた際に対象になります"} },
};

function getMissingQuestions(item, profile){
  const meta = ITEM_META[item.id];
  if(!meta) return [];
  return meta.missingKeys
    .filter(key=>!profile[key])
    .map(key=>PROFILE_QUESTIONS.find(q=>q.key===key))
    .filter(Boolean);
}

function getExclusionReason(item, profile){
  const el = ELIGIBILITY[item.id];
  const meta = ITEM_META[item.id];
  if(!el||!el.exclude) return "現在の条件では対象外です";
  var excluded = el.exclude.filter(function(fn){ return fn(profile); });
  if(excluded.length===0) return "現在の条件では対象外です";
  if(!meta||!meta.excludeReasons) return "現在の条件では対象外です";
  var keys = Object.keys(meta.excludeReasons);
  for(var i=0;i<keys.length;i++){
    var key=keys[i];
    if(profile[key]) return meta.excludeReasons[key];
  }
  return "現在の条件では対象外です";
}

function getEligibilityHint(item, profile){
  var meta = ITEM_META[item.id];
  if(!meta||!meta.hints) return null;
  var keys = Object.keys(meta.hints);
  if(keys.length===0) return null;
  return meta.hints[keys[0]];
}

function Home({profile,setProfile,liked,reminded,hidden,onLike,onRemind,onHide,onDone,done,items,liveData,easy,onGoProfile,revealMode}){
  const [detail,setDetail]=useState(null);
  const [showBanner,setShowBanner]=useState(false);
  const [hideConfirm,setHideConfirm]=useState(null);
  const [repeatConfirmItem,setRepeatConfirmItem]=useState(null);
  const [expanded,setExpanded]=useState(false);
  const [revealed,setRevealed]=useState(!revealMode); // revealModeならfalseスタート
  const banner=calcBanner(profile,items,done,hidden);

  // revealMode時：マウント後すぐにtrueにしてアニメ開始、expandedは必ずfalse
  useEffect(()=>{
    if(revealMode){
      setExpanded(false);
      const t=setTimeout(()=>setRevealed(true),80);
      return()=>clearTimeout(t);
    }
  },[]);

  const getScore=(it)=>{
    const el=ELIGIBILITY[it.id];
    const baseScore=el?calcEligibility(profile,el).matchScore:it.match(profile);
    // certainな場合でも属性の関連度でさらに差をつける
    if(getConfidence(it,profile)==="certain"){
      // 金額が大きいほど上位
      const cashVal=it.subsidy(profile)||0;
      const potVal=it.potentialSubsidy||0;
      const moneyScore=Math.min((cashVal+potVal)/10000,50); // 最大50点
      // ライフステージに直結する制度を優遇
      let relevance=0;
      if(it.tag==="子育て"&&profile.hasKids==="いる（または予定あり）") relevance+=20;
      if(it.tag==="キャリア"&&(profile.stage==="社会人（会社員）"||profile.stage==="育休・産休中")) relevance+=15;
      if(it.tag==="教育"&&profile.stage==="学生") relevance+=20;
      if(it.tag==="健康"&&age(profile)!==null&&age(profile)>=60) relevance+=15;
      if(it.tag==="住まい"&&isOwner(profile)) relevance+=15;
      return 100+moneyScore+relevance;
    }
    return baseScore;
  };
  const allVisible=items
    .filter(it=>!hidden.includes(it.id)&&getConfidence(it,profile)!=="none")
    .sort((a,b)=>{
      // 利用済みは最下位
      const da=done.includes(a.id)?1:0;
      const db=done.includes(b.id)?1:0;
      if(da!==db) return da-db;
      const ca=getConfidence(a,profile)==="certain"?0:1;
      const cb=getConfidence(b,profile)==="certain"?0:1;
      if(ca!==cb) return ca-cb;
      return getScore(b)-getScore(a);
    });

  const featured=allVisible.slice(0,3);
  const rest=allVisible.slice(3);

  const CardItem=({it, index=0, animate=true})=>{
    const conf=getConfidence(it,profile);
    const isCertain=conf==="certain";
    const amount=it.subsidy(profile);
    const isDone=done&&done.includes(it.id);
    const isLiked=liked&&liked.includes(it.id);
    // revealMode: featuredのみアニメ（animate=trueのとき）
    const delay = (revealMode && animate) ? `${index * 80}ms` : "0ms";
    const cardAnim = (revealMode && animate)
      ? { opacity: revealed ? 1 : 0, transform: revealed ? "translateY(0)" : "translateY(-28px)", transition: `opacity .45s ease ${delay}, transform .45s cubic-bezier(.22,1,.36,1) ${delay}` }
      : {};
    return (
      <div style={{background:isDone?C.bg2+"88":C.bg2,borderRadius:16,padding:"12px 14px",marginBottom:8,border:`1px solid ${isDone?"#ffffff11":isCertain?C.green+"44":"#f0a03033"}`,cursor:"pointer",opacity:isDone?0.6:1,...cardAnim}} onClick={()=>setDetail(it)}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:26,flexShrink:0,filter:isDone?"grayscale(1)":"none"}}>{it.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",gap:5,marginBottom:3,flexWrap:"wrap"}}>
              {isDone&&<span style={{background:"#ffffff11",color:C.t3,borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:700}}>✅ 済み</span>}
              {!isDone&&<span style={S.tag(it.color)}>{it.gov}</span>}
              {!isDone&&<span style={{background:isCertain?C.green+"22":"#f0a03022",color:isCertain?C.green:"#f0a030",borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:700}}>
                {isCertain?"✅ 対象確実":"🔶 関係あるかも"}
              </span>}
            </div>
            <div style={{color:isDone?C.t3:C.t1,fontWeight:700,fontSize:13}}>{easy?(it.title):(it.officialName||it.title)}</div>
            {!isDone&&isCertain&&amount>0&&<div style={{color:it.subsidyType==="cash"?C.blue:C.green,fontWeight:700,fontSize:13,marginTop:2}}>{it.subsidyType==="savings"?"💚 ":"💙 "}{it.subsidyLabel(profile)}</div>}
            {!isDone&&!isCertain&&it.potentialSubsidy>0&&<div style={{color:"#f0a030",fontSize:12,marginTop:2}}>最大 {fmt(it.potentialSubsidy)}</div>}
          </div>
          {/* いいね・利用済みボタン */}
          <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}} onClick={e=>e.stopPropagation()}>
            <button
              style={{background:isLiked?C.red+"22":"none",border:`1px solid ${isLiked?C.red:C.border}`,borderRadius:8,padding:"4px 8px",cursor:"pointer",fontSize:14,lineHeight:1}}
              onClick={()=>onLike(it.id)}>
              {isLiked?"❤️":"🤍"}
            </button>
            <button
              style={{background:isDone?C.green+"22":"none",border:`1px solid ${isDone?C.green:C.border}`,borderRadius:8,padding:"4px 6px",cursor:"pointer",fontSize:10,color:isDone?C.green:C.t3,lineHeight:1.3,fontWeight:600,whiteSpace:"nowrap"}}
              onClick={()=>{
                if(isDone){ onDone(it.id,"undo"); }
                else if(REPEATABLE_IDS.has(it.id)){ setRepeatConfirmItem(it); }
                else{ onDone(it.id,"done"); }
              }}>
              {isDone?"✅ 済み":"申請済\nにする"}
            </button>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
      {/* バナー */}
      <div style={{background:`linear-gradient(135deg,${C.bg2},${C.bg3})`,borderRadius:16,padding:"12px 16px",marginBottom:12,border:`1px solid ${C.border}`,cursor:"pointer"}} onClick={()=>setShowBanner(true)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:C.t3,fontSize:10,marginBottom:3}}>あなたが受け取れる年間総額（確実分）</div>
            <div style={{display:"flex",gap:16,alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                <span style={{color:C.t3,fontSize:10}}>給付</span>
                <span style={{color:C.blue,fontWeight:700,fontSize:18}}>{fmt(banner.cash)}</span>
              </div>
              <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                <span style={{color:C.t3,fontSize:10}}>節約</span>
                <span style={{color:C.green,fontWeight:700,fontSize:18}}>{fmt(banner.savings)}</span>
              </div>
            </div>
          </div>
          <div style={{color:C.t3,fontSize:20}}>›</div>
        </div>
      </div>

      {/* おすすめ3件 */}
      <div style={{color:C.t2,fontSize:11,fontWeight:600,marginBottom:8}}>✨ あなたへのおすすめ</div>
      {featured.map((it,i)=><CardItem key={it.id} it={it} index={i}/>)}

      {/* 展開ボタン or 展開後のリスト */}
      {rest.length>0&&!expanded&&(
        <button
          style={{width:"100%",background:"none",border:`1px solid ${C.border}`,borderRadius:12,padding:"11px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:4}}
          onClick={()=>setExpanded(true)}>
          <span style={{color:C.t2,fontSize:13,fontWeight:600}}>他 {rest.length}件の制度を見る</span>
          <span style={{color:C.t3,fontSize:13}}>↓</span>
        </button>
      )}
      {expanded&&<>
        <button
          style={{width:"100%",background:"none",border:"none",color:C.t3,fontSize:11,cursor:"pointer",padding:"4px",marginBottom:4,textAlign:"center"}}
          onClick={()=>setExpanded(false)}>
          ↑ 折りたたむ
        </button>
        <div style={{color:C.t3,fontSize:11,fontWeight:600,marginBottom:8}}>その他の制度</div>
        {rest.map((it,i)=><CardItem key={it.id} it={it} index={i+3} animate={false}/>)}
        <button
          style={{width:"100%",background:"none",border:"none",color:C.t3,fontSize:12,cursor:"pointer",padding:"8px",marginTop:4}}
          onClick={()=>setExpanded(false)}>
          ↑ 折りたたむ
        </button>
      </>}

      {detail&&<DetailModal item={detail} onClose={()=>setDetail(null)} liveData={liveData[detail.id]} conf={getConfidence(detail,profile)} profile={profile} setProfile={setProfile} onHide={(id)=>{onHide(id);setDetail(null);}} liked={liked} reminded={reminded} onLike={onLike} onRemind={onRemind} done={done} onDone={onDone} easy={easy}/>}

      {/* 繰り返し使える制度の確認ポップ */}
      {repeatConfirmItem&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setRepeatConfirmItem(null)}>
          <div style={{background:C.bg1,borderRadius:20,padding:20,width:"100%",maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:8}}>{repeatConfirmItem.icon}</div>
            <div style={{color:C.t1,fontWeight:700,fontSize:15,textAlign:"center",marginBottom:6}}>{repeatConfirmItem.title}</div>
            <div style={{color:C.t2,fontSize:13,textAlign:"center",marginBottom:16,lineHeight:1.6}}>
              🔄 この制度は複数回使えます。<br/>利用済みとして非表示にしますか？
            </div>
            <div style={{display:"flex",gap:8}}>
              <button style={{flex:1,...S.btn(C.green),fontSize:13,fontWeight:700}}
                onClick={()=>{onDone(repeatConfirmItem.id,"done");setRepeatConfirmItem(null);}}>
                非表示にする
              </button>
              <button style={{flex:1,...S.btn(C.bg3),border:`1px solid ${C.border}`,fontSize:13}}
                onClick={()=>{onDone(repeatConfirmItem.id,"keep");setRepeatConfirmItem(null);}}>
                表示を残す
              </button>
            </div>
          </div>
        </div>
      )}
      {showBanner&&<BannerModal banner={banner} onClose={()=>setShowBanner(false)}/>}
      {hideConfirm&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.6)",zIndex:130,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:C.bg1,borderRadius:20,padding:20,width:"100%"}}>
            <div style={{color:C.t1,fontWeight:700,marginBottom:8}}>この情報を非表示にしますか？</div>
            <div style={{color:C.t2,fontSize:13,marginBottom:16}}>「プロフィール」タブから復元できます</div>
            <div style={{display:"flex",gap:8}}>
              <button style={{flex:1,...S.btn(C.red)}} onClick={()=>{onHide(hideConfirm);setHideConfirm(null);}}>非表示にする</button>
              <button style={{flex:1,...S.btn(C.bg3),border:`1px solid ${C.border}`}} onClick={()=>setHideConfirm(null)}>キャンセル</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function NotifTab({liked,reminded,done,onLike,onRemind,onUndone,onDone,items,liveData,profile,setProfile,onHide}){
  const [seg,setSeg]=useState("liked");
  const [detail,setDetail]=useState(null);

  const remItems=items.filter(it=>reminded.includes(it.id));

    <div style={{...S.card,cursor:"pointer"}} onClick={()=>setDetail(it)}>
      <div style={{display:"flex",gap:12,alignItems:"center"}}>
        <div style={{fontSize:24,flexShrink:0}}>{it.icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:C.t1,fontWeight:700,fontSize:13}}>{it.title}</div>

          {showRemind&&<>
            <div style={{color:C.blue,fontSize:11,marginTop:2}}>📅 {it.deadline}</div>

        <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
          <button style={{...S.btn(liked.includes(it.id)?C.red+"33":C.bg3,true),border:`1px solid ${liked.includes(it.id)?C.red:C.border}`,fontSize:16,padding:"4px 8px"}}
            onClick={e=>{e.stopPropagation();onLike(it.id);}}>
            {liked.includes(it.id)?"❤️":"🤍"}
          </button>
          <button style={{...S.btn(reminded.includes(it.id)?C.blue+"33":C.bg3,true),border:`1px solid ${reminded.includes(it.id)?C.blue:C.border}`,fontSize:16,padding:"4px 8px"}}

        ))}

          {likedItems.length===0&&<div style={{color:C.t3,textAlign:"center",marginTop:40}}>まだいいねした制度がありません</div>}
          {likedItems.map(it=><ItemRow key={it.id} it={it} showRemind={false}/>)}
        </>}
        {seg==="remind"&&<>
          {remItems.length===0&&<div style={{color:C.t3,textAlign:"center",marginTop:40}}>リマインドした制度がありません</div>}
          {remItems.map(it=><ItemRow key={it.id} it={it} showRemind={true}/>)}
        </>}
        {seg==="done"&&<>
          {doneItems.length===0&&<div style={{color:C.t3,textAlign:"center",marginTop:40}}>申請済み・利用済みの制度がありません</div>}

            <div key={it.id} style={{...S.card}}>

                  {REPEATABLE_IDS.has(it.id)&&<div style={{color:C.t3,fontSize:11,marginTop:2}}>🔄 繰り返し利用可能</div>}
                </div>
                <button style={{...S.btn(C.bg3,true),border:`1px solid ${C.border}`,fontSize:11,color:C.t3,flexShrink:0,padding:"6px 10px"}}
                  onClick={e=>{e.stopPropagation();onUndone(it.id);}}>

          ))}
        </>}
      </div>
      {detail&&<DetailModal item={detail} onClose={()=>setDetail(null)} liveData={liveData[detail.id]} conf={getConfidence(detail,profile)} profile={profile} setProfile={setProfile} onHide={(id)=>{onHide&&onHide(id);setDetail(null);}} liked={liked} reminded={reminded} onLike={onLike} onRemind={onRemind} done={done} onDone={onDone} easy={false}/>}
    </div>
  );
}



const FESTIVAL_RADIUS_OPTS=[1200,3000,999999];
const FIREWORKS_RADIUS_OPTS=[3000,5000,10000];

function FestivalTab({festivalSettings,onChangeRadius,festivalNotified,onToggleNotify}){
  const [filter,setFilter]=useState("all");
  const [sort,setSort]=useState("date");
  const [detail,setDetail]=useState(null);
  const [showReminded,setShowReminded]=useState(false);
  const [showSortPop,setShowSortPop]=useState(null);
  if(!festivalSettings) return <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.t3}}>設定情報がありません</div>;

  const {coords,town,radius,fireworksRadius}=festivalSettings;
  const curRadius=filter==="fireworks"?fireworksRadius:radius;
  const radiusOpts=filter==="fireworks"?FIREWORKS_RADIUS_OPTS:FESTIVAL_RADIUS_OPTS;

  const baseCoords = coords || (() => {
    const townName = typeof town==="object" ? town.name : town;
    const found = TOWN_COORDS.find(t=>townName&&townName.includes(t.name));
    return found ? {lat:found.lat,lng:found.lng} : null;
  })();

  // 月/日を数値化してソート（例: "8/23〜24" → 823）
  const dateNum=(d)=>{ const m=d.match(/(\d+)\/(\d+)/); return m?parseInt(m[1])*100+parseInt(m[2]):9999; };

  const filtered=[...FESTIVALS_DB]
    .filter(f=>{
      if(filter==="festival"&&f.type!=="festival") return false;
      if(filter==="fireworks"&&f.type!=="fireworks") return false;
      if(curRadius===999999) return true;
      if(!baseCoords) return true;
      return calcDist(baseCoords.lat,baseCoords.lng,f.lat,f.lng)<=curRadius;
    })
    .sort((a,b)=>{
      if(sort==="dist"&&baseCoords){
        return calcDist(baseCoords.lat,baseCoords.lng,a.lat,a.lng)
             - calcDist(baseCoords.lat,baseCoords.lng,b.lat,b.lng);
      }
      return dateNum(a.date)-dateNum(b.date);
    });

  return (
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
      <div style={{background:C.bg2,borderRadius:14,padding:12,marginBottom:12,border:`1px solid ${C.border}`}}>
        <div style={{color:C.t2,fontSize:11}}>📍 エリア：{typeof town==="object"?town.name:town} · {radiusLabel(curRadius)}</div>
      </div>

      {/* リマインド済み一覧ページ */}
      {showReminded&&(
        <div style={{position:"fixed",inset:0,background:C.bg0,zIndex:200,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"52px 16px 10px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
            <button style={{background:"none",border:"none",color:C.blue,fontSize:14,cursor:"pointer",fontWeight:700}} onClick={()=>setShowReminded(false)}>← 戻る</button>
            <span style={{color:C.t1,fontWeight:700,fontSize:15}}>🔔 リマインド済み（{festivalNotified.length}件）</span>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
            {festivalNotified.length===0&&<div style={{color:C.t3,textAlign:"center",marginTop:40}}>リマインドしたお祭り・花火がありません</div>}
            {FESTIVALS_DB.filter(f=>festivalNotified.includes(f.id)).map(f=>(
              <div key={f.id}
                style={{background:C.bg2,borderRadius:14,padding:"12px 14px",marginBottom:8,border:`1px solid ${C.blue}44`,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}
                onClick={()=>{setShowReminded(false);setDetail(f);}}>
                <div style={{fontSize:24,flexShrink:0}}>{f.type==="fireworks"?"🎆":"🎪"}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:C.t1,fontWeight:700,fontSize:13}}>{f.name}</div>
                  <div style={{color:C.t2,fontSize:11,marginTop:2}}>{f.area} · {f.date}</div>
                </div>
                <button
                  style={{background:C.blue+"22",border:`1px solid ${C.blue}`,borderRadius:8,padding:"6px 10px",cursor:"pointer",color:C.blue,fontSize:11,flexShrink:0}}
                  onClick={e=>{e.stopPropagation();onToggleNotify(f.id);}}>
                  解除
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 並び順ポップ */}
      {showSortPop==="sort"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:300,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowSortPop(null)}>
          <div style={{background:C.bg1,borderRadius:"20px 20px 0 0",padding:"20px 20px 36px",width:"100%"}} onClick={e=>e.stopPropagation()}>
            <div style={{color:C.t1,fontWeight:700,fontSize:14,marginBottom:14}}>並び順</div>
            <div style={{display:"flex",gap:8}}>
              {[["date","📅 日付順"],["dist","📍 距離順"]].map(([v,l])=>(
                <button key={v} style={{flex:1,...S.btn(sort===v?C.blue:C.bg3,true),border:`1px solid ${sort===v?C.blue:C.border}`}} onClick={()=>{setSort(v);setShowSortPop(null);}}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* 表示範囲ポップ（お祭り・花火それぞれ） */}
      {showSortPop==="radius"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:300,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowSortPop(null)}>
          <div style={{background:C.bg1,borderRadius:"20px 20px 0 0",padding:"20px 20px 36px",width:"100%"}} onClick={e=>e.stopPropagation()}>
            <div style={{color:C.t1,fontWeight:700,fontSize:14,marginBottom:16}}>表示範囲</div>
            <div style={{color:C.t3,fontSize:11,marginBottom:6}}>🎪 お祭り</div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {FESTIVAL_RADIUS_OPTS.map(r=>(
                <button key={r} style={{flex:1,...S.btn(radius===r?C.green:C.bg3,true),border:`1px solid ${radius===r?C.green:C.border}`,fontSize:12}}
                  onClick={()=>onChangeRadius("radius",r)}>{radiusLabel(r)}</button>
              ))}
            </div>
            <div style={{color:C.t3,fontSize:11,marginBottom:6}}>🎆 花火</div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {FIREWORKS_RADIUS_OPTS.map(r=>(
                <button key={r} style={{flex:1,...S.btn(fireworksRadius===r?C.purple:C.bg3,true),border:`1px solid ${fireworksRadius===r?C.purple:C.border}`,fontSize:12}}
                  onClick={()=>onChangeRadius("fireworksRadius",r)}>{radiusLabel(r)}</button>
              ))}
            </div>
            <button style={{width:"100%",...S.btn(C.blue),fontWeight:700}} onClick={()=>setShowSortPop(null)}>完了</button>
          </div>
        </div>
      )}

      {/* 1段目：フィルター＋🔔 */}
      <div style={{display:"flex",gap:6,marginBottom:6}}>
        {[["all","全て"],["festival","🎪 お祭り"],["fireworks","🎆 花火"]].map(([v,l])=>(
          <button key={v} style={{flex:1,...S.btn(filter===v?C.blue:C.bg3,true),border:`1px solid ${filter===v?C.blue:C.border}`,fontSize:12}} onClick={()=>setFilter(v)}>{l}</button>
        ))}
        <button
          style={{...S.btn(festivalNotified.length>0?C.blue+"22":C.bg3,true),border:`1px solid ${festivalNotified.length>0?C.blue:C.border}`,padding:"6px 10px",flexShrink:0,position:"relative"}}
          onClick={()=>setShowReminded(true)}>
          🔔{festivalNotified.length>0&&<span style={{position:"absolute",top:-4,right:-4,background:C.red,color:"#fff",borderRadius:8,fontSize:9,padding:"1px 4px",fontWeight:700}}>{festivalNotified.length}</span>}
        </button>
      </div>

      {/* 2段目：表示範囲・並び順 */}
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <button style={{flex:3,...S.btn(C.bg3,true),border:`1px solid ${C.border}`,fontSize:12}} onClick={()=>setShowSortPop("radius")}>
          📍 表示範囲：{radiusLabel(curRadius)}
        </button>
        <button style={{flex:2,...S.btn(C.bg3,true),border:`1px solid ${C.border}`,fontSize:12}} onClick={()=>setShowSortPop("sort")}>
          {sort==="date"?"📅 日付順":"📍 距離順"}
        </button>
      </div>

      {filtered.length===0&&<div style={{color:C.t3,textAlign:"center",marginTop:32}}>条件に合うイベントがありません</div>}
      {filtered.map(f=>{
        const dist=baseCoords?Math.round(calcDist(baseCoords.lat,baseCoords.lng,f.lat,f.lng)):null;
        const notified=festivalNotified.includes(f.id);
        return (
          <div key={f.id} style={{...S.card,cursor:"pointer"}} onClick={()=>setDetail(f)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",gap:6,marginBottom:4}}>
                  <span style={S.tag(f.type==="festival"?C.purple:C.red)}>{f.type==="festival"?"🎪 お祭り":"🎆 花火"}</span>
                </div>
                <div style={{color:C.t1,fontWeight:700,fontSize:14}}>{f.name}</div>
                <div style={{color:C.t2,fontSize:12,marginTop:2}}>📅 {f.date} · {f.area}</div>
                {dist!==null&&<div style={{color:C.t3,fontSize:11,marginTop:2}}>📍 約{dist<1000?`${dist}m`:`${(dist/1000).toFixed(1)}km`}</div>}
              </div>
              <button style={{...S.btn(notified?C.blue:C.bg3,true),border:`1px solid ${notified?C.blue:C.border}`,flexShrink:0}}
                onClick={e=>{e.stopPropagation();onToggleNotify(f.id);}}>
                {notified?"🔔":"🔕"}
              </button>
            </div>
          </div>
        );
      })}

      {/* 詳細シート - position:fixedで確実にボトムナビの上に表示 */}
      {detail&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:500,display:"flex",alignItems:"flex-end"}} onClick={()=>setDetail(null)}>
          <div style={{background:C.bg1,borderRadius:"24px 24px 0 0",padding:24,width:"100%",animation:"slideUp .3s ease"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:40,textAlign:"center",marginBottom:8}}>{detail.type==="festival"?"🎪":"🎆"}</div>
            <div style={{color:C.t1,fontWeight:700,fontSize:18,textAlign:"center",marginBottom:4}}>{detail.name}</div>
            <div style={{color:C.t2,fontSize:13,textAlign:"center",marginBottom:16}}>📅 {detail.date} · {detail.area}</div>
            {baseCoords&&(
              <div style={{background:C.bg2,borderRadius:12,padding:12,marginBottom:12,textAlign:"center"}}>
                <div style={{color:C.t2,fontSize:12}}>現在地からの距離</div>
                <div style={{color:C.t1,fontWeight:700,fontSize:18,marginTop:4}}>
                  {(()=>{const d=Math.round(calcDist(baseCoords.lat,baseCoords.lng,detail.lat,detail.lng));return d<1000?`約${d}m`:`約${(d/1000).toFixed(1)}km`;})()}
                </div>
              </div>
            )}
            <a
              href={"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(detail.name+" "+detail.area+" 東京")}
              target="_blank" rel="noreferrer"
              onClick={e=>e.stopPropagation()}
              style={{display:"block",background:C.blue,color:"#fff",textAlign:"center",padding:"12px",borderRadius:12,fontWeight:700,fontSize:14,marginBottom:8,textDecoration:"none"}}>
              🗺️ Google Mapsで開く
            </a>
            <a
              href={"https://www.google.com/search?q="+encodeURIComponent(detail.name+" "+detail.date+" "+detail.area)}
              target="_blank" rel="noreferrer"
              onClick={e=>e.stopPropagation()}
              style={{display:"block",background:C.bg2,color:C.t1,textAlign:"center",padding:"12px",borderRadius:12,fontWeight:700,fontSize:14,marginBottom:10,textDecoration:"none",border:`1px solid ${C.border}`}}>
              🔍 Google で検索
            </a>
            <button style={{...S.btn(C.bg3),width:"100%",border:`1px solid ${C.border}`}} onClick={()=>setDetail(null)}>閉じる</button>
          </div>
        </div>
      )}
    </div>
  );
}

  {key:"income",  label:"世帯年収",       emoji:"💰", opts:["～200万円","200～400万円","400～600万円","600～800万円","800万円～"]},
  {key:"kidsAge", label:"子の年齢（最年少）", emoji:"🧒", opts:["0〜2歳","3〜5歳","6〜12歳","13〜15歳","16〜18歳"]},

];

function ProfileTab({profile,setProfile,hidden,done,allItems,onRestoreAll,onRestoreOne,onShowAdmin,onResetQuiz,darkMode,setDarkMode}){
  const [showHiddenList,setShowHiddenList]=useState(false);
  const [showRestoreConfirm,setShowRestoreConfirm]=useState(false);
  // 申請済み（done）で消えたものはプロフィールの非表示欄に出さない
  const trueHidden=(hidden||[]).filter(id=>!(done||[]).includes(id));
  const [sheet,setSheet]=useState(null);
  const [numInput,setNumInput]=useState("");
  const [numError,setNumError]=useState("");

  const visible=PROFILE_FIELDS.filter(f=>!f.studentOnly||profile.stage==="学生");
  const filled=visible.filter(f=>profile[f.key]!==undefined&&profile[f.key]!==null&&profile[f.key]!=="").length;
  const pct=Math.round((filled/visible.length)*100);

  const openSheet=(f)=>{ setSheet(f); setNumInput(f.key==="ageNum"&&profile.ageNum?String(profile.ageNum):""); setNumError(""); };

  const displayValue=(f)=>{
    const v=profile[f.key];
    if(v===undefined||v===null||v==="") return "未設定";
    if(f.key==="ageNum") return `${v}歳`;
    return String(v);
  };

  return (
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
      <div style={{background:C.bg2,borderRadius:14,padding:12,marginBottom:12,border:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{color:C.t1,fontWeight:700,fontSize:14}}>プロフィール完成度</span>
          <span style={{color:C.blue,fontWeight:700}}>{pct}%</span>
        </div>
        <div style={{background:C.bg3,borderRadius:4,height:6}}>
          <div style={{background:C.blue,height:6,borderRadius:4,width:`${pct}%`,transition:"width .4s"}}/>
        </div>
      </div>
      {/* 非表示一覧ページ */}
      {showHiddenList&&(
        <div style={{position:"fixed",inset:0,background:C.bg0,zIndex:200,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"16px 16px 8px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
            <button style={{background:"none",border:"none",color:C.blue,fontSize:14,cursor:"pointer",fontWeight:700}} onClick={()=>setShowHiddenList(false)}>← 戻る</button>
            <span style={{color:C.t1,fontWeight:700,fontSize:15}}>非表示にした制度（{trueHidden.length}件）</span>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
            {trueHidden.map(id=>{
              const it=allItems&&allItems.find(x=>x.id===id);
              if(!it) return null;
              return (
                <div key={id} style={{background:C.bg2,borderRadius:14,padding:"12px 14px",marginBottom:8,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
                  <div style={{fontSize:24,flexShrink:0,filter:"grayscale(1)"}}>{it.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:C.t2,fontSize:11}}>{it.gov}</div>
                    <div style={{color:C.t1,fontSize:13,fontWeight:600}}>{it.title}</div>
                  </div>
                  <button
                    style={{...S.btn(C.blue,true),fontSize:12,flexShrink:0}}
                    onClick={()=>onRestoreOne(id)}>
                    復元
                  </button>
                </div>
              );
            })}
            {trueHidden.length===0&&<div style={{color:C.t3,textAlign:"center",marginTop:40}}>非表示にした制度はありません</div>}
          </div>
        <div style={{padding:"12px 16px",borderTop:`1px solid ${C.border}`,flexShrink:0}}>
          <button style={{width:"100%",...S.btn(C.bg3),border:`1px solid ${C.border}`,color:C.t2}}
            onClick={()=>setShowRestoreConfirm(true)}>
            すべて復元する（{trueHidden.length}件）
          </button>
        </div>

        {/* 確認ポップ */}
        {showRestoreConfirm&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setShowRestoreConfirm(false)}>
            <div style={{background:C.bg1,borderRadius:20,padding:20,width:"100%",maxWidth:380}} onClick={e=>e.stopPropagation()}>
              <div style={{color:C.t1,fontWeight:700,fontSize:15,marginBottom:8,textAlign:"center"}}>すべて復元しますか？</div>
              <div style={{color:C.t2,fontSize:13,textAlign:"center",marginBottom:16,lineHeight:1.6}}>
                非表示にした{trueHidden.length}件の制度を<br/>ホームに戻します
              </div>
              <div style={{display:"flex",gap:8}}>
                <button style={{flex:1,...S.btn(C.blue),fontSize:13,fontWeight:700}}
                  onClick={()=>{onRestoreAll();setShowHiddenList(false);setShowRestoreConfirm(false);}}>
                  復元する
                </button>
                <button style={{flex:1,...S.btn(C.bg3),border:`1px solid ${C.border}`,fontSize:13}}
                  onClick={()=>setShowRestoreConfirm(false)}>
                  キャンセル
                </button>
              </div>
            </div>
          </div>
        )}
        </div>
      )}
      {visible.map(f=>(
        <div key={f.key} style={{...S.card,cursor:"pointer"}} onClick={()=>openSheet(f)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{color:C.t2,fontSize:11}}>{f.emoji} {f.label}</div>
              <div style={{color:profile[f.key]?C.t1:C.t3,fontSize:14,marginTop:2,fontWeight:profile[f.key]?600:400}}>
                {displayValue(f)}
              </div>
            </div>
            <div style={{color:C.t3,fontSize:18}}>›</div>
          </div>
        </div>
      ))}

      {/* ボトムシート */}
      {sheet&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.7)",zIndex:120,display:"flex",alignItems:"flex-end"}} onClick={()=>setSheet(null)}>
          <div style={{background:C.bg1,borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxHeight:"70%",overflowY:"auto",animation:"slideUp .3s ease"}} onClick={e=>e.stopPropagation()}>
            <div style={{color:C.t1,fontWeight:700,fontSize:16,marginBottom:16}}>{sheet.emoji} {sheet.label}</div>

            {/* 数値入力（ageNum） */}
            {sheet.inputType==="number"&&<>
              <input
                type="number" inputMode="numeric" min="1" max="110"
                value={numInput}
                onChange={e=>{setNumInput(e.target.value);setNumError("");}}
                placeholder="例：34"
                style={{background:C.bg3,border:`2px solid ${numError?C.red:C.blue}`,borderRadius:14,padding:"14px 18px",color:C.t1,fontSize:28,fontWeight:700,textAlign:"center",outline:"none",width:"100%",marginBottom:8}}
                autoFocus
              />
              {numError&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>{numError}</div>}
              <button style={{...S.btn(C.blue),width:"100%"}} onClick={()=>{
                const n=parseInt(numInput,10);
                if(isNaN(n)||n<1||n>110){setNumError("1〜110の数字を入力してください");return;}
                setProfile({...profile,[sheet.key]:n});
                setSheet(null);
              }}>保存</button>
            </>}

            {/* 選択肢（opts） */}
            {sheet.opts&&sheet.opts.map(v=>(
              <button key={v} style={{...S.btn(profile[sheet.key]===v?C.blue:C.bg3),border:`1px solid ${profile[sheet.key]===v?C.blue:C.border}`,width:"100%",marginBottom:8,textAlign:"left"}}
                onClick={()=>{
                  const next={...profile,[sheet.key]:v};
                  if(sheet.key==="stage"&&v!=="学生") delete next.studentLevel;
                  setProfile(next);
                  setSheet(null);
                }}>
                {v}
              </button>
            ))}

            {/* テキスト入力フォールバック（opts・inputType両方ない項目） */}

            <div style={{position:"absolute",top:3,left:darkMode?21:3,width:20,height:20,borderRadius:10,background:"#fff",transition:"left .25s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}}/>

        <button style={{width:"100%",...S.btn(C.bg3,true),border:`1px solid ${C.border}`,color:C.t3,fontSize:12}} onClick={onShowAdmin}>

        {trueHidden.length>0&&(
          <div style={{background:C.bg2,borderRadius:14,padding:12,border:`1px solid ${C.border}`}}>
            <div style={{color:C.t2,fontSize:12,marginBottom:8}}>非表示にした制度：{trueHidden.length}件</div>
            <button style={{width:"100%",...S.btn(C.blue,true),fontSize:12}} onClick={()=>setShowHiddenList(true)}>一覧を見る・選んで復元</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── 動的制度アイテムのmatch/certain変換 ───
   AIが返す条件テキスト（例："子あり", "40歳以上"）を
   profile オブジェクトに対して評価する関数に変換する
──*/
function buildDynamicItem(raw){
  // conditions: 文字列の配列 ["子あり", "40歳以上", "学生"] など
  const conditions = raw.conditions || [];

  const certain = (p) => {
    return conditions.every(c => {
      if(c==="子あり") return p.hasKids==="いる（または予定あり）";
      if(c==="全員") return true;
      if(c.includes("歳以上")){
        const n=parseInt(c); const a=p.ageNum?Number(p.ageNum):null;
        return a!==null && a>=n;
      }
      if(c.includes("歳未満")){
        const n=parseInt(c); const a=p.ageNum?Number(p.ageNum):null;
        return a!==null && a<n;
      }
      if(c==="学生") return p.stage==="学生";
      if(c==="社会人") return p.stage==="社会人（会社員）"||p.stage==="社会人（フリーランス・自営）";
      if(c==="賃貸") return p.housing==="賃貸";
      if(c==="持ち家") return p.housing==="持ち家（戸建て）"||p.housing==="持ち家（マンション）";
      if(c==="年金生活者") return p.stage==="年金生活者";
      return false; // 不明な条件は確実判定しない
    });
  };

  const match = (p) => {
    if(conditions.includes("全員")) return 70;
    let score = 0;
    conditions.forEach(c => {
      if(c==="子あり"){ score += p.hasKids==="いる（または予定あり）"?40:0; }
      else if(c.includes("歳以上")){
        const n=parseInt(c); const a=p.ageNum?Number(p.ageNum):null;
        score += (a!==null&&a>=n)?40:0;
      }
      else if(c.includes("歳未満")){
        const n=parseInt(c); const a=p.ageNum?Number(p.ageNum):null;
        score += (a!==null&&a<n)?30:0;
      }
      else if(c==="学生"){ score += p.stage==="学生"?40:0; }
      else if(c==="社会人"){ score += (p.stage==="社会人（会社員）"||p.stage==="社会人（フリーランス・自営）")?35:0; }
      else if(c==="賃貸"){ score += p.housing==="賃貸"?40:0; }
      else if(c==="持ち家"){ score += (p.housing==="持ち家（戸建て）"||p.housing==="持ち家（マンション）")?40:0; }
      else if(c==="年金生活者"){ score += p.stage==="年金生活者"?40:0; }
      else { score += 20; } // 不明条件は低めのスコア
    });
    // 条件が複数あるほど絞り込まれる
    const base = conditions.length > 0 ? Math.min(score, 90) : 50;
    return certain(p) ? 95 : base > 0 ? base : 0;
  };

  return {
    ...raw,
    id: raw.id || `dynamic_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
    certain,
    subsidy: (p) => certain(p) ? (raw.subsidyAmount||0) : 0,
    subsidyLabel: (p) => certain(p) ? raw.subsidyLabel : null,
    match,
    needsMore: raw.needsMore || null,
    dynamic: true, // 動的追加フラグ
  };
}

/* ─── AdminTab: URL/PDFテキスト → AI抽出 → 確認 → 追加 ─── */
function AdminTab({onAddItem, existingIds}){
  const [input,setInput]=useState("");
  const [inputType,setInputType]=useState("url"); // "url" | "text"
  const [loading,setLoading]=useState(false);
  const [proposals,setProposals]=useState([]);
  const [error,setError]=useState("");

  const CONDITION_OPTIONS=["全員","子あり","学生","社会人","賃貸","持ち家","40歳以上","60歳以上","65歳以上","70歳以上","20歳未満","年金生活者"];

  const extract = async () => {
    if(!input.trim()){setError("URLまたはテキストを入力してください");return;}
    setLoading(true); setError(""); setProposals([]);

    const sourceDesc = inputType==="url"
      ? "対象URL: "+input
      : "テキスト内容:\n"+input;
    const inputTypeLabel = inputType==="url" ? "URL（Web検索して内容を取得）" : "テキスト";

    const prompt = "あなたは港区民向け行政情報アプリの制度データ抽出AIです。\n\n"
      + "以下の"+inputTypeLabel+"から、港区民が受け取れる給付金・補助金・減免・手当・無料サービスの情報のみを抽出し、JSON配列で返してください。\n\n"
      + "【抽出する情報】給付金・補助金・手当・助成金・医療費助成・保育料減免・無料施設利用など、区民が金銭的または実質的メリットを受けられる制度\n\n"
      + "【抽出しない情報】講座・イベント・セミナーの参加募集、求人・委員募集、工事・道路閉鎖のお知らせ、選挙・投票のお知らせ、施設の休館・変更案内\n\n"
      + sourceDesc + "\n\n"
      + "以下のJSON形式で、見つかった制度を全て列挙してください。条件は必ず下記リストから選んでください：\n"
      + '条件の選択肢: "全員", "子あり", "学生", "社会人", "賃貸", "持ち家", "40歳以上", "60歳以上", "65歳以上", "70歳以上", "20歳未満", "年金生活者"\n\n'
      + "返すJSONの形式（配列、前置き・後置き・コードブロック不要）:\n"
      + '[\n  {\n'
      + '    "title": "制度名（簡潔に）",\n'
      + '    "gov": "国" または "東京都" または "港区",\n'
      + '    "tag": "子育て" または "住まい" または "健康" または "キャリア" または "教育" または "生活",\n'
      + '    "icon": "絵文字1文字",\n'
      + '    "catch": "一言でわかるキャッチコピー（20文字以内）",\n'
      + '    "body": "制度の詳細説明（150文字以内）",\n'
      + '    "subsidyType": "cash" または "savings" または "info",\n'
      + '    "subsidyAmount": 給付額（数値・円単位、不明なら0）,\n'
      + '    "subsidyLabel": "金額の表示文字列（例：年12万円）",\n'
      + '    "potentialSubsidy": 最大可能性額（数値・円単位）,\n'
      + '    "conditions": ["条件1", "条件2"],\n'
      + '    "needsMore": "確定に必要な追加情報または null",\n'
      + '    "deadline": "申請期限",\n'
      + '    "urgent": false,\n'
      + '    "reminderLabel": "リマインドすべき行動（1文）",\n'
      + '    "sourceUrl": "公式URL"\n'
      + '  }\n]\n\n'
      + "制度が見つからない場合は空配列 [] を返してください。JSONのみ返してください。";

    try {
      const tools = inputType==="url" ? [{type:"web_search_20250305",name:"web_search"}] : undefined;
      const resp = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:4000,
          ...(tools?{tools}:{}),
          messages:[{role:"user",content:prompt}],
        }),
      });
      const data = await resp.json();
      const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const clean = text.replace(/```json|```/g,"").trim();
      const start = clean.indexOf("["); const end = clean.lastIndexOf("]");
      if(start===-1) throw new Error("制度情報が見つかりませんでした");
      const parsed = JSON.parse(clean.slice(start,end+1));
      // 既存IDと重複チェック
      const filtered = parsed.filter(p=>!existingIds.includes(p.id));
      setProposals(filtered.map(p=>({...p,_accepted:false,_editing:false})));
      if(filtered.length===0) setError("新しい制度は見つかりませんでした（すでに登録済みの可能性）");
    } catch(e){
      setError("抽出に失敗しました: "+e.message);
    }
    setLoading(false);
  };

  const toggleAccept=(i)=>setProposals(ps=>ps.map((p,j)=>j===i?{...p,_accepted:!p._accepted}:p));
  const addAccepted=()=>{
    const accepted=proposals.filter(p=>p._accepted);
    accepted.forEach(p=>{
      const {_accepted,_editing,...raw}=p;
      onAddItem(buildDynamicItem(raw));
    });
    setProposals(ps=>ps.filter(p=>!p._accepted));
  };

  return (
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
      <div style={{color:C.t1,fontWeight:700,fontSize:15,marginBottom:4}}>⚙️ 制度を自動追加</div>
      <div style={{color:C.t2,fontSize:12,marginBottom:14}}>URLか広報テキストを貼るとAIが制度を抽出します</div>

      {/* 入力タイプ切替 */}
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {[["url","🔗 URL"],["text","📄 テキスト"]].map(([v,l])=>(
          <button key={v} style={{flex:1,...S.btn(inputType===v?C.blue:C.bg3,true),border:`1px solid ${inputType===v?C.blue:C.border}`}} onClick={()=>setInputType(v)}>{l}</button>
        ))}
      </div>

      {inputType==="url"?(
        <input
          value={input} onChange={e=>setInput(e.target.value)}
          placeholder="例: https://www.city.minato.tokyo.jp/..."
          style={{width:"100%",background:C.bg3,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 14px",color:C.t1,fontSize:13,outline:"none",marginBottom:10}}
        />
      ):(
        <textarea
          value={input} onChange={e=>setInput(e.target.value)}
          placeholder="広報みなとのPDFテキストや制度説明文をここに貼り付け..."
          rows={6}
          style={{width:"100%",background:C.bg3,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 14px",color:C.t1,fontSize:12,outline:"none",marginBottom:10,resize:"vertical",fontFamily:"inherit"}}
        />
      )}

      <button style={{...S.btn(C.blue),width:"100%",marginBottom:12,opacity:loading?0.6:1}} onClick={extract} disabled={loading}>
        {loading?"🔍 AIが抽出中...":"🔍 制度を抽出する"}
      </button>

      {loading&&(
        <div style={{textAlign:"center",marginBottom:12}}>
          <div style={{width:32,height:32,border:`3px solid ${C.blue}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 8px"}}/>
          <div style={{color:C.t2,fontSize:12}}>公式サイトを読んで制度を整理しています…</div>
        </div>
      )}
      {error&&<div style={{color:C.red,fontSize:12,marginBottom:10}}>{error}</div>}

      {/* 抽出結果 */}
      {proposals.length>0&&<>
        <div style={{color:C.t1,fontWeight:700,fontSize:13,marginBottom:8}}>{proposals.length}件の制度が見つかりました</div>
        {proposals.map((p,i)=>(
          <div key={i} style={{...S.card,border:`1px solid ${p._accepted?C.green+"66":C.border}`,marginBottom:10}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
              <div style={{fontSize:24,flexShrink:0}}>{p.icon||"📋"}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                  <span style={S.tag(C.blue)}>{p.gov}</span>
                  <span style={S.tag(C.t2)}>{p.tag}</span>
                  {p.conditions&&p.conditions.map(c=><span key={c} style={S.tag(C.purple)}>{c}</span>)}
                </div>
                <div style={{color:C.t1,fontWeight:700,fontSize:13,marginBottom:2}}>{p.title}</div>
                <div style={{color:C.t2,fontSize:11,marginBottom:4}}>{p["catchText"]||p["catch"]}</div>
                <div style={{color:C.t2,fontSize:11,lineHeight:1.5}}>{p.body}</div>
                {p.subsidyAmount>0&&<div style={{color:C.blue,fontWeight:700,fontSize:13,marginTop:4}}>💙 {p.subsidyLabel||fmt(p.subsidyAmount)}</div>}
                <div style={{color:C.t3,fontSize:10,marginTop:4}}>📅 {p.deadline}</div>
                {p.needsMore&&<div style={{color:C.t3,fontSize:10,marginTop:2}}>🔑 {p.needsMore}</div>}
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:10,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
              <button style={{flex:1,...S.btn(p._accepted?C.green:C.bg3,true),border:`1px solid ${p._accepted?C.green:C.border}`}} onClick={()=>toggleAccept(i)}>
                {p._accepted?"✅ 追加する":"追加する"}
              </button>
              <button style={{...S.btn(C.bg3,true),border:`1px solid ${C.border}`}} onClick={()=>setProposals(ps=>ps.filter((_,j)=>j!==i))}>
                🗑 却下
              </button>
            </div>
          </div>
        ))}
        {proposals.some(p=>p._accepted)&&(
          <button style={{...S.btn(C.green),width:"100%",marginTop:4,fontWeight:700}} onClick={addAccepted}>
            ✅ 選択した制度をアプリに追加
          </button>
        )}
      </>}
    </div>
  );
}
