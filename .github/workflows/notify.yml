name: Push通知送信

on:
  push:
    branches: [main]
    paths:
      - "items-db.json"

jobs:
  notify-users:
    name: ユーザーにPush通知
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: items-db.jsonの更新内容を確認
        id: check
        run: |
          UPDATED_AT=$(cat items-db.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['_meta']['updatedAt'])")
          echo "updated_at=$UPDATED_AT" >> $GITHUB_OUTPUT

      - name: ユーザーにPush通知を送信
        run: |
          curl -X POST "https://minato-mygov-push.k-0k-i1k-2k-3.workers.dev/notify/users" \
            -H "Authorization: Bearer ${{ secrets.NOTIFY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"title\": \"新しい制度が追加されました\", \"body\": \"港区の新しい給付制度を確認してください\", \"updatedAt\": \"${{ steps.check.outputs.updated_at }}\"}"
