name: Push通知送信

on:
  push:
    branches: [main]
    paths:
      - "items-db.json"

jobs:
  notify-users:
    name: ユーザーにPush通知
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # HEAD~1 の比較に必要

      - name: 追加された制度を特定して通知文を作成
        run: |
          python3 << 'PYEOF'
          import subprocess, json, os

          # 現在の items-db.json
          with open("items-db.json", encoding="utf-8") as f:
              current = json.load(f)

          # 1つ前のコミットの items-db.json
          try:
              prev_raw = subprocess.check_output(
                  ["git", "show", "HEAD~1:items-db.json"],
                  stderr=subprocess.DEVNULL
              ).decode("utf-8")
              prev_ids = {item["id"] for item in json.loads(prev_raw).get("items", [])}
          except Exception:
              prev_ids = set()

          # 新規追加されたアイテムを抽出
          new_items = [
              item for item in current.get("items", [])
              if item["id"] not in prev_ids
          ]

          updated_at = current["_meta"]["updatedAt"]

          # 通知文を生成
          if len(new_items) == 1:
              item = new_items[0]
              tag  = item.get("tag", "")
              gov  = item.get("gov", "")
              notif_title = f"【新制度】{item.get('title', '新しい制度')}"
              catch = item.get("catch", "")
              notif_body  = f"{gov}｜{tag}｜{catch}" if catch else f"{gov}の新制度を確認してください"
          elif len(new_items) > 1:
              notif_title = f"新しい制度が{len(new_items)}件追加されました"
              notif_body  = "・".join(i.get("title", "") for i in new_items[:3])
          else:
              # 追加でなく編集の場合
              notif_title = "制度情報が更新されました"
              notif_body  = "最新情報をアプリで確認してください"

          # サーバが確定した「本当の新着id」を載せる（端末の既読に依存しない）。
          new_ids = [i["id"] for i in new_items]

          # SWが items-db を取りに行かず、端末内プロフィールだけで関係/興味判定できるよう、
          # 新着アイテムの「判定＋表示に必要なフィールドだけ」を payload に同梱する。
          # （Pages反映ラグの影響を受けず、かつ個人化を維持するため）
          SLIM_KEYS = ("id","title","catch","notifHook","miniQuizText","miniQuizKey",
                       "categoryHint","notifyLevel","judgmentType","interestTags","eligibility")
          def slim(it):
              return {k: it[k] for k in SLIM_KEYS if it.get(k) is not None}
          items_payload = [slim(i) for i in new_items[:3]]

          payload = {"title": notif_title, "body": notif_body, "updatedAt": updated_at,
                     "ids": new_ids, "items": items_payload}

          # Web Push は約4KB制限。超える場合は items を落とし、SWは汎用表示にフォールバック。
          if len(json.dumps(payload, ensure_ascii=False).encode("utf-8")) > 3500:
              payload.pop("items", None)
              print("⚠️ payloadが大きいため items を省略（SWは汎用表示にフォールバック）")

          # curl に渡すペイロードをファイルに書き出し（シェルのエスケープを回避）
          with open("notify-payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False)

          print(f"通知タイトル: {notif_title}")
          print(f"通知本文:     {notif_body}")
          print(f"新着id:       {new_ids}")
          print(f"payloadサイズ: {len(json.dumps(payload, ensure_ascii=False).encode('utf-8'))} bytes / items {len(payload.get('items', []))}件")
          PYEOF

      - name: ユーザーにPush通知を送信（即時）
        run: |
          # /notify/now = キューに溜めず即時に全購読者へ送信（毎時Cron・ステージ別時刻・
          # 1日2件キャップを経由しない）。表示の個人化はSW(handleUserPush)側で行う。
          curl -s -w "\nHTTP Status: %{http_code}" \
            -X POST "https://minato-mygov-push.k-0k-i1k-2k-3.workers.dev/notify/now" \
            -H "Authorization: Bearer ${{ secrets.NOTIFY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d @notify-payload.json
